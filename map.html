<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"><title>Карта</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link rel="stylesheet" href="common.css"></head><body><div class="screen-page"><div class="app-shell" id="app"></div></div><script src="common.js"></script><script>
let state=loadState(); if(!ensureHero(state)){}; const city=getCurrentCity(state);
const points=city.mapPoints.map(p=>`<button class="map-point ${state.activeMapPointId===p.id?'active':''}" data-id="${p.id}" style="left:${p.x}%;top:${p.y}%"><strong>${p.name}</strong><span>${p.hint}</span></button>`).join('');
q('app').innerHTML=`${renderHeader(state,'Карта города.')}
<div class="page-body"><div>${renderPortraitPanel(state)}</div><div class="panel"><div class="panel-inner" style="min-height:0"><div class="map-layout"><div class="map-card"><div class="map-layer" id="mapBg"></div><div class="map-points">${points}</div><div class="map-copy">В каждый город можно подложить свою карту через ./assets/maps/cities/&lt;city&gt;/map.jpg</div></div><div class="feature-card"><h3 style="margin:0 0 8px;color:#f1d59a;font-family:var(--font-main)">Локация</h3><div id="pointInfo">Выбери точку на карте.</div></div></div></div></div></div>
${renderSideMenu('map')}`;
applyPortrait(state); safeSetBackground(q('mapBg'),[city.mapBg],'linear-gradient(180deg, rgba(10,12,18,.08), rgba(10,12,18,.26))');
function renderInfo(){ const point=city.mapPoints.find(x=>x.id===state.activeMapPointId) || city.mapPoints[0]; q('pointInfo').innerHTML=`<strong>${point.name}</strong><p class="subtitle" style="margin-top:8px">${point.hint}</p>`; }
renderInfo(); document.querySelectorAll('[data-id]').forEach(el=>el.onclick=()=>{ state.activeMapPointId=el.dataset.id; saveState(state); location.reload(); });
</script></body></html>
