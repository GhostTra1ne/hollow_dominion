        if (debugGridTop && !debugGridTop.children.length) {
          debugGridTop.innerHTML = Array.from({ length: 12 }, (_, index) => `<span>${index + 1}</span>`).join('');
        }

        if (!debugGridSide) return;

        const totalRows = Math.ceil(window.innerHeight / rowStep);

          const top = (index + 1) * rowStep;
          return `<span style="top:${top}px">${index + 1}</span>`;
        }).join('');
      }

      function syncDebugGridButton() {
        const active = screenPage?.classList.contains('debug-grid');
        if (!gridToggleBtn) return;
        gridToggleBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
        gridToggleBtn.textContent = active ? 'GRID ON' : 'GRID';

      if (window.__HD_DEBUG_GRID__) {
        screenPage?.classList.add('debug-grid');
      }

      buildDebugGridAxes();
      syncDebugGridButton();

        screenPage?.classList.toggle('debug-grid');

      const backStepBtn = q('backStepBtn');
      const nextStepBtn = q('nextStepBtn');

      function paintStep() {
        const step = steps[state.stepIndex];
        stepLabel.textContent = step.label;
        nicknameError.textContent = '';

        if (step.key === 'race') {
          stepArea.innerHTML = renderChooser(getRaceName(state.creator.race), 'РЎРјРµРЅР° СЂР°СЃС‹ РєРЅРѕРїРєР°РјРё < >.');
        }

        if (step.key === 'classId') {
          stepArea.innerHTML = renderChooser(getClassName(state.creator.classId), 'РЎРјРµРЅР° РєР»Р°СЃСЃР° РєРЅРѕРїРєР°РјРё < >.');
        }

        if (step.key === 'gender') {
          stepArea.innerHTML = renderChooser(getGenderName(state.creator.gender), 'Р•СЃР»Рё Р°СЃСЃРµС‚РѕРІ РЅРµС‚, РѕСЃС‚Р°С‘С‚СЃСЏ fallback РЅР° human male.');
        }

        if (step.key === 'face') {
          stepArea.innerHTML = renderChooser(`Р›РёС†Рѕ ${state.creator.face}`, 'Р›РёС†Рѕ СЂРµРЅРґРµСЂРёС‚СЃСЏ РѕС‚РґРµР»СЊРЅС‹Рј PNG-СЃР»РѕРµРј.');
        }

        if (step.key === 'nickname') {
          stepArea.innerHTML = `
            <div class="nickname-wrap">
              <input id="nickInput" maxlength="16" placeholder="Р’РІРµРґРёС‚Рµ РЅРёРє" value="${escapeHtml(state.creator.nickname || '')}">
            </div>
            <div class="chooser-helper">РџРѕСЃР»РµРґРЅРёР№ С€Р°Рі РїРµСЂРµРґ РїСЂРёР±С‹С‚РёРµРј РІ СЃС‚Р°СЂС‚РѕРІС‹Р№ РіРѕСЂРѕРґ.</div>
          `;

          const input = q('nickInput');
          input.focus();
          input.oninput = () => {
            state.creator.nickname = input.value;
            saveState(state);
            nicknameError.textContent = validateNickname(state, state.creator.nickname);
          };
          nicknameError.textContent = validateNickname(state, state.creator.nickname);
        }

        backStepBtn.disabled = state.stepIndex === 0;
        nextStepBtn.textContent = state.stepIndex === steps.length - 1 ? 'РЎРѕР·РґР°С‚СЊ РїРµСЂСЃРѕРЅР°Р¶Р°' : 'Р”Р°Р»РµРµ';

        if (q('chooserPrevBtn') && q('chooserNextBtn')) {
          const prevBtn = q('chooserPrevBtn');
          const nextBtn = q('chooserNextBtn');
          const currentStep = steps[state.stepIndex];

          if (currentStep.key === 'race') {
            prevBtn.onclick = () => {
              state.creator.race = cycleArray(races, state.creator.race, -1).id;
              saveState(state);
              render();
            };
            nextBtn.onclick = () => {
              state.creator.race = cycleArray(races, state.creator.race, 1).id;
              saveState(state);
              render();
            };
          }

          if (currentStep.key === 'classId') {
            prevBtn.onclick = () => {
              state.creator.classId = cycleArray(classes, state.creator.classId, -1).id;
              saveState(state);
              render();
            };
            nextBtn.onclick = () => {
              state.creator.classId = cycleArray(classes, state.creator.classId, 1).id;
              saveState(state);
              render();
            };
          }

          if (currentStep.key === 'gender') {
            prevBtn.onclick = () => {
              state.creator.gender = cycleArray(genders, state.creator.gender, -1).id;
              saveState(state);
              render();
            };
            nextBtn.onclick = () => {
              state.creator.gender = cycleArray(genders, state.creator.gender, 1).id;
              saveState(state);
              render();
            };
          }

          if (currentStep.key === 'face') {
            prevBtn.onclick = () => {
              state.creator.face = cycleArray(faces, state.creator.face, -1);
              saveState(state);
              render();
            };
            nextBtn.onclick = () => {
              state.creator.face = cycleArray(faces, state.creator.face, 1);
              saveState(state);
              render();
            };
          }
        }
      }

      setCreatorBg(creatorBg, state);
      setPreview(previewRoot, state.creator);
      paintStep();

      backStepBtn.onclick = () => {
        if (state.stepIndex > 0) {
          state.stepIndex -= 1;
          saveState(state);
          render();
        }
      };

      nextStepBtn.onclick = () => {
        if (steps[state.stepIndex].key === 'nickname') {
          const error = validateNickname(state, state.creator.nickname);
          nicknameError.textContent = error;
          if (error) {
            return;
          }
        }

        if (state.stepIndex < steps.length - 1) {
          state.stepIndex += 1;
          saveState(state);
          render();
          return;
        }

        reserveNickname(state.creator.nickname);
        state.hero = buildHero(state);
        state.arrivalPending = false;
        state.stepIndex = 0;
        saveState(state, {immediate: true});
        render();
      };
    }

    function renderArrivalScreen() {
      q('app').innerHTML = `
        <div class="panel arrival-screen">
          <div class="arrival-bg" id="arrivalBg"></div>
          <div class="arrival-content">
            <div class="arrival-card">
              <p class="arrival-kicker">Hollow Dominion</p>
              <h1 class="arrival-title">РџСЂРёР±С‹С‚РёРµ</h1>
              <p class="arrival-copy">
                РљРѕСЂР°Р±Р»СЊ РјСЏРіРєРѕ РІС…РѕРґРёС‚ РІ РіР°РІР°РЅСЊ СЃС‚Р°СЂС‚РѕРІРѕРіРѕ РіРѕСЂРѕРґР°. РЎРѕР»С‘РЅС‹Р№ РІРµС‚РµСЂ РЅРµСЃС‘С‚ Р·Р°РїР°С… РґРµСЂРµРІР°,
                Р¶РµР»РµР·Р° Рё РґР°Р»С‘РєРёС… РґРѕСЂРѕРі. РќРѕРІР°СЏ РёСЃС‚РѕСЂРёСЏ РЅР°С‡РёРЅР°РµС‚СЃСЏ СЃ Р±РµСЂРµРіР°.
              </p>
              <div class="arrival-actions">
                <button class="btn primary" id="enterCityBtn">РЎРѕР№С‚Рё РЅР° Р±РµСЂРµРі</button>
              </div>
            </div>
          </div>
        </div>
      `;

      safeSetBackground(
        q('arrivalBg'),
        ['./assets/backgrounds/arrival_ship.jpg'],
        'linear-gradient(180deg, rgba(10,12,18,.08), rgba(10,12,18,.26))'
      );

      q('enterCityBtn').onclick = () => {
        state.arrivalPending = false;
        saveState(state);
        render();
      };
    }

    function hudNumber(value) {
      return Number.isFinite(Number(value)) ? Number(value) : 0;
    }

    function hudPercent(current, max) {
      if (!Number.isFinite(Number(max)) || Number(max) <= 0) {
        return 0;
      }
      const percent = (hudNumber(current) / hudNumber(max)) * 100;
      return Math.max(0, Math.min(100, percent));
    }

    function assetWithVersion(path) {
      const version = window.__HD_APP_VERSION__;
      return version ? `${path}?v=${encodeURIComponent(version)}` : path;
    }

    function getProfileClassLabel(classId) {
      const labels = {
        warrior: 'Warrior',
        mage: 'Mage'
      };
      return labels[classId] || getClassName(classId) || 'Adventurer';
    }

    function renderProfileHud(hero) {
      const cpValue = hudNumber(hero.cp);
      const maxCpValue = hudNumber(hero.maxCp);
      const hpValue = hudNumber(hero.hp);
      const maxHpValue = hudNumber(hero.maxHp);
      const mpValue = hudNumber(hero.mp);
      const maxMpValue = hudNumber(hero.maxMp);
      const expPercent = Math.max(0, Math.min(100, parseFloat(hero.xpPercent || '0') || 0));

      const bars = [
        { key: 'cp', value: `${cpValue} / ${maxCpValue}`, fill: `${hudPercent(cpValue, maxCpValue)}%`, top: '#fff09a', base: '#f4d83a' },
        { key: 'hp', value: `${hpValue} / ${maxHpValue}`, fill: `${hudPercent(hpValue, maxHpValue)}%`, top: '#ff897f', base: '#ef4242' },
        { key: 'mp', value: `${mpValue} / ${maxMpValue}`, fill: `${hudPercent(mpValue, maxMpValue)}%`, top: '#78c5ff', base: '#2b87ee' },
        { key: 'exp', value: `${expPercent.toFixed(2)}%`, fill: `${expPercent}%`, top: '#f2f2f2', base: '#aeb2b7' }
      ];

      return `
        <div class="profile-psd-hud" aria-label="Панель характеристик персонажа">
          <img class="profile-psd-art" src="${assetWithVersion('./assets/ui/profile_redesign/art_hud_frame.png')}" alt="">
          <div class="profile-psd-hud-system">
            <div class="profile-psd-level-value">${hudNumber(hero.level)}</div>
            <div class="profile-psd-nickname">${escapeHtml(hero.nickname)}</div>
            <div class="profile-psd-class">${escapeHtml(getProfileClassLabel(hero.classId))}</div>
            ${bars.map((bar) => `
              <div class="profile-psd-bar ${bar.key}" style="--fill:${bar.fill};--bar-color:${bar.base};--bar-color-top:${bar.top};">
                <div class="profile-psd-bar-fill"></div>
                <div class="profile-psd-bar-text">${bar.value}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderProfileBottomNav(active = 'profile') {
      const buttonBoxWidth = 1100;
      const buttonBoxHeight = 215;
      const buttons = [
        { id: 'profile', href: 'index.html', label: 'Персонаж', idle: 'btn_profile_idle.png', use: 'btn_profile_use.png', x: 24, y: 19, w: 131, h: 178 },
        { id: 'inventory', href: 'inventory.html', label: 'Инвентарь', idle: 'btn_inventory_idle.png', use: 'btn_inventory_use.png', x: 164, y: 20, w: 131, h: 177 },
        { id: 'map', href: 'map.html', label: 'Карта', idle: 'btn_map_idle.png', use: 'btn_map_use.png', x: 304, y: 18, w: 131, h: 178 },
        { id: 'fight', href: 'journey.html', label: 'Бои', idle: 'btn_fight_idle.png', use: 'btn_fight_use.png', x: 428, y: 18, w: 124, h: 179 },
        { id: 'clan', href: 'clan.html', label: 'Клан', idle: 'btn_clan_idle.png', use: 'btn_clan_use.png', x: 552, y: 19, w: 125, h: 177 },
        { id: 'quest', href: '', label: 'Квесты', idle: 'btn_quest_idle.png', use: 'btn_quest_use.png', x: 684, y: 21, w: 126, h: 178, disabled: true },
        { id: 'status', href: 'status.html', label: 'Статус', idle: 'btn_status_idle.png', use: 'btn_status_use.png', x: 819, y: 21, w: 129, h: 178 },
        { id: 'chat', href: 'chat.html', label: 'Чат', idle: 'btn_chat_idle.png', use: 'btn_chat_use.png', x: 957, y: 19, w: 124, h: 178 }
      ];

      const pct = (value, total) => `${((value / total) * 100).toFixed(3)}%`;

      return buttons.map((item) => {
        const src = assetWithVersion(`./assets/ui/profile_redesign/${active === item.id ? item.use : item.idle}`);
        const style = [
          `left:${pct(item.x, buttonBoxWidth)}`,
          `top:${pct(item.y, buttonBoxHeight)}`,
          `width:${pct(item.w, buttonBoxWidth)}`,
          `height:${pct(item.h, buttonBoxHeight)}`
        ].join(';');

        if (item.disabled) {
          return `
            <span class="profile-psd-bottom-button disabled" style="${style}" aria-label="${item.label}">
              <img src="${src}" alt="">
            </span>
          `;
        }

        return `
          <a class="profile-psd-bottom-button" href="${withAppParams(item.href)}" style="${style}" aria-label="${item.label}"${active === item.id ? ' aria-current="page"' : ''}>
            <img src="${src}" alt="">
          </a>
        `;
      }).join('');
    }

    function renderCityScreen() {
      setProfileScreenMode(true);
      const hero = state.hero;
      const assetVersion = window.__HD_APP_VERSION__ || '20260430-telegram-150';

      q('app').innerHTML = `

            ${renderProfileHud(hero)}
            <div class="profile-psd-frame-shell">
              <img class="profile-psd-art profile-psd-frame-art" src="${assetWithVersion('./assets/ui/profile_redesign/art_profile_frame.png')}" alt="">
            </div>
            <div class="profile-psd-portrait-shell">

                <div class="profile-psd-stage">
                  <div class="profile-psd-model-anchor">

                      </div>

                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="profile-psd-bottom-shell">
              <img class="profile-psd-art" src="${assetWithVersion('./assets/ui/profile_redesign/art_profile_bottom.png')}" alt="">
              ${renderProfileBottomNav('profile')}

          </div>
        </div>
      `;

      applyPortrait(state);
    }

    function render() {
      if (state.hero) {
        if (state.arrivalPending) {
          state.arrivalPending = false;
          saveState(state, {immediate: true});
        }
        renderCityScreen();
        return;
      }

      renderCreatorScreen();
    }

      render();
      })();
  </script>
