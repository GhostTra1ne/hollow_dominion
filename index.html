<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Hollow Dominion</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css">
  <style>
    .screen-page {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(42, 76, 126, .12), transparent 34%),
        linear-gradient(180deg, rgba(9, 13, 21, .42) 0%, rgba(14, 20, 32, .34) 38%, rgba(16, 23, 34, .48) 100%);
    }

    .screen-page::before,
    .screen-page::after {
      content: "";
      position: absolute;
      inset: -8%;
      pointer-events: none;
      z-index: 0;
    }

    .screen-page::before {
      background:
        radial-gradient(circle at 18% 22%, rgba(83, 154, 214, .12) 0%, rgba(83, 154, 214, 0) 26%),
        radial-gradient(circle at 82% 18%, rgba(132, 181, 221, .08) 0%, rgba(132, 181, 221, 0) 24%),
        radial-gradient(circle at 50% 72%, rgba(207, 163, 90, .08) 0%, rgba(207, 163, 90, 0) 28%),
        radial-gradient(circle at 50% 50%, rgba(18, 28, 42, .20) 0%, rgba(18, 28, 42, 0) 70%);
      filter: blur(24px);
      opacity: .72;
      animation: ambientDrift 20s ease-in-out infinite alternate;
    }

    .screen-page::after {
      inset: 0;
      background:
        radial-gradient(circle at 14% 28%, rgba(255, 223, 162, .12) 0 1px, transparent 2px),
        radial-gradient(circle at 78% 24%, rgba(118, 203, 255, .14) 0 1.2px, transparent 2.4px),
        radial-gradient(circle at 68% 74%, rgba(255, 219, 141, .10) 0 1px, transparent 2px),
        radial-gradient(circle at 24% 76%, rgba(136, 205, 255, .12) 0 1.1px, transparent 2.2px),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, .02) 0%, rgba(255, 255, 255, 0) 68%);
      background-size: 320px 320px, 420px 420px, 360px 360px, 380px 380px, auto;
      opacity: .26;
      animation: ambientTwinkle 14s linear infinite;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      grid-template-rows: minmax(0, 1fr);
    }

    .city-screen {
      --profile-block-width: min(100%, 404px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      justify-items: center;
      gap: 12px;
      min-height: 0;
      height: 100%;
      position: relative;
    }

    .city-screen::before {
      content: "";
      position: absolute;
      inset: 12% -10% -6%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 18%, rgba(82, 150, 222, .12), rgba(82, 150, 222, 0) 30%),
        radial-gradient(circle at 50% 78%, rgba(214, 170, 98, .08), rgba(214, 170, 98, 0) 34%);
      filter: blur(32px);
      opacity: .92;
      animation: cityGlow 8s ease-in-out infinite;
    }

    .city-screen > * {
      position: relative;
      z-index: 1;
    }

    .city-titlebar {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      width: var(--profile-block-width);
      min-height: 132px;
      padding: 0;
      overflow: visible;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .city-titlebar .title {
      margin: 0;
    }

    .city-title-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .city-title-sprite {
      display: block;
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: scale(1.26);
      transform-origin: center center;
      filter:
        saturate(1.03)
        drop-shadow(0 10px 18px rgba(0, 0, 0, .18));
    }

    .city-title-aura {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .city-title-aura::before,
    .city-title-aura::after {
      content: "";
      position: absolute;
      inset: 22% 24%;
      border-radius: 50%;
      filter: blur(26px);
      opacity: .58;
      animation: titlePulse 4.8s ease-in-out infinite;
    }

    .city-title-aura::before {
      background: radial-gradient(circle, rgba(255, 205, 118, .22) 0%, rgba(255, 205, 118, .08) 34%, rgba(255, 205, 118, 0) 72%);
    }

    .city-title-aura::after {
      background: radial-gradient(circle, rgba(120, 181, 231, .14) 0%, rgba(120, 181, 231, .06) 36%, rgba(120, 181, 231, 0) 74%);
      animation-delay: -2.2s;
    }

    .city-spark {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(185, 235, 255, .95) 0%, rgba(109, 205, 255, .65) 46%, rgba(109, 205, 255, 0) 100%);
      box-shadow:
        0 0 10px rgba(126, 220, 255, .45),
        0 0 24px rgba(126, 220, 255, .24);
      opacity: 0;
      animation: ashSpark 5.6s linear infinite;
    }

    .city-spark.s1 { left: 20%; top: 58%; animation-delay: 0s; }
    .city-spark.s2 { left: 28%; top: 42%; animation-delay: .8s; width: 5px; height: 5px; }
    .city-spark.s3 { left: 40%; top: 66%; animation-delay: 1.6s; width: 6px; height: 6px; }
    .city-spark.s4 { right: 27%; top: 38%; animation-delay: 2.4s; }
    .city-spark.s5 { right: 18%; top: 60%; animation-delay: 3.2s; width: 5px; height: 5px; }
    .city-spark.s6 { right: 36%; top: 68%; animation-delay: 4s; width: 6px; height: 6px; }

    @keyframes ashSpark {
      0% { transform: translate3d(0, 8px, 0) scale(.7); opacity: 0; }
      10% { opacity: .75; }
      55% { opacity: .52; }
      100% { transform: translate3d(0, -22px, 0) scale(1.08); opacity: 0; }
    }

    @keyframes titlePulse {
      0%, 100% { transform: scale(.96); opacity: .54; }
      50% { transform: scale(1.04); opacity: .84; }
    }

    .city-home-layout {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      justify-items: center;
      align-content: start;
      width: min(100%, 438px);
      gap: 10px;
      min-height: 0;
    }

    .city-portrait-card {
      position: relative;
      width: var(--profile-block-width);
      aspect-ratio: 1 / 1.28;
      height: auto;
      min-height: 0;
      overflow: visible;
      isolation: isolate;
      background: transparent;
      border: 0;
      box-shadow: 0 18px 34px rgba(0, 0, 0, .24);
      animation: panelFloat 7.5s ease-in-out infinite;
    }

    .city-portrait-card .hero-portrait-bg {
      inset: 22px 12px 34px;
      z-index: 1;
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
      border-radius: 12px;
      transform: none;
    }

    .city-portrait-card .hero-portrait-bg::after {
      background: linear-gradient(180deg, rgba(10, 12, 17, .04), rgba(10, 12, 17, .24));
    }

    .city-portrait-atmosphere {
      position: absolute;
      inset: 22px 12px 34px;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
      border-radius: 12px;
      mix-blend-mode: screen;
      opacity: 1;
    }

    .city-portrait-atmosphere::before,
    .city-portrait-atmosphere::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    .city-portrait-atmosphere::before {
      background:
        radial-gradient(circle at 22% 70%, rgba(255, 192, 96, .30) 0%, rgba(255, 192, 96, 0) 28%),
        radial-gradient(circle at 72% 28%, rgba(126, 186, 255, .24) 0%, rgba(126, 186, 255, 0) 30%),
        linear-gradient(135deg, rgba(255, 213, 132, .18) 0%, rgba(255, 213, 132, 0) 46%);
      filter: blur(18px);
      animation: portraitAtmosphereGlow 7s ease-in-out infinite alternate;
    }

    .city-portrait-atmosphere::after {
      background:
        linear-gradient(180deg, rgba(255, 232, 190, .12) 0%, rgba(255, 232, 190, 0) 44%),
        linear-gradient(0deg, rgba(255, 168, 78, .14) 0%, rgba(255, 168, 78, 0) 38%);
      opacity: .92;
    }

    .city-portrait-mist {
      position: absolute;
      border-radius: 50%;
      filter: blur(24px);
      opacity: .52;
      animation: portraitMistDrift 10s ease-in-out infinite;
    }

    .city-portrait-mist.m1 {
      left: -8%;
      bottom: 10%;
      width: 54%;
      height: 18%;
      background: radial-gradient(circle, rgba(255, 200, 126, .52) 0%, rgba(255, 200, 126, 0) 72%);
    }

    .city-portrait-mist.m2 {
      right: -10%;
      top: 18%;
      width: 46%;
      height: 16%;
      background: radial-gradient(circle, rgba(121, 180, 255, .40) 0%, rgba(121, 180, 255, 0) 72%);
      animation-delay: -7s;
    }

    .city-portrait-spark {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 232, 191, .98) 0%, rgba(255, 186, 94, .86) 46%, rgba(255, 186, 94, 0) 100%);
      box-shadow:
        0 0 12px rgba(255, 193, 104, .52),
        0 0 24px rgba(255, 193, 104, .28);
      opacity: 0;
      animation: portraitSparkFloat 4.8s linear infinite;
    }

    .city-portrait-spark.s1 { left: 18%; bottom: 16%; animation-delay: 0s; }
    .city-portrait-spark.s2 { left: 34%; top: 22%; animation-delay: 1.1s; width: 5px; height: 5px; }
    .city-portrait-spark.s3 { right: 20%; bottom: 24%; animation-delay: 2.3s; }
    .city-portrait-spark.s4 { right: 30%; top: 18%; animation-delay: 3.6s; width: 5px; height: 5px; }

    @keyframes portraitAtmosphereGlow {
      0% { transform: translate3d(-1%, 0, 0) scale(1); opacity: .76; }
      100% { transform: translate3d(1%, -1%, 0) scale(1.06); opacity: 1; }
    }

    @keyframes portraitMistDrift {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(6px, -4px, 0) scale(1.06); }
    }

    @keyframes portraitSparkFloat {
      0% { transform: translate3d(0, 8px, 0) scale(.7); opacity: 0; }
      15% { opacity: .92; }
      70% { opacity: .56; }
      100% { transform: translate3d(0, -26px, 0) scale(1.16); opacity: 0; }
    }

    .city-portrait-card .character-stage {
      inset: 48px 12px 86px;
      padding: 8px 8px 0;
      z-index: 3;
    }

    .city-portrait-card .character-stage .character-box {
      transform: translateY(-10px);
    }

    .city-portrait-card .shadow {
      width: 164px;
      bottom: 6px;
    }

    .city-portrait-card .character-box {
      width: min(100%, 166px);
    }

    .city-portrait-frame {
      position: absolute;
      inset: -72px -30px -116px -30px;
      z-index: 6;
      pointer-events: none;
    }

    .city-portrait-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 12px 18px rgba(0, 0, 0, .16));
    }

    .frame-menu-grid {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: -22px;
      z-index: 8;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 2px;
      align-items: end;
    }

    .frame-menu-grid .menu-card {
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 52px;
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow: visible;
    }

    .frame-menu-grid .menu-card img {
      display: block;
      width: 94%;
      height: auto;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, .24));
      transition: transform .18s ease, filter .18s ease;
    }

    .frame-menu-grid .menu-card:active img,
    .frame-menu-grid .menu-card:hover img {
      transform: translateY(-1px) scale(1.02);
      filter:
        drop-shadow(0 10px 18px rgba(0, 0, 0, .3))
        brightness(1.04);
    }

    .portrait-overlay-ui {
      position: absolute;
      top: 56px;
      left: 22px;
      z-index: 7;
      pointer-events: none;
      width: 122px;
      padding: 2px 4px 4px;
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(92, 67, 28, .22), rgba(34, 24, 10, .12)),
        rgba(56, 39, 17, .10);
      border: 1px solid rgba(219, 182, 111, .16);
      box-shadow:
        inset 0 1px 0 rgba(255, 239, 209, .05),
        0 6px 14px rgba(0, 0, 0, .12);
      backdrop-filter: blur(2px);
    }

    .portrait-overlay-head {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      align-items: center;
      gap: 0;
      margin-bottom: 2px;
    }

    .portrait-nickname {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: var(--font-main);
      font-size: 8px;
      line-height: 1;
      color: #f4e3bf;
      transform: translate(8px, 1px);
      text-shadow:
        0 1px 0 rgba(0, 0, 0, .82),
        0 0 10px rgba(0, 0, 0, .34);
    }

    .portrait-bars {
      width: 100%;
      display: grid;
      gap: 2px;
      margin-top: 0;
      margin-left: 0;
      filter: drop-shadow(0 5px 12px rgba(0, 0, 0, .22));
    }

    .hud-bar {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      align-items: center;
      gap: 3px;
      margin-top: 0;
      aspect-ratio: auto;
      background: none;
    }

    .hud-bar-icon {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
    }

    .hud-bar:first-child {
      margin-top: 0;
    }

    .hud-bar-icon img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hud-bar-track {
      position: relative;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(255, 230, 185, .18);
      background: rgba(10, 12, 16, .82);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .06),
        inset 0 0 0 1px rgba(0, 0, 0, .24);
    }

    .hud-bar-track.cp { background: linear-gradient(180deg, #44350d 0%, #241b07 100%); }
    .hud-bar-track.hp { background: linear-gradient(180deg, #481113 0%, #26090b 100%); }
    .hud-bar-track.mp { background: linear-gradient(180deg, #10294d 0%, #09172c 100%); }
    .hud-bar-track.exp { background: linear-gradient(180deg, #414141 0%, #212121 100%); }

    .hud-bar-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--fill, 0%);
      border-radius: inherit;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .20),
        0 0 10px rgba(255, 255, 255, .08);
    }

    .hud-bar-fill.cp { background: linear-gradient(90deg, #c8970f 0%, #ffe05e 45%, #d9a814 100%); }
    .hud-bar-fill.hp { background: linear-gradient(90deg, #a3161f 0%, #ff5252 45%, #cf1b1b 100%); }
    .hud-bar-fill.mp { background: linear-gradient(90deg, #1d59bd 0%, #4ab6ff 45%, #246cd6 100%); }
    .hud-bar-fill.exp { background: linear-gradient(90deg, #989898 0%, #e0e0e0 45%, #a6a6a6 100%); }

    .hud-bar-value {
      position: absolute;
      inset: 0;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 5px;
      letter-spacing: 0;
      white-space: nowrap;
      text-shadow:
        0 1px 0 rgba(0, 0, 0, .72),
        0 0 12px rgba(0, 0, 0, .45);
    }

    .hud-bar-value.cp { color: #ffffff; }
    .hud-bar-value.hp { color: #ffffff; }
    .hud-bar-value.mp { color: #ffffff; }
    .hud-bar-value.exp { color: #ffffff; }

    .hud-level-box {
      position: relative;
      width: 22px;
      margin-left: 0;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      background: url('./assets/ui/hud/new/level.png') center center / contain no-repeat;
      filter: drop-shadow(0 3px 8px rgba(0, 0, 0, .22));
    }

    .hud-level-box span {
      display: block;
      transform: translateY(-2%);
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 7px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: #ffffff;
      text-shadow:
        0 1px 0 rgba(0, 0, 0, .8),
        0 0 10px rgba(0, 0, 0, .44);
    }

    .portrait-overlay-ui > .hud-level-box {
      display: none;
    }

    .portrait-footer,
    .profile-name {
      display: none;
    }

    .city-menu-panel {
      width: var(--profile-block-width);
      max-width: var(--profile-block-width);
      min-height: 0;
      display: none;
      justify-self: center;
      background:
        linear-gradient(180deg, rgba(17, 21, 31, .88), rgba(12, 16, 24, .92)),
        radial-gradient(circle at 50% 0%, rgba(207, 163, 90, .08), rgba(207, 163, 90, 0) 52%);
      box-shadow:
        0 16px 30px rgba(0, 0, 0, .22),
        0 0 0 1px rgba(214, 178, 118, .06) inset;
    }

    .city-menu-panel .panel-inner {
      padding: 6px 8px 8px;
    }

    .city-menu-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      width: 100%;
      margin: 0;
      gap: 2px;
      justify-content: stretch;
      min-height: 0;
      align-content: stretch;
    }

    .city-menu-grid .menu-card {
      width: 100%;
      min-height: 54px;
      padding: 0;
      border-radius: 18px;
      position: relative;
      overflow: visible;
    }

    .city-menu-grid .menu-card strong,
    .city-menu-grid .menu-card span {
      display: none;
    }

    .city-menu-grid .menu-card.icon-card,
    .city-menu-grid .menu-card.chat-card,
    .city-menu-grid .menu-card.journey-card {
      min-height: 0;
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .city-menu-grid .menu-card.icon-card,
    .city-menu-grid .menu-card.chat-card {
      display: grid;
      place-items: center;
      overflow: visible;
    }

    .city-menu-grid .menu-card.icon-card img,
    .city-menu-grid .menu-card.chat-card img,
    .city-menu-grid .menu-card.journey-card img {
      display: block;
      width: 100%;
      max-width: none;
      height: auto;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .city-menu-grid .menu-card.icon-card img,
    .city-menu-grid .menu-card.chat-card img {
      aspect-ratio: 1 / 1;
      width: 94%;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, .22));
      transition: transform .18s ease, filter .18s ease;
    }

    .city-menu-grid .menu-card.icon-card:active img,
    .city-menu-grid .menu-card.icon-card:hover img,
    .city-menu-grid .menu-card.chat-card:active img,
    .city-menu-grid .menu-card.chat-card:hover img {
      transform: translateY(-1px) scale(1.02);
      filter:
        drop-shadow(0 10px 18px rgba(0, 0, 0, .28))
        brightness(1.04);
    }

    .city-menu-grid .menu-card.journey-card {
      grid-column: 1 / -1;
      width: 100%;
      justify-self: stretch;
      min-height: 54px;
      align-self: center;
      margin-top: 2px;
    }

    .city-menu-panel .menu-card.icon-card,
    .city-menu-panel .menu-card.chat-card {
      display: none;
    }

    .city-menu-grid .menu-card.journey-card img {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 10px 18px rgba(0, 0, 0, .22));
    }

    .arrival-screen {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background: #080706;
    }

    .arrival-bg {
      position: absolute;
      inset: 0;
      background: center center / cover no-repeat;
      transform: scale(1.02);
    }

    .arrival-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, .12), rgba(0, 0, 0, .56)),
        linear-gradient(90deg, rgba(6, 4, 2, .78) 0%, rgba(10, 7, 5, .36) 52%, rgba(6, 4, 2, .56) 100%);
    }

    .arrival-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .arrival-card {
      width: min(100%, 720px);
      text-align: center;
      padding: clamp(18px, 3vw, 28px);
      border-radius: 24px;
      background: rgba(12, 10, 9, .46);
      border: 1px solid rgba(255, 255, 255, .08);
      backdrop-filter: blur(5px);
      box-shadow: 0 22px 40px rgba(0, 0, 0, .34);
    }

    .arrival-kicker {
      margin: 0 0 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255, 228, 184, .76);
      font-size: 11px;
    }

    .arrival-title {
      margin: 0 0 12px;
      color: #fff6e4;
      font-family: var(--font-main);
      font-size: clamp(30px, 5vw, 54px);
      line-height: .96;
    }

    .arrival-copy {
      margin: 0 0 20px;
      color: rgba(255, 244, 220, .92);
      line-height: 1.62;
      font-size: clamp(14px, 2vw, 18px);
    }

    .arrival-actions {
      display: flex;

<body>
  <div class="screen-page">
    <div class="app-shell" id="app"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="common.js"></script>
  <script>
    let state = loadState();
    tryArriveFromTravel(state);

    function renderChooser(value, helper) {
      return `
        <div class="chooser-row">
          <button class="btn ghost" id="chooserPrevBtn">&lt;</button>
          <div class="chooser-value">${value}</div>
          <button class="btn ghost" id="chooserNextBtn">&gt;</button>
        </div>
        <div class="chooser-helper">${helper}</div>
      `;
    }

    function renderCreatorScreen() {
      q('app').innerHTML = `
        <div class="creator-layout">
          <div class="topbar">
            <div class="topbar-left">
              <h1 class="title">Создание героя</h1>
              <p class="subtitle">Один экран. Один шаг за раз. Без скролла.</p>
            </div>
          </div>

          <div class="panel creator-preview">
            <div class="hero-portrait-bg" id="creatorBg"></div>
            <div class="character-stage">
              <div class="shadow"></div>
              <div class="character-box creator-box" id="creatorPreviewRoot">
                ${characterMarkup()}
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-inner">
              <div class="chooser-label" id="stepLabel"></div>
              <div id="stepArea"></div>
              <div class="error-text" id="nicknameError"></div>
              <div class="wizard-actions">
                <button class="btn ghost" id="backStepBtn">Назад</button>
                <button class="btn primary" id="nextStepBtn">Далее</button>
              </div>
            </div>
          </div>
        </div>
      `;

      const previewRoot = q('creatorPreviewRoot');
      const creatorBg = q('creatorBg');
      const stepLabel = q('stepLabel');
      const stepArea = q('stepArea');
      const nicknameError = q('nicknameError');
      const backStepBtn = q('backStepBtn');
      const nextStepBtn = q('nextStepBtn');

      function paintStep() {
        const step = steps[state.stepIndex];
        stepLabel.textContent = step.label;
        nicknameError.textContent = '';

        if (step.key === 'race') {
          stepArea.innerHTML = renderChooser(getRaceName(state.creator.race), 'Смена расы кнопками < >.');
        }

        if (step.key === 'classId') {
          stepArea.innerHTML = renderChooser(getClassName(state.creator.classId), 'Смена класса кнопками < >.');
        }

        if (step.key === 'gender') {
          stepArea.innerHTML = renderChooser(getGenderName(state.creator.gender), 'Если ассетов нет, остаётся fallback на human male.');
        }

        if (step.key === 'face') {
          stepArea.innerHTML = renderChooser(`Лицо ${state.creator.face}`, 'Лицо рендерится отдельным PNG-слоем.');
        }

        if (step.key === 'nickname') {
          stepArea.innerHTML = `
            <div class="nickname-wrap">
              <input id="nickInput" maxlength="16" placeholder="Введите ник" value="${escapeHtml(state.creator.nickname || '')}">
            </div>
            <div class="chooser-helper">Последний шаг перед прибытием в стартовый город.</div>
          `;

          const input = q('nickInput');
          input.focus();
          input.oninput = () => {
            state.creator.nickname = input.value;
            saveState(state);
            nicknameError.textContent = validateNickname(state, state.creator.nickname);
          };
          nicknameError.textContent = validateNickname(state, state.creator.nickname);
        }

        backStepBtn.disabled = state.stepIndex === 0;
        nextStepBtn.textContent = state.stepIndex === steps.length - 1 ? 'Создать персонажа' : 'Далее';

        if (q('chooserPrevBtn') && q('chooserNextBtn')) {
          const prevBtn = q('chooserPrevBtn');
          const nextBtn = q('chooserNextBtn');
          const currentStep = steps[state.stepIndex];

          if (currentStep.key === 'race') {
            prevBtn.onclick = () => {
              state.creator.race = cycleArray(races, state.creator.race, -1).id;
              saveState(state);
              render();
            };
            nextBtn.onclick = () => {
              state.creator.race = cycleArray(races, state.creator.race, 1).id;
              saveState(state);
              render();
            };
          }

          if (currentStep.key === 'classId') {
            prevBtn.onclick = () => {
              state.creator.classId = cycleArray(classes, state.creator.classId, -1).id;
              saveState(state);
              render();
            };
            nextBtn.onclick = () => {
              state.creator.classId = cycleArray(classes, state.creator.classId, 1).id;
              saveState(state);
              render();
            };
          }

          if (currentStep.key === 'gender') {
            prevBtn.onclick = () => {
              state.creator.gender = cycleArray(genders, state.creator.gender, -1).id;
              saveState(state);
              render();
            };
            nextBtn.onclick = () => {
              state.creator.gender = cycleArray(genders, state.creator.gender, 1).id;
              saveState(state);
              render();
            };
          }

          if (currentStep.key === 'face') {
            prevBtn.onclick = () => {
              state.creator.face = cycleArray(faces, state.creator.face, -1);
              saveState(state);
              render();
            };
            nextBtn.onclick = () => {
              state.creator.face = cycleArray(faces, state.creator.face, 1);
              saveState(state);
              render();
            };
          }
        }
      }

      setCreatorBg(creatorBg, state);
      setPreview(previewRoot, state.creator);
      paintStep();

      backStepBtn.onclick = () => {
        if (state.stepIndex > 0) {
          state.stepIndex -= 1;
          saveState(state);
          render();
        }
      };

      nextStepBtn.onclick = () => {
        if (steps[state.stepIndex].key === 'nickname') {
          const error = validateNickname(state, state.creator.nickname);
          nicknameError.textContent = error;
          if (error) {
            return;
          }
        }

        if (state.stepIndex < steps.length - 1) {
          state.stepIndex += 1;
          saveState(state);
          render();
          return;
        }

        reserveNickname(state.creator.nickname);
        state.hero = buildHero(state);
        state.arrivalPending = true;
        state.stepIndex = 0;
        saveState(state);
        render();
      };
    }

    function renderArrivalScreen() {
      q('app').innerHTML = `
        <div class="panel arrival-screen">
          <div class="arrival-bg" id="arrivalBg"></div>
          <div class="arrival-content">
            <div class="arrival-card">
              <p class="arrival-kicker">Hollow Dominion</p>
              <h1 class="arrival-title">Прибытие</h1>
              <p class="arrival-copy">
                Корабль мягко входит в гавань стартового города. Солёный ветер несёт запах дерева,
                железа и далёких дорог. Новая история начинается с берега.
              </p>
              <div class="arrival-actions">
                <button class="btn primary" id="enterCityBtn">Сойти на берег</button>
              </div>
            </div>
          </div>
        </div>
      `;

      safeSetBackground(
        q('arrivalBg'),
        ['./assets/backgrounds/arrival_ship.jpg'],
        'linear-gradient(180deg, rgba(10,12,18,.08), rgba(10,12,18,.26))'
      );

      q('enterCityBtn').onclick = () => {
        state.arrivalPending = false;
        saveState(state);
        render();
      };
    }

    function hudNumber(value) {
      return Number.isFinite(Number(value)) ? Number(value) : 0;
    }

    function renderProfileHud(hero) {
      const cp = `${hudNumber(hero.cp)} / ${hudNumber(hero.maxCp)}`;
      const hp = `${hudNumber(hero.hp)} / ${hudNumber(hero.maxHp)}`;
      const mp = `${hudNumber(hero.mp)} / ${hudNumber(hero.maxMp)}`;
      const exp = `${hero.xpPercent || '0.00'}%`;

      return `
        <div class="portrait-overlay-ui" aria-label="Панель характеристик">
          <div class="portrait-overlay-head">
            <div class="hud-level-box" aria-label="Уровень персонажа"><span>${hudNumber(hero.level)}</span></div>
            <div class="portrait-nickname">${escapeHtml(hero.nickname)}</div>
          </div>
          <div class="portrait-bars">
            <div class="hud-bar cp"><div class="hud-bar-value cp">${cp}</div></div>
            <div class="hud-bar hp"><div class="hud-bar-value hp">${hp}</div></div>
            <div class="hud-bar mp"><div class="hud-bar-value mp">${mp}</div></div>
            <div class="hud-bar exp"><div class="hud-bar-value exp">${exp}</div></div>
          </div>
        </div>
      `;
    }

    function hudPercent(current, max) {
      if (!Number.isFinite(Number(max)) || Number(max) <= 0) {
        return 0;
      }
      const percent = (hudNumber(current) / hudNumber(max)) * 100;
      return Math.max(0, Math.min(100, percent));
    }

    function renderProfileHud(hero) {
      const cpValue = hudNumber(hero.cp);
      const maxCpValue = hudNumber(hero.maxCp);
      const hpValue = hudNumber(hero.hp);
      const maxHpValue = hudNumber(hero.maxHp);
      const mpValue = hudNumber(hero.mp);
      const maxMpValue = hudNumber(hero.maxMp);
      const expPercent = Math.max(0, Math.min(100, parseFloat(hero.xpPercent || '0') || 0));

      const bars = [
        { key: 'cp', value: `${cpValue} / ${maxCpValue}`, icon: './assets/ui/hud/new/cp.png', fill: `${hudPercent(cpValue, maxCpValue)}%` },
        { key: 'hp', value: `${hpValue} / ${maxHpValue}`, icon: './assets/ui/hud/new/hp.png', fill: `${hudPercent(hpValue, maxHpValue)}%` },
        { key: 'mp', value: `${mpValue} / ${maxMpValue}`, icon: './assets/ui/hud/new/mp.png', fill: `${hudPercent(mpValue, maxMpValue)}%` },
        { key: 'exp', value: `${expPercent.toFixed(2)}%`, icon: './assets/ui/hud/new/exp.png', fill: `${expPercent}%` }
      ];

      return `
        <div class="portrait-overlay-ui" aria-label="Панель характеристик">
          <div class="portrait-overlay-head">
            <div class="hud-level-box" aria-label="Уровень персонажа"><span>${hudNumber(hero.level)}</span></div>
            <div class="portrait-nickname">${escapeHtml(hero.nickname)}</div>
          </div>
          <div class="portrait-bars">
            ${bars.map((bar) => `
              <div class="hud-bar ${bar.key}">
                <div class="hud-bar-icon ${bar.key}">
                  <img src="${bar.icon}" alt="${bar.key.toUpperCase()}">
                </div>
                <div class="hud-bar-track ${bar.key}">
                  <div class="hud-bar-fill ${bar.key}" style="--fill:${bar.fill};"></div>
                  <div class="hud-bar-value ${bar.key}">${bar.value}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderCityScreen() {
      const city = getCurrentCity(state);
      const cityTitle = city.id === 'start_village'
        ? `<div class="city-title-wrap"><div class="city-title-aura"></div><span class="city-spark s1"></span><span class="city-spark s2"></span><span class="city-spark s3"></span><span class="city-spark s4"></span><span class="city-spark s5"></span><span class="city-spark s6"></span><img class="city-title-sprite" src="./assets/ui/city_title_gludio.png" alt="Gludio"></div>`
        : `<h1 class="title">${city.name}</h1>`;

      q('app').innerHTML = `
        <div class="city-screen">
          <div class="panel city-titlebar">
            ${cityTitle}
          </div>

          <div class="city-home-layout">
            <div class="panel city-portrait-card">
              <div class="hero-portrait-bg" id="portraitBg"></div>
              <div class="city-portrait-atmosphere" aria-hidden="true">
                <span class="city-portrait-mist m1"></span>
                <span class="city-portrait-mist m2"></span>
                <span class="city-portrait-spark s1"></span>
                <span class="city-portrait-spark s2"></span>
                <span class="city-portrait-spark s3"></span>
                <span class="city-portrait-spark s4"></span>
              </div>
              ${renderProfileHud(state.hero)}
              <div class="character-stage">
                <div class="shadow"></div>
                <div class="character-box" id="profilePreviewRoot">
                  ${characterMarkup()}
                </div>
              </div>
              <div class="frame-menu-grid">
                <a class="menu-card icon-card" href="inventory.html" aria-label="Инвентарь">
                  <img src="./assets/ui/menu/bag.png" alt="Инвентарь">
                </a>
                <a class="menu-card icon-card" href="index.html" aria-label="Профиль">
                  <img src="./assets/ui/menu/profile.png" alt="Профиль">
                </a>
                <a class="menu-card icon-card" href="status.html" aria-label="Статус">
                  <img src="./assets/ui/menu/status.png" alt="Статус">
                </a>
                <a class="menu-card icon-card" href="clan.html" aria-label="Клан">
                  <img src="./assets/ui/menu/clan.png" alt="Клан">
                </a>
                <a class="menu-card icon-card" href="map.html" aria-label="Карта">
                  <img src="./assets/ui/menu/map.png" alt="Карта">
                </a>
                <a class="menu-card chat-card" href="chat.html" aria-label="Чат">
                  <img src="./assets/ui/menu/chat.png" alt="Чат">
                </a>
              </div>
              <div class="city-portrait-frame" aria-hidden="true">
                <img src="./assets/ui/frames/profile_frame.png" alt="">
              </div>
              <div class="portrait-footer">
                <div class="profile-name">${escapeHtml(state.hero.nickname)}</div>
              </div>
            </div>

            <div class="panel city-menu-panel">
              <div class="panel-inner city-menu-grid">
                <a class="menu-card icon-card" href="inventory.html" aria-label="Инвентарь">
                  <img src="./assets/ui/menu/bag.png" alt="Инвентарь">
                </a>
                <a class="menu-card icon-card" href="index.html" aria-label="Профиль">
                  <img src="./assets/ui/menu/profile.png" alt="Профиль">
                </a>
                <a class="menu-card icon-card" href="status.html" aria-label="Статус">
                  <img src="./assets/ui/menu/status.png" alt="Статус">
                </a>
                <a class="menu-card icon-card" href="clan.html" aria-label="Клан">
