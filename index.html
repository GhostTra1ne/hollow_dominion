<!doctype html>
<html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Hollow Dominion</title><link rel="stylesheet" href="common.css"><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body>
<main class="app-shell" id="app"></main>
<script src="common.js"></script><script>
const steps=[{key:'race',label:'Раса'},{key:'classId',label:'Класс'},{key:'gender',label:'Пол'},{key:'face',label:'Лицо'},{key:'nickname',label:'Никнейм'}];
let stepIndex=0;
if(new URLSearchParams(location.search).get('reset')==='1'){ state.hero=null; saveState(); }
function renderChooser(label,value,helper){
  return `<div class="panel"><div class="panel-inner" style="display:grid;gap:10px;">
    <div class="subtitle">${label}</div>
    <div class="chooser-row"><button class="btn" id="prevBtn">&lt;</button><div class="chooser-value">${label}: ${value}</div><button class="btn" id="nextBtn">&gt;</button></div>
    <div class="subtitle">${helper}</div><div class="error-text" id="creatorError"></div>
    <div class="wizard-actions"><button class="btn ghost" id="backStep">Назад</button><button class="btn primary" id="nextStep">${stepIndex===steps.length-1?'Создать героя':'Далее'}</button></div>
  </div></div>`;
}
function renderCreator(){
  const step=steps[stepIndex];
  byId('app').innerHTML=`<section class="creator-layout"><header><h1 class="title">Создание героя</h1><p class="subtitle">Один экран. Один шаг за раз.</p></header><div class="preview-shell"><div class="portrait-bg" id="creatorBg"></div><div class="character-zone"><div class="shadow"></div><div class="character-box" id="creatorChar"><img data-slot="legL" class="character-layer" alt=""><img data-slot="legR" class="character-layer" alt=""><img data-slot="armorLegL" class="character-layer" alt=""><img data-slot="armorLegR" class="character-layer" alt=""><div class="upper-body"><div class="arm-back-group"><img data-slot="armL" class="character-layer" alt=""><img data-slot="armorArmL" class="character-layer" alt=""></div><div class="head-group"><img data-slot="headBase" class="character-layer" alt=""><img data-slot="face" class="character-layer" alt=""></div><img data-slot="torso" class="character-layer" alt=""><img data-slot="armorTorso" class="character-layer" alt=""><div class="arm-front-group"><img data-slot="armR" class="character-layer" alt=""><img data-slot="armorArmR" class="character-layer" alt=""><img data-slot="weapon" class="character-layer" alt=""></div></div><img data-slot="pelvis" class="character-layer" alt=""><img data-slot="armorPelvis" class="character-layer" alt=""></div></div></div><div id="stepBox"></div></section>`;
  setBgWithFallback(byId('creatorBg'), ['./assets/backgrounds/create_bg.jpg']);
  setCharacterPreview(byId('creatorChar'), state.creator);
  if(step.key==='race') byId('stepBox').innerHTML=renderChooser('Раса',getRaceName(state.creator.race),'Листай вариант кнопками и жми «Далее».');
  if(step.key==='classId') byId('stepBox').innerHTML=renderChooser('Класс',getClassName(state.creator.classId),'Класс влияет на будущий визуал героя.');
  if(step.key==='gender') byId('stepBox').innerHTML=renderChooser('Пол',getGenderName(state.creator.gender),'Пока fallback допустим, если ассетов нет.');
  if(step.key==='face') byId('stepBox').innerHTML=renderChooser('Лицо',state.creator.face,'Лицо накладывается отдельным PNG-слоем.');
  if(step.key==='nickname'){
    byId('stepBox').innerHTML=`<div class="panel"><div class="panel-inner" style="display:grid;gap:10px;"><div class="subtitle">Никнейм</div><input class="input" id="nicknameInput" maxlength="16" placeholder="Введите ник" value="${escapeHtml(state.creator.nickname||'')}"><div class="error-text" id="creatorError"></div><div class="wizard-actions"><button class="btn ghost" id="backStep">Назад</button><button class="btn primary" id="nextStep">Создать героя</button></div></div></div>`;
    const input=byId('nicknameInput');
    input.oninput=()=>{ state.creator.nickname=input.value; saveState(); byId('creatorError').textContent=validateNickname(input.value); };
    byId('creatorError').textContent=validateNickname(state.creator.nickname);
  }
  if(byId('prevBtn')) byId('prevBtn').onclick=()=>{ if(step.key==='race') state.creator.race=cycleArray(races,state.creator.race,-1).id; if(step.key==='classId') state.creator.classId=cycleArray(classes,state.creator.classId,-1).id; if(step.key==='gender') state.creator.gender=cycleArray(genders,state.creator.gender,-1).id; if(step.key==='face') state.creator.face=cycleArray(faces,state.creator.face,-1); saveState(); renderCreator(); };
  if(byId('nextBtn')) byId('nextBtn').onclick=()=>{ if(step.key==='race') state.creator.race=cycleArray(races,state.creator.race,1).id; if(step.key==='classId') state.creator.classId=cycleArray(classes,state.creator.classId,1).id; if(step.key==='gender') state.creator.gender=cycleArray(genders,state.creator.gender,1).id; if(step.key==='face') state.creator.face=cycleArray(faces,state.creator.face,1); saveState(); renderCreator(); };
  byId('backStep').onclick=()=>{ if(stepIndex>0){ stepIndex-=1; renderCreator(); } };
  byId('nextStep').onclick=()=>{ if(step.key==='nickname'){ const err=validateNickname(state.creator.nickname); byId('creatorError').textContent=err; if(err) return; reserveNickname(state.creator.nickname); state.hero=buildHero(); state.currentCity=DEFAULT_CITY; saveState(); location.href='profile.html'; return; } stepIndex+=1; renderCreator(); };
}
if(!state.hero) renderCreator(); else location.href='profile.html';
</script></body></html>
