  <style>
    .inventory-screen {
      display: grid;
      gap: 14px;
      min-height: 0;
    }

    .inventory-topline {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .inventory-chip {
      padding: 12px 14px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .05), rgba(255, 255, 255, .02)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .10), rgba(214, 178, 116, 0) 60%);
      border: 1px solid rgba(255, 255, 255, .06);
      display: grid;
      gap: 4px;
    }

    .inventory-chip span {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .inventory-chip strong {
      color: #f6e5ba;
      font-family: var(--font-main);
      font-size: 24px;
      line-height: 1;
    }

    .inventory-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(300px, .92fr);
      gap: 14px;
      min-height: 0;
    }

    .inventory-column {
      display: grid;
      gap: 14px;
      min-height: 0;
    }

    .inventory-card {
      padding: 16px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .07), rgba(214, 178, 116, 0) 56%);
      border: 1px solid rgba(255, 255, 255, .06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .03);
      min-height: 0;
    }

    .inventory-card h3 {
      margin: 0 0 6px;
      color: #f2d9a0;
      font-family: var(--font-main);
      font-size: 28px;
      line-height: 1;
    }

    .inventory-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .gear-stage {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 164px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .gear-silhouette {
      position: relative;
      min-height: 284px;
      border-radius: 22px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(213, 181, 119, .14), rgba(213, 181, 119, 0) 40%),
        linear-gradient(180deg, rgba(17, 19, 29, .98), rgba(11, 13, 20, .98));
      border: 1px solid rgba(214, 178, 116, .12);
    }

    .gear-silhouette::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 18px;
      border: 1px solid rgba(214, 178, 116, .10);
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 242, 206, .06), rgba(255, 242, 206, 0) 28%),
        linear-gradient(180deg, rgba(255, 255, 255, .02), rgba(255, 255, 255, 0));
    }

    .gear-figure {
      position: absolute;
      inset: 18px 22px 54px;
      opacity: .72;
      background:
        radial-gradient(circle at 50% 12%, rgba(245, 228, 189, .58) 0 18px, transparent 19px),
        linear-gradient(180deg, transparent 0 24px, rgba(245, 228, 189, .18) 24px 108px, transparent 108px),

      inset: auto 24px 18px;

      border-radius: 16px;
      background: rgba(214, 178, 116, .08);
      border: 1px solid rgba(214, 178, 116, .12);
      text-align: center;
      color: #f4e2bc;
      font-size: 12px;
      line-height: 1.45;
    }

      gap: 10px;
      align-content: start;
    }

    .gear-slot {

      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(255, 255, 255, .06);

    .gear-icon {

      height: 54px;

      display: grid;
      gap: 4px;
    }

      font-size: 15px;
    }

    .gear-copy span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .gear-state {
      white-space: nowrap;
      padding: 8px 10px;
      border-radius: 999px;
      color: #f8e1aa;
      background: rgba(214, 178, 116, .10);
      border: 1px solid rgba(214, 178, 116, .14);
      font-size: 12px;
      font-weight: 700;
    }

    .bag-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .bag-slot {
      display: grid;
      gap: 8px;
      padding: 14px;
      min-height: 108px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .015)),
        radial-gradient(circle at 50% 0%, rgba(123, 167, 230, .08), rgba(123, 167, 230, 0) 62%);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .bag-slot.top-empty {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .02), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .04), rgba(214, 178, 116, 0) 62%);
      border-style: dashed;
    }

    .bag-slot strong {
      color: #f1d59a;
      font-size: 14px;
    }

    .bag-slot p {
      margin: 0;
      color: #f5efdf;
      font-size: 14px;
      line-height: 1.45;
    }

    .bag-meta {
      margin-top: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bag-meta span {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .inventory-notes {
      display: grid;
      gap: 10px;
    }

    .inventory-note {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(255, 255, 255, .06);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .inventory-note strong {
      display: block;
      margin-bottom: 5px;
      color: #f5dfaa;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .inventory-topline,
      .inventory-layout,
      .gear-stage,
      .bag-grid {
        grid-template-columns: 1fr;
      }

      .gear-silhouette {
        min-height: 220px;
      }
    }

    @media (max-width: 560px) {
      .inventory-card {
        padding: 14px;
      }

      .inventory-card h3 {
        font-size: 24px;
      }

      .gear-slot {
        grid-template-columns: 46px minmax(0, 1fr);
      }

      .gear-state {
        grid-column: 1 / -1;
        justify-self: start;
      }

      .gear-icon {
        width: 46px;
        height: 46px;
        font-size: 18px;
      }
    }
  </style>
