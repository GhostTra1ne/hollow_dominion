          debugGridTop.innerHTML = Array.from({ length: 12 }, (_, index) => `<span>${index + 1}</span>`).join('');
        }

        if (!debugGridSide) return;

        const rowStep = 40;

        debugGridSide.innerHTML = Array.from({ length: totalRows }, (_, index) => {
          const top = (index + 1) * rowStep;
          return `<span style="top:${top}px">${index + 1}</span>`;
        }).join('');

      function syncDebugGridButton() {
        const active = screenPage?.classList.contains('debug-grid');
        if (!gridToggleBtn) return;
        gridToggleBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
        gridToggleBtn.textContent = active ? 'GRID ON' : 'GRID';

      return Math.max(0, Math.min(100, percent));

        { key: 'hp', value: `${hpValue} / ${maxHpValue}`, icon: './assets/ui/hud/new/hp.png', fill: `${hudPercent(hpValue, maxHpValue)}%` },
        { key: 'mp', value: `${mpValue} / ${maxMpValue}`, icon: './assets/ui/hud/new/mp.png', fill: `${hudPercent(mpValue, maxMpValue)}%` },
        { key: 'exp', value: `${expPercent.toFixed(2)}%`, icon: './assets/ui/hud/new/exp.png', fill: `${expPercent}%` }
      ];

      return `
        <div class="portrait-overlay-ui" aria-label="РџР°РЅРµР»СЊ С…Р°СЂР°РєС‚РµСЂРёСЃС‚РёРє">
          <div class="portrait-overlay-head">
            <div class="hud-level-box" aria-label="РЈСЂРѕРІРµРЅСЊ РїРµСЂСЃРѕРЅР°Р¶Р°"><span>${hudNumber(hero.level)}</span></div>
            <div class="portrait-nickname">${escapeHtml(hero.nickname)}</div>
          </div>
          <div class="portrait-bars">
            ${bars.map((bar) => `
              <div class="hud-bar ${bar.key}">
                <div class="hud-bar-icon ${bar.key}">
                  <img src="${bar.icon}" alt="${bar.key.toUpperCase()}">
                </div>
                <div class="hud-bar-track ${bar.key}">
                  <div class="hud-bar-fill ${bar.key}" style="--fill:${bar.fill};"></div>
                  <div class="hud-bar-value ${bar.key}">${bar.value}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderCityScreen() {
      const city = getCurrentCity(state);
      const cityTitle = city.id === 'start_village'
        ? `<div class="city-title-plaque"><img class="city-title-art" src="./assets/ui/city_title_gludin_text.png" alt="Р“Р»СѓРґРёРЅ"></div>`
        : `<h1 class="title">${city.name}</h1>`;

      q('app').innerHTML = `
        <div class="single-page-layout city-profile-shell">
          <div class="city-screen">
            <div class="panel city-titlebar">
              ${cityTitle}
            </div>

            <div class="city-home-layout">
              <div class="panel city-portrait-card">
                <div class="hero-portrait-bg" id="portraitBg"></div>
                <div class="city-portrait-atmosphere" aria-hidden="true">
                  <span class="city-portrait-mist m1"></span>
                  <span class="city-portrait-mist m2"></span>
                  <span class="city-portrait-spark s1"></span>
                  <span class="city-portrait-spark s2"></span>
                  <span class="city-portrait-spark s3"></span>
                  <span class="city-portrait-spark s4"></span>
                </div>
                ${renderProfileHud(state.hero)}
                <div class="character-stage">
                  <div class="shadow"></div>
                  <div class="character-box" id="profilePreviewRoot">
                    ${characterMarkup()}
                  </div>
                </div>
                <div class="city-portrait-frame" aria-hidden="true">
                  <img src="./assets/ui/frames/profile_frame.png" alt="">
                </div>
                <div class="portrait-footer">
                  <div class="profile-name">${escapeHtml(state.hero.nickname)}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        ${renderBottomNav('profile')}
      `;

      applyPortrait(state);
    }

    function render() {
      if (state.hero) {
        if (state.arrivalPending) {
          renderArrivalScreen();
        } else {
          renderCityScreen();
        }
        return;
      }

      renderCreatorScreen();
    }

    render();
  </script>
</body>
</html>
