<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta http-equiv=""Cache-Control"" content=""no-cache, no-store, must-revalidate"">
  <meta http-equiv=""Pragma"" content=""no-cache"">
  <meta http-equiv=""Expires"" content=""0"">
  <script>
    (function () {
      const APP_VERSION = '20260421-telegram-7';
      const url = new URL(window.location.href);
      if (url.searchParams.get('appv') !== APP_VERSION) {
        url.searchParams.set('appv', APP_VERSION);
        window.location.replace(url.toString());
      }
      window.__HD_APP_VERSION__ = APP_VERSION;
    })();
  </script>  <title>Статус</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css?v=20260421-telegram-7">
  <style>
    .legacy-block {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .legacy-lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .legacy-rules {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .legacy-rule {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .legacy-rule span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .legacy-rule b {
      color: #f6e7c3;
      font-size: 14px;
      line-height: 1.4;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .skill-card {
      overflow: hidden;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .skill-art {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: radial-gradient(circle at center, rgba(77, 130, 214, 0.28), rgba(11, 14, 22, 0.96));
    }

    .skill-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .skill-copy {
      padding: 12px;
      display: grid;
      gap: 6px;
    }

    .skill-copy h4 {
      margin: 0;
      color: #f1d59a;
      font-family: var(--font-main);
      font-size: 19px;
    }

    .skill-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .skill-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      color: #d9e7ff;
    }

    .status-section-title {
      margin: 0 0 8px;
      color: #f1d59a;
      font-family: var(--font-main);
      font-size: 24px;
    }

    @media (max-width: 900px) {
      .legacy-rules,
      .skills-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="screen-page">
    <div class="app-shell" id="app"></div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="modal-backdrop" id="confirmModal">
    <div class="modal-card">
      <h3>Удалить персонажа?</h3>
      <p>Это действие вернёт тебя к созданию персонажа.</p>
      <div class="modal-actions">
        <button class="btn ghost" id="cancelDeleteBtn">Отмена</button>
        <button class="btn danger" id="confirmDeleteBtn">Удалить</button>
      </div>
    </div>
  </div>

  <script src="common.js?v=20260421-telegram-7"></script>
  <script>
    let state = loadState();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    const hero = state.hero;
    const hpPct = Math.max(0, Math.min(100, Math.round(hero.hp / hero.maxHp * 100)));
    const mpPct = Math.max(0, Math.min(100, Math.round(hero.mp / hero.maxMp * 100)));
    const cpPct = Math.max(0, Math.min(100, Math.round(hero.cp / hero.maxCp * 100)));
    const xpPct = Math.max(0, Math.min(100, parseFloat(hero.xpPercent) || 0));

    const legacyProfiles = {
      warrior: {
        title: 'Боевой архетип воина',
        lead: 'Воин продавливает бой через P. Atk., криты и плотный размен по зонам. Это хорошая основа для тяжёлого front-line в Hollow Dominion.',
        rules: [
          {label: 'Источник урона', value: 'P. Atk. + шанс крита'},
          {label: 'Зоны удара', value: 'Голова / корпус / ноги'},
          {label: 'Защита', value: 'Блок по одной зоне на размен'},
          {label: 'Темп боя', value: 'Высокий урон, ниже каст, выше давление'}
        ],
        skills: [
          {name: 'Force Blaster', icon: './assets/skills/legacy/force_blaster.jpg', cost: 'MP 22', type: 'Импульс', text: 'Мощный завершающий удар для короткой PvE или PvP стычки.'},
          {name: 'Self Heal', icon: './assets/skills/legacy/self_heal.jpg', cost: 'MP 12', type: 'Выживание', text: 'Локальное восстановление, чтобы дожить до следующего размена.'},
          {name: 'Battle Heal', icon: './assets/skills/legacy/battle_heal.jpg', cost: 'MP 18', type: 'Поддержка', text: 'Быстрый отхил без выхода из темпа боя.'}
        ]
      },
      mage: {
        title: 'Боевой архетип мага',
        lead: 'Маг строит бой через M. Atk., расход маны и темп каста. Это база для дистанции, burst-урона и контроля ресурса.',
        rules: [
          {label: 'Источник урона', value: 'M. Atk. + скорость каста'},
          {label: 'Зоны удара', value: 'Голова / корпус / ноги'},
          {label: 'Цена скилла', value: 'MP, иногда с риском по HP'},
          {label: 'Темп боя', value: 'Меньше HP, больше burst и utility'}
        ],
        skills: [
          {name: 'Magic Attack', icon: './assets/skills/legacy/magic_attack.jpg', cost: 'MP 20', type: 'Burst', text: 'Базовый магический выстрел для открытия или добивания.'},
          {name: 'Greater Battle Heal', icon: './assets/skills/legacy/greater_battle_heal.jpg', cost: 'MP 34', type: 'Исцеление', text: 'Сильное восстановление после тяжёлого размена.'},
          {name: 'Battle Heal', icon: './assets/skills/legacy/battle_heal.jpg', cost: 'MP 18', type: 'Поддержка', text: 'Быстрый heal для удержания дистанции и темпа.'}
        ]
      }
    };

    const legacyProfile = legacyProfiles[hero.classId] || legacyProfiles.warrior;
    const combatRulesMarkup = legacyProfile.rules.map((rule) => `
      <div class="legacy-rule">
        <span>${rule.label}</span>
        <b>${rule.value}</b>
      </div>
    `).join('');

    const skillsMarkup = legacyProfile.skills.map((skill) => `
      <article class="skill-card">
        <div class="skill-art"><img src="${skill.icon}" alt="${skill.name}"></div>
        <div class="skill-copy">
          <h4>${skill.name}</h4>
          <div class="skill-meta"><span>${skill.type}</span><span>${skill.cost}</span></div>
          <p>${skill.text}</p>
        </div>
      </article>
    `).join('');

    q('app').innerHTML = `
      ${renderHeader(state, 'Полный MMORPG-style статус героя, боевые параметры и legacy-база под будущие механики.')}
      <div class="single-page-layout">
        <div class="panel page-main-panel">
          <div class="panel-inner content-scroll">
            <div class="bars">
              <div class="bar-row">
                <div>CP</div>
                <div class="bar-track"><div class="bar-fill" style="width:${cpPct}%;background:linear-gradient(90deg,#8d6a10,#f0c431)"></div></div>
                <div>${hero.cp}/${hero.maxCp}</div>
              </div>
              <div class="bar-row">
                <div>HP</div>
                <div class="bar-track"><div class="bar-fill" style="width:${hpPct}%"></div></div>
                <div>${hero.hp}/${hero.maxHp}</div>
              </div>
              <div class="bar-row">
                <div>MP</div>
                <div class="bar-track"><div class="bar-fill mp" style="width:${mpPct}%"></div></div>
                <div>${hero.mp}/${hero.maxMp}</div>
              </div>
              <div class="bar-row">
                <div>XP</div>
                <div class="bar-track"><div class="bar-fill" style="width:${xpPct}%;background:linear-gradient(90deg,#6f737a,#c7ccd2)"></div></div>
                <div>${hero.xpPercent}%</div>
              </div>
            </div>

            <div class="status-columns">
              <div class="status-card">
                <h4>Combat</h4>
                <div class="status-list">
                  <div><span>P. Atk.</span><b>${hero.pAtk}</b></div>
                  <div><span>P. Def.</span><b>${hero.pDef}</b></div>
                  <div><span>Accuracy</span><b>${hero.accuracy}</b></div>
                  <div><span>Evasion</span><b>${hero.evasion}</b></div>
                  <div><span>Critical</span><b>${hero.critical}</b></div>
                  <div><span>Atk. Spd.</span><b>${hero.atkSpd}</b></div>
                  <div><span>Speed</span><b>${hero.speed}</b></div>
                </div>
              </div>
              <div class="status-card">
                <h4>Magic & Stats</h4>
                <div class="status-list">
                  <div><span>M. Atk.</span><b>${hero.mAtk}</b></div>
                  <div><span>M. Def.</span><b>${hero.mDef}</b></div>
                  <div><span>M. Accuracy</span><b>${hero.mAccuracy}</b></div>
                  <div><span>M. Evasion</span><b>${hero.mEvasion}</b></div>
                  <div><span>Casting Spd.</span><b>${hero.castSpd}</b></div>
                  <div><span>STR / DEX / CON</span><b>${hero.str} / ${hero.dex} / ${hero.con}</b></div>
                  <div><span>INT / WIT / MEN</span><b>${hero.int} / ${hero.wit} / ${hero.men}</b></div>
                </div>
              </div>
            </div>

            <div class="legacy-block">
              <div class="feature-card">
                <h3 class="status-section-title">${legacyProfile.title}</h3>
                <p class="legacy-lead">${legacyProfile.lead}</p>
                <div class="legacy-rules">${combatRulesMarkup}</div>
              </div>

              <div class="feature-card">
                <h3 class="status-section-title">Legacy skills</h3>
                <p class="legacy-lead">Иконки и названия взяты из старого L2-архива. Это уже можно использовать как фундамент для будущей боевой панели, книги умений и PvE-боёв.</p>
                <div class="skills-grid">${skillsMarkup}</div>
              </div>

              <div class="feature-card">
                <h3 class="status-section-title">Что переносим дальше</h3>
                <p class="legacy-lead">Дальше сюда логично перенести уже реальную систему статов, пассивок, активных скиллов, экипировки, клановых бонусов и PvP/PvE истории.</p>
              </div>

              <div class="feature-card">
                <h3 class="status-section-title">Сброс героя</h3>
                <button class="btn danger" id="deleteBtn">Удалить персонажа и начать заново</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      ${renderBottomNav('status')}
    `;

    q('deleteBtn').onclick = () => q('confirmModal').classList.add('show');
    q('cancelDeleteBtn').onclick = () => q('confirmModal').classList.remove('show');
    q('confirmDeleteBtn').onclick = () => {
      releaseNickname(state.hero.nickname);
      localStorage.removeItem(STORAGE_STATE);
      location.href = 'index.html';
    };
  </script>
</body>
</html>
