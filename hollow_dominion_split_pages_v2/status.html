<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"><title>Статус</title><link rel="stylesheet" href="common.css"><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body>
<main class="app-shell"><header class="back-row"><a class="btn ghost" href="profile.html">← Назад</a><h1 class="title">Статус</h1><span></span></header><section class="city-layout"><div id="leftProfile"></div><div class="page-content"><div class="panel"><div class="panel-inner status-grid" id="statusRoot"></div></div></div></section><footer class="footer-action"><button class="btn danger" id="deleteHeroBtn">Удалить персонажа</button></footer></main><div class="modal" id="deleteModal"><div class="modal-card"><h3>Удалить персонажа?</h3><p>Это действие сбросит текущего героя и вернёт тебя к экрану создания.</p><div class="wizard-actions"><button class="btn ghost" id="cancelDeleteBtn">Отмена</button><button class="btn danger" id="confirmDeleteBtn">Удалить</button></div></div></div>
<script src="common.js"></script><script>if(!state.hero) location.href='index.html'; renderPortraitCard('leftProfile'); const h=state.hero; const bars=[['HP',h.hp,h.maxHp],['MP',h.mp,h.maxMp],['CP',h.cp,h.maxCp],['XP',0,100]].map(([label,val,max])=>`<div class="bar"><div class="bar-top"><span>${label}</span><span>${val} / ${max}</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(0,Math.min(100,(val/max)*100))}%"></div></div></div>`).join(''); byId('statusRoot').innerHTML=`<div class="stat-box"><h3>${escapeHtml(h.nickname)}</h3><p>Уровень 1 • ${getClassName(h.classId)} • ${getRaceName(h.race)}</p><div class="stat-bars">${bars}</div></div><div class="items-grid"><div class="stat-box"><h3>Combat</h3><p>P. Atk: ${h.pAtk}</p><p>M. Atk: ${h.mAtk}</p><p>P. Def: ${h.pDef}</p><p>M. Def: ${h.mDef}</p><p>Accuracy: ${h.accuracy}</p><p>Evasion: ${h.evasion}</p><p>Crit: ${h.crit}</p></div><div class="stat-box"><h3>Stats</h3><p>STR: ${h.str}</p><p>DEX: ${h.dex}</p><p>INT: ${h.int}</p><p>CON: ${h.con}</p><p>WIT: ${h.wit}</p><p>MEN: ${h.men}</p><p>Speed: ${h.speed}</p></div></div><div class="notice">Статус вынесен на отдельную страницу, чтобы дальше можно было спокойно шлифовать интерфейс.</div>`; bindDeleteCharacter('deleteHeroBtn','deleteModal','confirmDeleteBtn','cancelDeleteBtn');</script></body></html>
