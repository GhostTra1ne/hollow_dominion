<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"><title>Чат</title><link rel="stylesheet" href="common.css"><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body>
<main class="app-shell"><header class="back-row"><a class="btn ghost" href="profile.html">← Назад</a><h1 class="title">Общий чат</h1><span></span></header><section class="city-layout"><div id="leftProfile"></div><div class="page-content"><div class="panel"><div class="panel-inner" style="display:grid;grid-template-rows:minmax(0,1fr) auto;gap:12px;height:100%;"><div class="chat-list" id="chatList" style="overflow:auto"></div><div style="display:grid;grid-template-columns:1fr auto;gap:10px;"><input class="input" id="chatInput" placeholder="Напиши сообщение..."><button class="btn primary" id="sendChatBtn">Отправить</button></div></div></div></div></section><footer class="bottom-nav"><a class="btn ghost" href="inventory.html">Инвентарь</a><a class="btn ghost" href="profile.html">Профиль</a><a class="btn ghost" href="status.html">Статус</a><a class="btn ghost" href="clan.html">Клан</a><a class="btn ghost" href="map.html">Карта</a><a class="btn ghost" href="chat.html">Чат</a></footer></main>
<script src="common.js"></script><script>if(!state.hero) location.href='index.html'; renderPortraitCard('leftProfile'); function renderChat(){ byId('chatList').innerHTML=state.chat.map(m=>`<div class="chat-msg"><b>${escapeHtml(m.from)}</b><p>${escapeHtml(m.text)}</p></div>`).join(''); } renderChat(); byId('sendChatBtn').onclick=()=>{ const v=byId('chatInput').value.trim(); if(!v) return; state.chat.push({from:state.hero.nickname,text:v}); saveState(); byId('chatInput').value=''; renderChat(); };</script></body></html>
