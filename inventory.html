  <script>
    (async () => {
    let state = await window.HD_BOOTSTRAP_APP_STATE();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    let inventory = Array.isArray(state.hero.inventory) ? state.hero.inventory : [];

    function normalizeText(value) {
      return String(value || '').toLowerCase();
    }

    const EQUIP_SLOTS = [
      { id: 'head', family: 'head', label: 'Шлем', emptyIcon: 'golova' },
      { id: 'necklace', family: 'necklace', label: 'Ожерелье', emptyIcon: 'amulet' },
      { id: 'body', family: 'body', label: 'Тело', emptyIcon: 'body' },
      { id: 'earring1', family: 'earring', label: 'Серьга I', emptyIcon: 'poyas' },
      { id: 'legs', family: 'legs', label: 'Низ', emptyIcon: 'plash' },
      { id: 'earring2', family: 'earring', label: 'Серьга II', emptyIcon: 'serga2' },
      { id: 'gloves', family: 'gloves', label: 'Перчатки', emptyIcon: 'ruki' },
      { id: 'ring1', family: 'ring', label: 'Кольцо I', emptyIcon: 'kolco' },
      { id: 'boots', family: 'boots', label: 'Ботинки', emptyIcon: 'nogi' },
      { id: 'ring2', family: 'ring', label: 'Кольцо II', emptyIcon: 'kolco2' },
      { id: 'weapon', family: 'weapon', label: 'Меч', emptyIcon: 'weapon' },
      { id: 'shield', family: 'shield', label: 'Щит', emptyIcon: 'shit' }
    ];

    const SLOT_MAP = Object.fromEntries(EQUIP_SLOTS.map((slot) => [slot.id, slot]));

    const ITEM_LIBRARY = window.HD_ITEM_CATALOG || {};
    const SET_LIBRARY = window.HD_SET_LIBRARY || {};

    const STAT_LABELS = {
      patt: 'P.Atk',
      matt: 'M.Atk',
      pdef: 'P.Def',
      mdef: 'M.Def',
      critical: 'Crit'
    };

    function isEquipped(entry) {
      return Boolean(entry.equipSlot) || normalizeText(entry.type).includes('над');
    }

    function isEmptyItem(entry) {
      return normalizeText(entry.item).trim() === 'пусто';
    }

    function parseStackedItem(entry) {
      const match = String(entry.item || '').match(/^\s*(\d+)\s*x\s*(.+?)\s*$/i);
      if (!match) return null;
      return {
        count: Number(match[1]),
        baseName: match[2]
      };
    }

    function getBaseItemName(entry) {
      const stack = parseStackedItem(entry);
      return String(stack ? stack.baseName : entry.item || '').trim();
    }

    function rebuildStackedItemName(entry, nextBaseName) {
      const stack = parseStackedItem(entry);
      return stack ? `${stack.count} x ${nextBaseName}` : nextBaseName;
    }

    function inferFamilyFromEntry(entry) {
      const text = normalizeText(`${entry.slot || ''} ${getBaseItemName(entry)}`);
      if (text.includes('оруж') || text.includes('меч') || text.includes('club') || text.includes('weapon')) return 'weapon';
      if (text.includes('шлем') || text.includes('голов') || text.includes('helmet')) return 'head';
      if (text.includes('брон') || text.includes('доспех') || text.includes('armor') || text.includes('robe')) return 'body';
      if (text.includes('низ') || text.includes('понож') || text.includes('штаны') || text.includes('legs')) return 'legs';
      if (text.includes('перчат') || text.includes('gloves') || text.includes('рук')) return 'gloves';
      if (text.includes('ботин') || text.includes('сап') || text.includes('boots') || text.includes('ноги')) return 'boots';
      if (text.includes('щит') || text.includes('shield') || text.includes('shit')) return 'shield';
      if (text.includes('ожер') || text.includes('амул') || text.includes('necklace')) return 'necklace';
      if (text.includes('серьг') || text.includes('earring')) return 'earring';
      if (text.includes('коль') || text.includes('ring')) return 'ring';
      return null;
    }

    function getItemBlueprint(entry) {
      const baseName = getBaseItemName(entry);
      if (typeof window.HD_RESOLVE_ITEM_BLUEPRINT === 'function') {
        return window.HD_RESOLVE_ITEM_BLUEPRINT(baseName);
      }
      return ITEM_LIBRARY[normalizeText(baseName)] || null;
    }

    function renderInventoryIcon(path) {
      if (!path) return '';
      const fallback = path.includes('/presets/') && /\.png$/i.test(path)
        ? path.replace(/\.png$/i, '.bmp')
        : '';
      const onerror = fallback
        ? ` onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='${fallback}';}else{this.style.display='none';}"`
        : ` onerror="this.style.display='none';"`;
      return `<img class="legacy-empty-icon" src="${path}" alt=""${onerror}>`;
    }

    function getPrimaryEquipSlotId(family) {
      return {
        weapon: 'weapon',
        head: 'head',
        body: 'body',
        legs: 'legs',
        gloves: 'gloves',
        boots: 'boots',
        shield: 'shield',
        necklace: 'necklace',
        ring: 'ring1',
        earring: 'earring1'
      }[family] || null;
    }

    function getBagSlotLabel(family) {
      return {
        weapon: 'Оружие',
        head: 'Шлем',
        body: 'Броня',
        legs: 'Низ',
        gloves: 'Перчатки',
        boots: 'Ботинки',
        shield: 'Щит',
        necklace: 'Ожерелье',
        ring: 'Кольцо',
        earring: 'Серьга'
      }[family] || 'Экипировка';
    }

    function getEntryMeta(entry) {
      const blueprint = getItemBlueprint(entry);
      const family = entry.equipFamily || blueprint?.family || inferFamilyFromEntry(entry);
      return {
        family,
        stats: entry.stats || blueprint?.stats || {},
        setKey: entry.setKey || blueprint?.setKey || null,
        setPart: entry.setPart || blueprint?.setPart || family || null
      };
    }

    function normalizeInventorySchema(entries) {
      let changed = false;
      let ringIndex = 0;
      let earringIndex = 0;
      const seed = Date.now().toString(36);

      const normalized = entries.map((raw, index) => {
        const entry = { ...raw };
        const originalBaseName = getBaseItemName(entry);

        if (!entry.uid) {
          entry.uid = `inv-${seed}-${index}`;
          changed = true;
        }

        const blueprint = getItemBlueprint(entry);
        const canonicalName = blueprint?.name || originalBaseName;
        if (canonicalName && canonicalName !== originalBaseName) {
          entry.item = rebuildStackedItemName(entry, canonicalName);
          changed = true;
        }

        const family = entry.equipFamily || blueprint?.family || inferFamilyFromEntry(entry);

        if (family && entry.equipFamily !== family) {
          entry.equipFamily = family;
          changed = true;
        }

        if (blueprint?.category && entry.category !== blueprint.category) {
          entry.category = blueprint.category;
          changed = true;
        }

        if (!entry.category) {
          const slotText = normalizeText(entry.slot);
          const itemText = normalizeText(canonicalName);
          if (blueprint?.category) {
            entry.category = blueprint.category;
          } else if (slotText.includes('матер')) {
            entry.category = 'resource';
          } else if (slotText.includes('квест')) {
            entry.category = 'quest';
          } else if (slotText.includes('зель') || slotText.includes('свит') || itemText.includes('эликсир') || itemText.includes('элексир')) {
            entry.category = 'consumable';
          } else if (family) {
            entry.category = 'wearable';
          } else {
            entry.category = 'general';
          }
          changed = true;
        }

        if ((!entry.stats || typeof entry.stats !== 'object') && blueprint?.stats) {
          entry.stats = blueprint.stats;
          changed = true;
        }
        if (!entry.setKey && blueprint?.setKey) {
          entry.setKey = blueprint.setKey;
          changed = true;
        }
        if (!entry.setPart && blueprint?.setPart) {
          entry.setPart = blueprint.setPart;
          changed = true;
        }

        if (isEquipped(entry) && !entry.equipSlot && family) {
          if (family === 'ring') {
            ringIndex += 1;
            entry.equipSlot = ringIndex === 2 ? 'ring2' : 'ring1';
          } else if (family === 'earring') {
            earringIndex += 1;
            entry.equipSlot = earringIndex === 2 ? 'earring2' : 'earring1';
          } else {
            entry.equipSlot = getPrimaryEquipSlotId(family);
          }
          changed = true;
        }

        if (isEquipped(entry) && entry.equipSlot && SLOT_MAP[entry.equipSlot] && entry.slot !== SLOT_MAP[entry.equipSlot].label) {
          entry.slot = SLOT_MAP[entry.equipSlot].label;
          changed = true;
        }

        if (!isEquipped(entry) && family) {
          const bagLabel = getBagSlotLabel(family);
          if (entry.slot !== bagLabel && entry.category === 'wearable') {
            entry.slot = bagLabel;
            changed = true;
          }
          if (entry.equipSlot) {
            entry.equipSlot = '';
            changed = true;
          }
        }

        if (!isEquipped(entry)) {
          let normalizedSlotLabel = '';
          if (entry.category === 'resource') {
            normalizedSlotLabel = 'Ресурсы';
          } else if (entry.category === 'quest') {
            normalizedSlotLabel = 'Квест';
          } else if (entry.category === 'consumable') {
            normalizedSlotLabel = isScroll(entry) ? 'Свитки' : 'Зелья';
          } else if (entry.category === 'general' && !family) {
            normalizedSlotLabel = 'Сумка';
          }

          if (normalizedSlotLabel && entry.slot !== normalizedSlotLabel) {
            entry.slot = normalizedSlotLabel;
            changed = true;
          }
        }

        return entry;
      });

      return { inventory: normalized, changed };
    }

    const normalizedInventory = normalizeInventorySchema(inventory);
    inventory = normalizedInventory.inventory;
    state.hero.inventory = inventory;

    function persistHeroState() {
      if (typeof window.HD_RECOMPUTE_HERO_STATS === 'function') {
        window.HD_RECOMPUTE_HERO_STATS(state);
      }
      saveState(state);
    }

    if (
      normalizedInventory.changed ||
      (typeof window.HD_RECOMPUTE_HERO_STATS === 'function' && window.HD_RECOMPUTE_HERO_STATS(state))
    ) {
      saveState(state);
    }

    function isResource(entry) {
      return entry.category === 'resource' || normalizeText(entry.slot).includes('матер');
    }

    function isQuest(entry) {
      return entry.category === 'quest' || normalizeText(entry.slot).includes('квест');
    }

    function isPotion(entry) {
      const blueprint = getItemBlueprint(entry);
      const name = normalizeText(getBaseItemName(entry));
      return entry.category === 'consumable' && (
        blueprint?.dropType === 'elexir' ||
        name.startsWith('hp-') ||
        name.startsWith('mp-')
      );
    }

    function isScroll(entry) {
      const blueprint = getItemBlueprint(entry);
      const name = normalizeText(getBaseItemName(entry));
      return entry.category === 'consumable' && (
        blueprint?.dropType === 'scroll' ||
        name.includes('scroll') ||
        name.includes('свит')
      );
    }

    function isAccessory(entry) {
      return ['necklace', 'ring', 'earring'].includes(getEntryMeta(entry).family);
    }

    function isWearable(entry) {
      return Boolean(getEntryMeta(entry).family);
    }

    function isConsumable(entry) {
      const item = normalizeText(getBaseItemName(entry));
      return entry.category === 'consumable' || isPotion(entry) || isScroll(entry) || item.includes('эликсир') || item.includes('элексир');
    }

    function glyphForSlot(slot) {
      const name = normalizeText(slot);
      if (name.includes('weapon') || name.includes('оруж') || name.includes('меч')) return '⚔';
      if (name.includes('body') || name.includes('брон') || name.includes('тело')) return '🛡';
      if (name.includes('head') || name.includes('шлем') || name.includes('голов')) return '⛑';
      if (name.includes('legs') || name.includes('низ')) return '⌖';
      if (name.includes('gloves') || name.includes('перчат') || name.includes('рук')) return '🧤';
      if (name.includes('boots') || name.includes('ботин') || name.includes('сап') || name.includes('ног')) return '🥾';
      if (name.includes('necklace') || name.includes('ожер') || name.includes('амул')) return '✦';
      if (name.includes('earring') || name.includes('серьг')) return '◈';
      if (name.includes('ring') || name.includes('коль')) return '◌';
      if (name.includes('зель')) return '✚';
      if (name.includes('свит')) return '✧';
      if (name.includes('матер')) return '◆';
      if (name.includes('квест')) return '✪';
      return '⬠';
    }

    const EMPTY_SLOT_ICONS = {
      weapon: './assets/ui/inventory/pusto/weapon.gif',
      body: './assets/ui/inventory/pusto/body.gif',
      golova: './assets/ui/inventory/pusto/golova.gif',
      shit: './assets/ui/inventory/pusto/shit.gif',
      nogi: './assets/ui/inventory/pusto/nogi.gif',
      ruki: './assets/ui/inventory/pusto/ruki.gif',
      kolco: './assets/ui/inventory/pusto/kolco.gif',
      kolco2: './assets/ui/inventory/pusto/kolco2.gif',
      amulet: './assets/ui/inventory/pusto/amulet.gif',
      ykr: './assets/ui/inventory/pusto/ykr.gif',
      serga2: './assets/ui/inventory/pusto/serga2.gif',
      plash: './assets/ui/inventory/pusto/plash.gif',
      poyas: './assets/ui/inventory/pusto/poyas.gif'
    };

    function emptyIconPathForSlot(slot) {
      const name = normalizeText(slot);
      if (name.includes('ring2') || name.includes('кольцо ii')) return EMPTY_SLOT_ICONS.kolco2;
      if (name.includes('earring') || name.includes('серьга')) return EMPTY_SLOT_ICONS.poyas;
      if (name.includes('оруж')) return EMPTY_SLOT_ICONS.weapon;
      if (name.includes('weapon')) return EMPTY_SLOT_ICONS.weapon;
      if (name.includes('брон')) return EMPTY_SLOT_ICONS.body;
      if (name.includes('body') || name.includes('тело')) return EMPTY_SLOT_ICONS.body;
      if (name.includes('шлем') || name.includes('голов')) return EMPTY_SLOT_ICONS.golova;
      if (name.includes('head')) return EMPTY_SLOT_ICONS.golova;
      if (name.includes('сап') || name.includes('ботин')) return EMPTY_SLOT_ICONS.nogi;
      if (name.includes('legs') || name.includes('низ') || name.includes('pants')) return EMPTY_SLOT_ICONS.plash;
      if (name.includes('boots') || name.includes('ботинки')) return EMPTY_SLOT_ICONS.nogi;
      if (name.includes('щит') || name.includes('shield') || name.includes('shit')) return EMPTY_SLOT_ICONS.shit;
      if (name.includes('рук')) return EMPTY_SLOT_ICONS.ruki;
      if (name.includes('gloves') || name.includes('перчат')) return EMPTY_SLOT_ICONS.ruki;
      if (name.includes('коль')) return EMPTY_SLOT_ICONS.kolco;
      if (name.includes('ring1')) return EMPTY_SLOT_ICONS.kolco;
      if (name.includes('амул')) return EMPTY_SLOT_ICONS.amulet;
      if (name.includes('necklace') || name.includes('ожер')) return EMPTY_SLOT_ICONS.amulet;
      if (name.includes('аксесс') || name.includes('украш')) return EMPTY_SLOT_ICONS.poyas;
      if (name.includes('пояс')) return EMPTY_SLOT_ICONS.poyas;
      if (name.includes('плащ')) return EMPTY_SLOT_ICONS.plash;
      return null;
    }

    function emptyIconPathForEquipSlot(slotId) {
      if (slotId === 'earring1') return EMPTY_SLOT_ICONS.poyas;
      if (slotId === 'earring2') return EMPTY_SLOT_ICONS.serga2;
      const slot = SLOT_MAP[slotId];
      if (!slot) return null;
      return EMPTY_SLOT_ICONS[slot.emptyIcon] || emptyIconPathForSlot(slot.emptyIcon || slotId);
    }

    function getGroupKey(entry, tab) {
      const slot = normalizeText(entry.slot);
      if (tab === 'general') {
        if (isWearable(entry) && !isAccessory(entry)) return 'gear';
        if (isPotion(entry)) return 'potions';
        if (isScroll(entry)) return 'scrolls';
        if (isAccessory(entry)) return 'accessories';
        return 'misc';
      }
      return 'all';
    }

    function buildEquipmentEntries(entries) {
      const equippedMap = new Map(
        entries
          .filter(isEquipped)
          .filter((entry) => entry.equipSlot)
          .map((entry) => [entry.equipSlot, entry])
      );

      return EQUIP_SLOTS.map((slot) => (
        equippedMap.get(slot.id) || {
          uid: `empty-${slot.id}`,
          slot: slot.label,
          item: 'Пусто',
          type: 'Надето',
          equipSlot: slot.id,
          equipFamily: slot.family,
          category: 'wearable'
        }
      ));
    }

    function addStats(target, stats) {
      Object.keys(STAT_LABELS).forEach((key) => {
        target[key] = (target[key] || 0) + Number(stats?.[key] || 0);
      });
      return target;
    }

    function formatStatLine(stats) {
      return Object.entries(STAT_LABELS)
        .filter(([key]) => Number(stats[key] || 0) > 0)
        .map(([key, label]) => `${label} +${stats[key]}`)
        .join(' • ');
    }

    function computeEquipmentBonuses(entries) {
      const activeItems = entries.filter((entry) => !isEmptyItem(entry));
      const direct = addStats({ patt: 0, matt: 0, pdef: 0, mdef: 0 }, {});
      const setTotal = addStats({ patt: 0, matt: 0, pdef: 0, mdef: 0 }, {});
      const setCounters = {};
      const setSummaries = [];

      activeItems.forEach((entry) => {
        const meta = getEntryMeta(entry);
        addStats(direct, meta.stats);
        if (meta.setKey) {
          if (!setCounters[meta.setKey]) {
            setCounters[meta.setKey] = { parts: new Set(), count: 0 };
          }
          setCounters[meta.setKey].count += 1;
          if (meta.setPart) {
            setCounters[meta.setKey].parts.add(meta.setPart);
          }
        }
      });

      Object.entries(setCounters).forEach(([setKey, payload]) => {
        const config = SET_LIBRARY[setKey];
        if (!config) return;
        const activeBonus = { patt: 0, matt: 0, pdef: 0, mdef: 0 };
        Object.keys(config.thresholds)
          .map(Number)
          .sort((a, b) => a - b)
          .forEach((threshold) => {
            if (payload.parts.size >= threshold) {
              addStats(activeBonus, config.thresholds[threshold]);
            }
          });
        if (formatStatLine(activeBonus)) {
          addStats(setTotal, activeBonus);
          setSummaries.push({
            name: config.name,
            parts: payload.parts.size,
            bonusText: formatStatLine(activeBonus)
          });
        }
      });

      return {
        direct,
        setTotal,
        total: addStats({ patt: 0, matt: 0, pdef: 0, mdef: 0 }, direct) && addStats(direct, setTotal),
        setSummaries
      };
    }

    function renderEquipmentSlot(entry) {
      const slot = SLOT_MAP[entry.equipSlot];
      const isEmpty = isEmptyItem(entry);
      const blueprint = getItemBlueprint(entry);
      const description = isEmpty ? '' : buildItemDescription(entry);
      const iconPath = isEmpty
        ? emptyIconPathForEquipSlot(entry.equipSlot)
        : blueprint?.icon || emptyIconPathForEquipSlot(entry.equipSlot);
      const actionButton = isEmpty ? '' : `
        <button
          class="equip-slot-action"
          type="button"
          data-item-action="Снять"
          data-item-uid="${entry.uid || ''}"
          data-item-name="${entry.item}"
          data-item-slot="${entry.slot}"
          data-item-tab="equipment"
        >Снять</button>
      `;

      return `
        <article class="equip-slot-card${isEmpty ? '' : ' has-item'}">
          <div class="equip-slot-icon">
            ${iconPath ? renderInventoryIcon(iconPath) : glyphForSlot(slot?.label || entry.slot)}
          </div>
          <div class="equip-slot-label">${String(slot?.label || entry.slot || '').toUpperCase()}</div>
          <div class="equip-slot-name${isEmpty ? ' empty' : ''}">${isEmpty ? 'Пусто' : escapeHtml(entry.item)}</div>
          ${description ? `<div class="equip-slot-desc">${escapeHtml(description)}</div>` : ''}
          ${actionButton}
        </article>
      `;
    }

    function renderEquipmentPaperdoll(entries) {
      return `
        <section class="equip-flat-grid">
            ${entries.map((entry) => renderEquipmentSlot(entry)).join('')}
        </section>
      `;
    }

    function findTargetEquipSlotId(entry, entries) {
      const { family } = getEntryMeta(entry);
      if (!family) return null;

      if (family === 'ring') {
        const occupied = new Set(entries.filter(isEquipped).map((item) => item.equipSlot));
        return ['ring1', 'ring2'].find((slotId) => !occupied.has(slotId)) || null;
      }

      if (family === 'earring') {
        const occupied = new Set(entries.filter(isEquipped).map((item) => item.equipSlot));
        return ['earring1', 'earring2'].find((slotId) => !occupied.has(slotId)) || null;
      }

      return getPrimaryEquipSlotId(family);
    }

    const realInventory = inventory.filter((entry) => !isEmptyItem(entry));
    const equippedItems = buildEquipmentEntries(inventory);
    const bagItems = realInventory.filter((entry) => !isEquipped(entry));
    const generalItems = bagItems.filter((entry) => !isResource(entry) && !isQuest(entry));
    const resourceItems = bagItems.filter(isResource);
    const questItems = bagItems.filter(isQuest);

    const groupSets = {
      general: [
        { key: 'all', label: 'Все' },
        { key: 'gear', label: 'Оружие/Броня' },
        { key: 'potions', label: 'Зелья' },
        { key: 'scrolls', label: 'Свитки' },
        { key: 'accessories', label: 'Аксессуары' },
        { key: 'misc', label: 'Прочее' }
      ]
    };

    function countInGroup(items, key) {
      if (key === 'all') return items.length;
      return items.filter((entry) => getGroupKey(entry, 'general') === key).length;
    }

    function renderGroupBar(items) {
      return `
        <div class="legacy-groups" data-filter-group="general">
          ${groupSets.general.map((group, index) => `
            <button
              class="legacy-group${index === 0 ? ' active' : ''}"
              type="button"
              data-group-button="general"
              data-filter="${group.key}"
            >
              <strong>${group.label}</strong>
              <span>${countInGroup(items, group.key)} шт.</span>
            </button>
          `).join('')}
        </div>
      `;
    }

    function getInventoryLimit() {
      return Math.max(1, Number(state.hero.inventoryLimit || 80) || 80);
    }

    function getOccupiedInventoryEntries(entries = state.hero.inventory) {
      return (entries || []).filter((entry) => !isEmptyItem(entry));
    }

    function getOccupiedInventorySlotUsage(entries = state.hero.inventory) {
      return getOccupiedInventoryEntries(entries).length;
    }

    function hasInventoryCapacity(entries = state.hero.inventory, slotsNeeded = 1) {
      return getOccupiedInventorySlotUsage(entries) + slotsNeeded <= getInventoryLimit();
    }

    function renderGeneralMeta() {
      return `
        <div class="inventory-general-meta">
          <div class="inventory-capacity">${getOccupiedInventorySlotUsage()}/${getInventoryLimit()}</div>
        </div>
      `;
    }

    function getActionLabels(entry, tab) {
      if (tab === 'equipment') {
        return isEmptyItem(entry) ? [] : [
          { label: 'Инфо' },
          { label: 'Снять' }
        ];
      }

      if (tab === 'general') {
        if (isWearable(entry)) {
          return [
            { label: 'Инфо' },
            { label: 'Надеть' },
            { label: 'Выкинуть', kind: 'drop' }
          ];
        }

        if (isConsumable(entry)) {
          return [
            { label: 'Инфо' },
            { label: 'Использовать' },
            { label: 'Выкинуть', kind: 'drop' }
          ];
        }

        return [
          { label: 'Инфо' },
          { label: 'Выкинуть', kind: 'drop' }
        ];
      }

      if (tab === 'resources') {
        return [
          { label: 'Инфо' },
          { label: 'Передать' },
          { label: 'Выкинуть', kind: 'drop' }
        ];
      }

      if (tab === 'quest') {
        return [{ label: 'Инфо' }];
      }

      return [];
    }

    function renderIcon(entry, tab) {
      const blueprint = getItemBlueprint(entry);
      if (blueprint?.icon) {
        return renderInventoryIcon(blueprint.icon);
      }
      if (tab === 'equipment' && isEmptyItem(entry)) {
        const iconPath = emptyIconPathForSlot(entry.equipSlot || entry.slot);
        if (iconPath) {
          return renderInventoryIcon(iconPath);
        }
      }
      return glyphForSlot(entry.slot);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function isAccessoryFamily(family, slotLabel) {
      const text = normalizeText(`${family || ''} ${slotLabel || ''}`);
      return (
        text.includes('ring') ||
        text.includes('earring') ||
        text.includes('amulet') ||
        text.includes('necklace') ||
        text.includes('ожер') ||
        text.includes('серьг') ||
        text.includes('кольц')
      );
    }

    function isArmorFamily(family, slotLabel) {
      const text = normalizeText(`${family || ''} ${slotLabel || ''}`);
      return (
        text.includes('body') ||
        text.includes('head') ||
        text.includes('helmet') ||
        text.includes('legs') ||
        text.includes('boots') ||
        text.includes('gloves') ||
        text.includes('shield') ||
        text.includes('тело') ||
        text.includes('шлем') ||
        text.includes('низ') ||
        text.includes('бот') ||
        text.includes('перчат') ||
        text.includes('щит')
      );
    }

    function isWeaponFamily(family, slotLabel) {
      const text = normalizeText(`${family || ''} ${slotLabel || ''}`);
      return (
        text.includes('weapon') ||
        text.includes('оруж') ||
        text.includes('меч') ||
        text.includes('лук') ||
        text.includes('кинжал')
      );
    }

    function numericStat(stats, key) {
      const value = Number(stats?.[key] || 0);
      return Number.isFinite(value) ? value : 0;
    }

    function buildItemDescription(entry) {
      const blueprint = getItemBlueprint(entry);
      const stats = blueprint?.stats || {};
      const family = blueprint?.family || entry?.equipFamily || entry?.equipSlot || '';
      const slotLabel = blueprint?.slotLabel || entry?.slot || '';
      const category = normalizeText(blueprint?.category || entry?.category || '');
      const lines = [];
      const directDescription = String(blueprint?.description || '').trim();

      if (blueprint?.effect === 'hp') {
        const healAmount = Number(blueprint?.give || 0);
        return healAmount > 0
          ? `Восстанавливает ${healAmount} HP.`
          : 'Восстанавливает здоровье.';
      }

      if (blueprint?.effect === 'return_scroll') {
        return 'Телепортирует в ближайший город.';
      }

      if (category === 'resource' || isResource(entry)) {
        return 'Материал для крафта и ремесла.';
      }

      if (category === 'quest' || isQuest(entry)) {
        return 'Квестовый предмет.';
      }

      if (isWeaponFamily(family, slotLabel)) {
        const pAtk = numericStat(stats, 'patt');
        const mAtk = numericStat(stats, 'matt');
        const critical = numericStat(stats, 'critical') || numericStat(stats, 'crit');
        if (pAtk) lines.push(`Урон: ${pAtk}`);
        if (mAtk) lines.push(`Маг. урон: ${mAtk}`);
        if (critical) lines.push(`Крит: ${critical}`);
      } else if (isAccessoryFamily(family, slotLabel)) {
        const mDef = numericStat(stats, 'mdef');
        if (mDef) lines.push(`M.Def: ${mDef}`);
      } else if (isArmorFamily(family, slotLabel)) {
        const pDef = numericStat(stats, 'pdef');
        if (pDef) lines.push(`P.Def: ${pDef}`);
      }

      const hpBonus = numericStat(stats, 'hp');
      if (hpBonus) {
        lines.push(`HP: +${hpBonus}`);
      }

      const mpBonus = numericStat(stats, 'mp');
      if (mpBonus) {
        lines.push(`MP: +${mpBonus}`);
      }

      if (directDescription) {
        lines.unshift(directDescription);
      }

      if (!lines.length && category === 'consumable') {
        return 'Расходуется при использовании.';
      }

      if (!lines.length && blueprint?.category === 'wearable') {
        return 'Предмет экипировки.';
      }

      if (!lines.length && blueprint) {
        return 'Предмет инвентаря.';
      }

      return lines.join(' • ') || 'Описание предмета скоро появится.';
    }

    function renderRow(entry, tab, actionLabels) {
      const itemName = entry.item;
      const slotName = entry.slot;
      const description = buildItemDescription(entry);
      const groupKey = tab === 'general' ? getGroupKey(entry, tab) : 'all';
      const isEmpty = isEmptyItem(entry);
      const safeActions = isEmpty ? [] : actionLabels;
      return `
        <article class="legacy-row" data-row-tab="${tab}" data-row-group="${groupKey}">
          <div class="legacy-icon">${renderIcon(entry, tab)}</div>
          <div class="legacy-copy">
            <strong>${escapeHtml(itemName)}</strong>
            <span class="legacy-meta">${escapeHtml(slotName)}</span>
            ${description ? `<span class="legacy-desc">${escapeHtml(description)}</span>` : ''}
          </div>
          <div class="legacy-actions">
            ${safeActions.map((action) => `
              <button
                class="legacy-action${action.kind === 'drop' ? ' drop' : ''}"
                type="button"
                data-item-action="${action.label}"
                data-item-uid="${entry.uid || ''}"
                data-item-name="${itemName}"
                data-item-slot="${slotName}"
                data-item-tab="${tab}"
              >${action.label}</button>
            `).join('')}
          </div>
        </article>
      `;
    }

    function renderSimpleList(tab, items, actionFactory, emptyText) {
      if (!items.length) {
        return `<div class="legacy-empty">${emptyText}</div>`;
      }
      return `
        <div class="legacy-list">
          ${items.map((entry) => renderRow(entry, tab, actionFactory(entry))).join('')}
        </div>
      `;
    }

    function formatAdena(value) {
      return Number(value || 0).toLocaleString('ru-RU');
    }

    function findNearestCityId(cityId) {
      if (typeof cities === 'undefined') return cityId;
      const currentCity = cities[cityId];
      if (!currentCity) return cityId;

      const routeCandidates = [];
      (currentCity.teleportDestinations || []).forEach((route) => {
        routeCandidates.push({ cityId: route.cityId, score: Number(route.cost || 0) });
      });
      (currentCity.walkingRoutes || []).forEach((route) => {
        routeCandidates.push({ cityId: route.cityId, score: Number(route.durationMin || 0) });
      });

      routeCandidates.sort((a, b) => a.score - b.score);
      return routeCandidates[0]?.cityId || cityId;
    }

    function consumeInventoryEntry(index, entry) {
      const stack = parseStackedItem(entry);
      if (stack && stack.count > 1) {
        state.hero.inventory[index] = {
          ...entry,
          item: `${stack.count - 1} x ${stack.baseName}`
        };
      } else {
        state.hero.inventory.splice(index, 1);
      }
    }

    q('app').innerHTML = `
      <div class="single-page-layout inventory-shell">
        <div class="inventory-tabs">
          <button class="inventory-tab active" type="button" data-tab="equipment">Экипировка</button>
          <button class="inventory-tab" type="button" data-tab="general">Общее</button>
          <button class="inventory-tab" type="button" data-tab="resources">Ресурсы</button>
          <button class="inventory-tab" type="button" data-tab="quest">Квестовые предметы</button>
        </div>

        <div class="inventory-body">
          <section class="inventory-panel" data-current-tab="equipment">
            <div class="inventory-panel-inner">
              <div class="tab-panel active" data-panel="equipment">
                ${renderEquipmentPaperdoll(equippedItems)}
              </div>

              <div class="tab-panel" data-panel="general">
                ${renderGeneralMeta()}
                ${renderGroupBar(generalItems)}
                ${renderSimpleList(
                  'general',
                  generalItems,
                  (entry) => getActionLabels(entry, 'general'),
                  'В общем разделе пока пусто.'
                )}
              </div>

              <div class="tab-panel" data-panel="resources">
                ${renderSimpleList(
                  'resources',
                  resourceItems,
                  (entry) => getActionLabels(entry, 'resources'),
                  'Предметов с отметкой ресурса пока нет.'
                )}
              </div>

              <div class="tab-panel" data-panel="quest">
                ${renderSimpleList(
                  'quest',
                  questItems,
                  (entry) => getActionLabels(entry, 'quest'),
                  'Предметов с отметкой квест пока нет.'
                )}
              </div>
            </div>
            <div class="inventory-panel-footer">
              <div class="adena-tracker">
                <img src="./assets/ui/items/custom/adena.png" alt="Adena">
                <span>${formatAdena(state.hero.adena)}</span>
              </div>
            </div>
          </section>
        </div>
      </div>
      ${renderBottomNav('inventory')}
    `;

    const tabs = [...document.querySelectorAll('[data-tab]')];
    const panels = [...document.querySelectorAll('[data-panel]')];
    const inventoryPanel = document.querySelector('.inventory-panel');

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach((item) => item.classList.toggle('active', item === tab));
        panels.forEach((panel) => panel.classList.toggle('active', panel.dataset.panel === target));
        if (inventoryPanel) {
          inventoryPanel.dataset.currentTab = target;
        }
      });
    });

    document.querySelectorAll('[data-group-button="general"]').forEach((button) => {
      button.addEventListener('click', () => {
        const filter = button.dataset.filter;
        document.querySelectorAll('[data-group-button="general"]').forEach((item) => {
          item.classList.toggle('active', item === button);
        });
        document.querySelectorAll('[data-row-tab="general"]').forEach((row) => {
          row.classList.toggle('hidden', filter !== 'all' && row.dataset.rowGroup !== filter);
        });
      });
    });

    document.querySelectorAll('[data-item-action]').forEach((button) => {
      button.addEventListener('click', () => {
        const action = button.dataset.itemAction;
        const itemUid = button.dataset.itemUid;
        const itemName = button.dataset.itemName;
        const slotName = button.dataset.itemSlot;

        if (action === 'Инфо') {
          const infoEntry = state.hero.inventory.find((entry) => entry.uid === itemUid)
            || buildEquipmentEntries(state.hero.inventory).find((entry) => entry.uid === itemUid)
            || { item: itemName, slot: slotName };
          showToast(buildItemDescription(infoEntry));
          return;
        }

        if (action === 'Снять') {
          const equippedIndex = state.hero.inventory.findIndex((entry) => (
            entry.uid === itemUid
          ));

          if (equippedIndex === -1) {
            showToast('Предмет уже снят.');
            return;
          }

          const equippedEntry = state.hero.inventory[equippedIndex];
          const equippedMeta = getEntryMeta(equippedEntry);
          state.hero.inventory[equippedIndex] = {
            ...equippedEntry,
            slot: getBagSlotLabel(equippedMeta.family),
            type: 'Сумка',
            equipSlot: ''
          };
          persistHeroState();
          showToast(`Снято: ${itemName}`);
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        if (action === 'Надеть') {
          const bagIndex = state.hero.inventory.findIndex((entry) => (
            entry.uid === itemUid
          ));

          if (bagIndex === -1) {
            showToast('Предмет не найден в сумке.');
            return;
          }

          const bagEntry = state.hero.inventory[bagIndex];
          const targetSlotId = findTargetEquipSlotId(bagEntry, state.hero.inventory);
          const bagMeta = getEntryMeta(bagEntry);

          if (!targetSlotId) {
            showToast(
              bagMeta.family === 'ring'
                ? 'Сначала снимите одно из колец.'
                : bagMeta.family === 'earring'
                  ? 'Сначала снимите одну из серёг.'
                  : 'Для предмета не найден слот экипировки.'
            );
            return;
          }

          const equippedIndex = state.hero.inventory.findIndex((entry) => (
            isEquipped(entry) &&
            entry.equipSlot === targetSlotId
          ));

          if (equippedIndex !== -1) {
            const equippedEntry = state.hero.inventory[equippedIndex];
            const equippedMeta = getEntryMeta(equippedEntry);
            state.hero.inventory[equippedIndex] = {
              ...equippedEntry,
              slot: getBagSlotLabel(equippedMeta.family),
              type: 'Сумка',
              equipSlot: ''
            };
          }

          state.hero.inventory[bagIndex] = {
            ...bagEntry,
            slot: SLOT_MAP[targetSlotId].label,
            type: 'Надето',
            equipSlot: targetSlotId
          };

          persistHeroState();
          showToast(`Надето: ${itemName}`);
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        if (action === 'Использовать') {
          const bagIndex = state.hero.inventory.findIndex((entry) => (
            !isEquipped(entry) &&
            entry.uid === itemUid
          ));

          if (bagIndex === -1) {
            showToast('Предмет не найден в сумке.');
            return;
          }

          const bagEntry = state.hero.inventory[bagIndex];
          const blueprint = getItemBlueprint(bagEntry);
          const healAmount = Number(blueprint?.give || 0);

          if (blueprint?.effect === 'hp') {
            state.hero.hp = Math.min(state.hero.maxHp || state.hero.hp, state.hero.hp + healAmount);
          }

          if (blueprint?.effect === 'return_scroll') {
            const nextCityId = findNearestCityId(state.hero.cityId);
            state.hero.cityId = nextCityId;
          }

          consumeInventoryEntry(bagIndex, bagEntry);
          persistHeroState();
          if (blueprint?.effect === 'return_scroll' && typeof cities !== 'undefined' && cities[state.hero.cityId]) {
            showToast(`Телепорт: ${cities[state.hero.cityId].name}`);
          } else if (blueprint?.effect === 'hp') {
            showToast(`Восстановлено HP: +${healAmount}`);
          } else {
            showToast(`Использовано: ${itemName}`);
          }
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        showToast(`${action}: ${itemName}`);
      });
    });
    })();
  </script>
</body>
</html>
