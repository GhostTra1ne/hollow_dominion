<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta http-equiv=""Cache-Control"" content=""no-cache, no-store, must-revalidate"">
  <meta http-equiv=""Pragma"" content=""no-cache"">
  <meta http-equiv=""Expires"" content=""0"">
  <script>
    (function () {
      const APP_VERSION = '20260421-telegram-4';
      const url = new URL(window.location.href);
      if (url.searchParams.get('appv') !== APP_VERSION) {
        url.searchParams.set('appv', APP_VERSION);
        window.location.replace(url.toString());
      }
      window.__HD_APP_VERSION__ = APP_VERSION;
    })();
  </script>  <title>Инвентарь</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css?v=20260421-telegram-4">
  <style>
    .inventory-screen {
      display: grid;
      gap: 14px;
      min-height: 0;
    }

    .inventory-topline {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .inventory-chip {
      padding: 12px 14px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .05), rgba(255, 255, 255, .02)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .10), rgba(214, 178, 116, 0) 60%);
      border: 1px solid rgba(255, 255, 255, .06);
      display: grid;
      gap: 4px;
    }

    .inventory-chip span {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .inventory-chip strong {
      color: #f6e5ba;
      font-family: var(--font-main);
      font-size: 24px;
      line-height: 1;
    }

    .inventory-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(300px, .92fr);
      gap: 14px;
      min-height: 0;
    }

    .inventory-column {
      display: grid;
      gap: 14px;
      min-height: 0;
    }

    .inventory-card {
      padding: 16px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .07), rgba(214, 178, 116, 0) 56%);
      border: 1px solid rgba(255, 255, 255, .06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .03);
      min-height: 0;
    }

    .inventory-card h3 {
      margin: 0 0 6px;
      color: #f2d9a0;
      font-family: var(--font-main);
      font-size: 28px;
      line-height: 1;
    }

    .inventory-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .gear-stage {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 164px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .gear-silhouette {
      position: relative;
      min-height: 284px;
      border-radius: 22px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(213, 181, 119, .14), rgba(213, 181, 119, 0) 40%),
        linear-gradient(180deg, rgba(17, 19, 29, .98), rgba(11, 13, 20, .98));
      border: 1px solid rgba(214, 178, 116, .12);
    }

    .gear-silhouette::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 18px;
      border: 1px solid rgba(214, 178, 116, .10);
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 242, 206, .06), rgba(255, 242, 206, 0) 28%),
        linear-gradient(180deg, rgba(255, 255, 255, .02), rgba(255, 255, 255, 0));
    }

    .gear-figure {
      position: absolute;
      inset: 18px 22px 54px;
      opacity: .72;
      background:
        radial-gradient(circle at 50% 12%, rgba(245, 228, 189, .58) 0 18px, transparent 19px),
        linear-gradient(180deg, transparent 0 24px, rgba(245, 228, 189, .18) 24px 108px, transparent 108px),
        linear-gradient(90deg, transparent 0 40px, rgba(245, 228, 189, .16) 40px 72px, transparent 72px);
      filter: blur(.2px);
    }

    .gear-glow {
      position: absolute;
      inset: auto 24px 18px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(214, 178, 116, .08);
      border: 1px solid rgba(214, 178, 116, .12);
      text-align: center;
      color: #f4e2bc;
      font-size: 12px;
      line-height: 1.45;
    }

    .gear-list {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .gear-slot {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .gear-icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-family: var(--font-main);
      font-size: 20px;
      color: #f8e5bc;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 234, 190, .14), rgba(255, 234, 190, 0) 46%),
        linear-gradient(180deg, rgba(89, 59, 22, .95), rgba(38, 25, 10, .98));
      border: 1px solid rgba(214, 178, 116, .16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05);
    }

    .gear-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .gear-copy strong {
      color: #fff1cb;
      font-size: 15px;
    }

    .gear-copy span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .gear-state {
      white-space: nowrap;
      padding: 8px 10px;
      border-radius: 999px;
      color: #f8e1aa;
      background: rgba(214, 178, 116, .10);
      border: 1px solid rgba(214, 178, 116, .14);
      font-size: 12px;
      font-weight: 700;
    }

    .bag-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .bag-slot {
      display: grid;
      gap: 8px;
      padding: 14px;
      min-height: 108px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .015)),
        radial-gradient(circle at 50% 0%, rgba(123, 167, 230, .08), rgba(123, 167, 230, 0) 62%);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .bag-slot.top-empty {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .02), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .04), rgba(214, 178, 116, 0) 62%);
      border-style: dashed;
    }

    .bag-slot strong {
      color: #f1d59a;
      font-size: 14px;
    }

    .bag-slot p {
      margin: 0;
      color: #f5efdf;
      font-size: 14px;
      line-height: 1.45;
    }

    .bag-meta {
      margin-top: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bag-meta span {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .inventory-notes {
      display: grid;
      gap: 10px;
    }

    .inventory-note {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(255, 255, 255, .06);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .inventory-note strong {
      display: block;
      margin-bottom: 5px;
      color: #f5dfaa;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .inventory-topline,
      .inventory-layout,
      .gear-stage,
      .bag-grid {
        grid-template-columns: 1fr;
      }

      .gear-silhouette {
        min-height: 220px;
      }
    }

    @media (max-width: 560px) {
      .inventory-card {
        padding: 14px;
      }

      .inventory-card h3 {
        font-size: 24px;
      }

      .gear-slot {
        grid-template-columns: 46px minmax(0, 1fr);
      }

      .gear-state {
        grid-column: 1 / -1;
        justify-self: start;
      }

      .gear-icon {
        width: 46px;
        height: 46px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="screen-page">
    <div class="app-shell" id="app"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="common.js?v=20260421-telegram-4"></script>
  <script>
    let state = loadState();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    const inventory = state.hero.inventory || [];
    const equippedItems = inventory.filter((entry) => entry.type === 'Надето');
    const bagItems = inventory.filter((entry) => entry.type !== 'Надето');
    const emptyBagSlots = bagItems.filter((entry) => entry.item === 'Пусто').length;

    const slotGlyphs = {
      'Оружие': '⚔',
      'Броня': '🛡',
      'Зелья': '✚',
      'Свитки': '✦',
      'Материалы': '◈',
      'Аксессуары': '◉',
      'Квест': '✧',
      'Прочее': '⬡'
    };

    const slotDescriptions = {
      'Оружие': 'Основной боевой слот героя.',
      'Броня': 'Защитный комплект для текущей экипировки.'
    };

    const equippedMarkup = equippedItems.map((entry) => `
      <article class="gear-slot">
        <div class="gear-icon">${slotGlyphs[entry.slot] || '◆'}</div>
        <div class="gear-copy">
          <strong>${entry.item}</strong>
          <span>${entry.slot}. ${slotDescriptions[entry.slot] || 'Экипированный предмет героя.'}</span>
        </div>
        <div class="gear-state">${entry.type}</div>
      </article>
    `).join('');

    const bagMarkup = bagItems.map((entry) => {
      const isEmpty = entry.item === 'Пусто';
      const status = isEmpty ? 'Свободно' : entry.type;
      return `
        <article class="bag-slot ${isEmpty ? 'top-empty' : ''}">
          <strong>${entry.slot}</strong>
          <p>${entry.item}</p>
          <div class="bag-meta">
            <span>${status}</span>
            <span>${isEmpty ? 'Можно заполнить' : 'Готово к использованию'}</span>
          </div>
        </article>
      `;
    }).join('');

    q('app').innerHTML = `
      ${renderHeader(state, 'Снаряжение, сумка и дорожный запас героя в формате старой MMORPG-панели.')}
      <div class="single-page-layout">
        <div class="panel page-main-panel">
          <div class="panel-inner content-scroll">
            <div class="inventory-screen">
              <div class="inventory-topline">
                <div class="inventory-chip">
                  <span>Адена</span>
                  <strong>${state.hero.adena}</strong>
                </div>
                <div class="inventory-chip">
                  <span>Надето</span>
                  <strong>${equippedItems.length}</strong>
                </div>
                <div class="inventory-chip">
                  <span>Свободно</span>
                  <strong>${emptyBagSlots}</strong>
                </div>
              </div>

              <div class="inventory-layout">
                <div class="inventory-column">
                  <section class="inventory-card">
                    <h3>Экипировка</h3>
                    <p>Активные предметы, которые формируют текущий боевой профиль героя.</p>
                    <div class="gear-stage">
                      <div class="gear-silhouette">
                        <div class="gear-figure"></div>
                        <div class="gear-glow">Воин держит готовый комплект.<br>Следом можно добавить кольца, амулеты и плащ.</div>
                      </div>
                      <div class="gear-list">
                        ${equippedMarkup}
                      </div>
                    </div>
                  </section>
                </div>

                <div class="inventory-column">
                  <section class="inventory-card">
                    <h3>Сумка</h3>
                    <p>Расходники, свитки и всё, что герой несёт в дороге между городами.</p>
                    <div class="bag-grid">${bagMarkup}</div>
                  </section>

                  <section class="inventory-card">
                    <h3>Полевая заметка</h3>
                    <div class="inventory-notes">
                      <div class="inventory-note">
                        <strong>Боевой запас</strong>
                        Зелья и свитки уже готовы для быстрых дорожных событий и будущих нападений разбойников.
                      </div>
                      <div class="inventory-note">
                        <strong>Следующий шаг</strong>
                        Сюда легко добавить слоты бижутерии, квестовые предметы, вес, сортировку и быстрые действия «Надеть / Использовать / Продать».
                      </div>
                    </div>
                  </section>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      ${renderBottomNav('inventory')}
    `;
  </script>
</body>
</html>
