  <style>
    .inventory-shell {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      padding-top: 4px;
    }

    .inventory-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      align-items: stretch;
    }

    .inventory-tab {
      min-height: 52px;
      padding: 10px 8px;
      border: 1px solid rgba(214, 178, 116, .12);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .035), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .08), rgba(214, 178, 116, 0) 64%);
      color: rgba(243, 237, 222, .82);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
      text-align: center;
      cursor: pointer;
      transition: border-color .18s ease, transform .18s ease, color .18s ease, background .18s ease;
    }

    .inventory-tab.active {
      color: #fff0cb;
      border-color: rgba(214, 178, 116, .34);
      background:
        linear-gradient(180deg, rgba(98, 67, 28, .92), rgba(42, 28, 11, .98)),
        radial-gradient(circle at 50% 0%, rgba(255, 228, 170, .14), rgba(255, 228, 170, 0) 64%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .05),
        0 8px 18px rgba(0, 0, 0, .18);
      transform: translateY(-1px);
    }

    .inventory-body {
      min-height: 0;
      display: grid;
    }

    .inventory-panel {
      min-height: 0;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .015)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .08), rgba(214, 178, 116, 0) 56%);
      border: 1px solid rgba(255, 255, 255, .06);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .03),
        0 20px 36px rgba(0, 0, 0, .18);
      overflow: hidden;
    }

    .inventory-panel-inner {
      height: 100%;
      min-height: 0;
      overflow: auto;
      padding: 16px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .tab-panel {
      display: none;
      min-height: 0;
      align-content: start;
      gap: 14px;
    }

    .tab-panel.active {
      display: grid;
    }

    .legacy-groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
      gap: 8px;
    }

    .legacy-group {
      padding: 10px 12px;
      border-radius: 18px;
      border: 1px solid rgba(214, 178, 116, .12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .06), rgba(214, 178, 116, 0) 62%);
      color: rgba(243, 237, 222, .82);
      display: grid;
      gap: 2px;
      text-align: left;
      cursor: pointer;
      transition: border-color .18s ease, transform .18s ease, color .18s ease, background .18s ease;
    }

    .legacy-group.active {
      color: #fff0cb;
      border-color: rgba(214, 178, 116, .32);
      background:
        linear-gradient(180deg, rgba(98, 67, 28, .92), rgba(42, 28, 11, .98)),
        radial-gradient(circle at 50% 0%, rgba(255, 228, 170, .12), rgba(255, 228, 170, 0) 64%);
      transform: translateY(-1px);
    }

    .legacy-group strong {
      font-size: 13px;
      color: inherit;
    }

    .legacy-group span {
      font-size: 11px;
      color: rgba(243, 237, 222, .64);
    }

    .legacy-list {
      display: grid;
      gap: 10px;
    }

    .legacy-row {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .015)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .06), rgba(214, 178, 116, 0) 62%);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .legacy-row.hidden {
      display: none;
    }

    .legacy-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: #f8e5bc;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 234, 190, .14), rgba(255, 234, 190, 0) 46%),
        linear-gradient(180deg, rgba(89, 59, 22, .95), rgba(38, 25, 10, .98));
      border: 1px solid rgba(214, 178, 116, .16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05);
    }

    .legacy-empty-icon {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: auto;
      border-radius: 12px;
    }

    .legacy-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .legacy-copy strong {
      color: #fff1cb;
      font-size: 15px;
    }

    .legacy-copy span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .legacy-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .legacy-action {
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(214, 178, 116, .14);
      background: rgba(255, 255, 255, .04);
      color: #f6dfae;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .legacy-action:hover,
    .legacy-action:focus-visible {
      border-color: rgba(214, 178, 116, .28);
      background: rgba(214, 178, 116, .10);
      transform: translateY(-1px);
    }

    .legacy-action.drop {
      color: #ffb18a;
      border-color: rgba(255, 123, 84, .18);
    }

    .legacy-empty {
      min-height: 200px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .025), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .05), rgba(214, 178, 116, 0) 60%);
      border: 1px dashed rgba(214, 178, 116, .16);
      color: rgba(243, 237, 222, .72);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 560px) {
      .inventory-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .inventory-panel-inner {
        padding: 14px;
      }

      .legacy-row {
        grid-template-columns: 42px minmax(0, 1fr);
      }

      .legacy-icon {
        width: 42px;
        height: 42px;
      }

      .legacy-actions {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }
    }
  </style>

  <script>
    let state = loadState();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    const inventory = Array.isArray(state.hero.inventory) ? state.hero.inventory : [];

    function normalizeText(value) {
      return String(value || '').toLowerCase();
    }

    function isEquipped(entry) {
      return normalizeText(entry.type).includes('над');
    }

    function isResource(entry) {
      return normalizeText(entry.slot).includes('матер');
    }

    function isQuest(entry) {
      return normalizeText(entry.slot).includes('квест');
    }

    function isPotion(entry) {
      return normalizeText(entry.slot).includes('зель');
    }

    function isScroll(entry) {
      return normalizeText(entry.slot).includes('свит');
    }

    function isAccessory(entry) {
      const slot = normalizeText(entry.slot);
      return slot.includes('аксесс') || slot.includes('амул') || slot.includes('коль');
    }

    function isWearable(entry) {
      const slot = normalizeText(entry.slot);
      return (
        slot.includes('оруж') ||
        slot.includes('брон') ||
        slot.includes('шлем') ||
        slot.includes('голов') ||
        slot.includes('щит') ||
        slot.includes('сап') ||
        slot.includes('ног') ||
        slot.includes('рук') ||
        slot.includes('амул') ||
        slot.includes('коль') ||
        slot.includes('аксесс') ||
        slot.includes('украш') ||
        slot.includes('пояс') ||
        slot.includes('плащ')
      );
    }

    function isEmptyItem(entry) {
      return normalizeText(entry.item).trim() === 'пусто';
    }

    function isConsumable(entry) {
      const item = normalizeText(entry.item);
      return (
        isPotion(entry) ||
        isScroll(entry) ||
        item.includes('эликсир') ||
        item.includes('элексир')
      );
    }

    function glyphForSlot(slot) {
      const name = normalizeText(slot);
      if (name.includes('оруж')) return '⚔';
      if (name.includes('брон')) return '🛡';
      if (name.includes('шлем') || name.includes('голов')) return '⛑';
      if (name.includes('щит')) return '🛡';
      if (name.includes('сап') || name.includes('ног')) return '🥾';
      if (name.includes('рук')) return '🧤';
      if (name.includes('амул')) return '✦';
      if (name.includes('коль')) return '◌';
      if (name.includes('зель')) return '✚';
      if (name.includes('свит')) return '✧';
      if (name.includes('матер')) return '◆';
      if (name.includes('квест')) return '✪';
      if (name.includes('аксесс')) return '◈';
      return '⬠';
    }

    };

    function emptyIconPathForSlot(slot) {
      const name = normalizeText(slot);
      if (name.includes('оруж')) return EMPTY_SLOT_ICONS.weapon;
      if (name.includes('брон')) return EMPTY_SLOT_ICONS.body;
      if (name.includes('шлем') || name.includes('голов')) return EMPTY_SLOT_ICONS.golova;
      if (name.includes('щит')) return EMPTY_SLOT_ICONS.shit;
      if (name.includes('сап') || name.includes('ног')) return EMPTY_SLOT_ICONS.nogi;
      if (name.includes('рук')) return EMPTY_SLOT_ICONS.ruki;
      if (name.includes('коль')) return EMPTY_SLOT_ICONS.kolco;
      if (name.includes('амул')) return EMPTY_SLOT_ICONS.amulet;
      if (name.includes('аксесс') || name.includes('украш')) return EMPTY_SLOT_ICONS.ykr;
      if (name.includes('пояс')) return EMPTY_SLOT_ICONS.poyas;
      if (name.includes('плащ')) return EMPTY_SLOT_ICONS.plash;
      return null;
    }

    function getGroupKey(entry, tab) {
      const slot = normalizeText(entry.slot);
      if (tab === 'general') {
        if (isPotion(entry)) return 'potions';
        if (isScroll(entry)) return 'scrolls';
        if (isAccessory(entry)) return 'accessories';
        return 'misc';
      }
      return 'all';
    }

    const realInventory = inventory.filter((entry) => !isEmptyItem(entry));
    const equippedItems = inventory.filter(isEquipped);
    const bagItems = realInventory.filter((entry) => !isEquipped(entry));
    const generalItems = bagItems.filter((entry) => !isResource(entry) && !isQuest(entry));
    const resourceItems = bagItems.filter(isResource);
    const questItems = bagItems.filter(isQuest);

    const groupSets = {
      general: [
        { key: 'all', label: 'Все' },
        { key: 'potions', label: 'Зелья' },
        { key: 'scrolls', label: 'Свитки' },
        { key: 'accessories', label: 'Аксессуары' },
        { key: 'misc', label: 'Прочее' }
      ]
    };

    function countInGroup(items, key) {
      if (key === 'all') return items.length;
      return items.filter((entry) => getGroupKey(entry, 'general') === key).length;
    }

    function renderGroupBar(items) {
      return `
        <div class="legacy-groups" data-filter-group="general">
          ${groupSets.general.map((group, index) => `
            <button
              class="legacy-group${index === 0 ? ' active' : ''}"
              type="button"
              data-group-button="general"
              data-filter="${group.key}"
            >
              <strong>${group.label}</strong>
              <span>${countInGroup(items, group.key)} шт.</span>
            </button>
          `).join('')}
        </div>
      `;
    }

    function getActionLabels(entry, tab) {
      if (tab === 'equipment') {
        return isEmptyItem(entry) ? [] : [
          { label: 'Инфо' },
          { label: 'Снять' }
        ];
      }

      if (tab === 'general') {
        if (isWearable(entry)) {
          return [
            { label: 'Инфо' },
            { label: 'Надеть' },
            { label: 'Выкинуть', kind: 'drop' }
          ];
        }

        if (isConsumable(entry)) {
          return [
            { label: 'Инфо' },
            { label: 'Использовать' },
            { label: 'Выкинуть', kind: 'drop' }
          ];
        }

        return [
          { label: 'Инфо' },
          { label: 'Выкинуть', kind: 'drop' }
        ];
      }

      if (tab === 'resources') {
        return [
          { label: 'Инфо' },
          { label: 'Передать' },
          { label: 'Выкинуть', kind: 'drop' }
        ];
      }

      if (tab === 'quest') {
        return [{ label: 'Инфо' }];
      }

      return [];
    }

    function renderIcon(entry, tab) {
      if (tab === 'equipment' && isEmptyItem(entry)) {
        const iconPath = emptyIconPathForSlot(entry.slot);
        if (iconPath) {
          return `<img class="legacy-empty-icon" src="${iconPath}" alt="">`;
        }
      }
      return glyphForSlot(entry.slot);
    }

    function renderRow(entry, tab, actionLabels) {
      const itemName = entry.item;
      const slotName = entry.slot;
      const groupKey = tab === 'general' ? getGroupKey(entry, tab) : 'all';
      const isEmpty = isEmptyItem(entry);
      const safeActions = isEmpty ? [] : actionLabels;
      return `
        <article class="legacy-row" data-row-tab="${tab}" data-row-group="${groupKey}">
          <div class="legacy-icon">${renderIcon(entry, tab)}</div>
          <div class="legacy-copy">
            <strong>${itemName}</strong>
            <span>${slotName}</span>
          </div>
          <div class="legacy-actions">
            ${safeActions.map((action) => `
              <button
                class="legacy-action${action.kind === 'drop' ? ' drop' : ''}"
                type="button"
                data-item-action="${action.label}"
                data-item-name="${itemName}"
                data-item-slot="${slotName}"
                data-item-tab="${tab}"
              >${action.label}</button>
            `).join('')}
          </div>
        </article>
      `;
    }

    function renderSimpleList(tab, items, actionFactory, emptyText) {
      if (!items.length) {
        return `<div class="legacy-empty">${emptyText}</div>`;
      }
      return `
        <div class="legacy-list">
          ${items.map((entry) => renderRow(entry, tab, actionFactory(entry))).join('')}
        </div>
      `;
    }

    function parseStackedItem(entry) {
      const match = String(entry.item || '').match(/^\s*(\d+)\s*x\s*(.+?)\s*$/i);
      if (!match) return null;
      return {
        count: Number(match[1]),
        baseName: match[2]
      };
    }

    q('app').innerHTML = `
      <div class="single-page-layout inventory-shell">
        <div class="inventory-tabs">
          <button class="inventory-tab active" type="button" data-tab="equipment">Экипировка</button>
          <button class="inventory-tab" type="button" data-tab="general">Общее</button>
          <button class="inventory-tab" type="button" data-tab="resources">Ресурсы</button>
          <button class="inventory-tab" type="button" data-tab="quest">Квестовые предметы</button>
        </div>

        <div class="inventory-body">
          <section class="inventory-panel">
            <div class="inventory-panel-inner">
              <div class="tab-panel active" data-panel="equipment">
                ${renderSimpleList(
                  'equipment',
                  equippedItems,
                  (entry) => getActionLabels(entry, 'equipment'),
                  'На персонаже сейчас ничего не надето.'
                )}
              </div>

              <div class="tab-panel" data-panel="general">
                ${renderGroupBar(generalItems)}
                ${renderSimpleList(
                  'general',
                  generalItems,
                  (entry) => getActionLabels(entry, 'general'),
                  'В общем разделе пока пусто.'
                )}
              </div>

              <div class="tab-panel" data-panel="resources">
                ${renderSimpleList(
                  'resources',
                  resourceItems,
                  (entry) => getActionLabels(entry, 'resources'),
                  'Предметов с отметкой ресурса пока нет.'
                )}
              </div>

              <div class="tab-panel" data-panel="quest">
                ${renderSimpleList(
                  'quest',
                  questItems,
                  (entry) => getActionLabels(entry, 'quest'),
                  'Предметов с отметкой квест пока нет.'
                )}
              </div>
            </div>
          </section>
        </div>
      </div>
      ${renderBottomNav('inventory')}
    `;

    const tabs = [...document.querySelectorAll('[data-tab]')];
    const panels = [...document.querySelectorAll('[data-panel]')];

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach((item) => item.classList.toggle('active', item === tab));
        panels.forEach((panel) => panel.classList.toggle('active', panel.dataset.panel === target));
      });
    });

    document.querySelectorAll('[data-group-button="general"]').forEach((button) => {
      button.addEventListener('click', () => {
        const filter = button.dataset.filter;
        document.querySelectorAll('[data-group-button="general"]').forEach((item) => {
          item.classList.toggle('active', item === button);
        });
        document.querySelectorAll('[data-row-tab="general"]').forEach((row) => {
          row.classList.toggle('hidden', filter !== 'all' && row.dataset.rowGroup !== filter);
        });
      });
    });

    document.querySelectorAll('[data-item-action]').forEach((button) => {
      button.addEventListener('click', () => {
        const action = button.dataset.itemAction;
        const itemName = button.dataset.itemName;
        const slotName = button.dataset.itemSlot;

        if (action === 'Снять') {
          const equippedIndex = state.hero.inventory.findIndex((entry) => (
            isEquipped(entry) &&
            entry.slot === slotName &&
            entry.item === itemName
          ));

          if (equippedIndex === -1) {
            showToast('Предмет уже снят.');
            return;
          }

          const equippedEntry = state.hero.inventory[equippedIndex];
          state.hero.inventory[equippedIndex] = {
            slot: equippedEntry.slot,
            item: 'Пусто',
            type: 'Надето'
          };
          state.hero.inventory.push({
            slot: equippedEntry.slot,
            item: equippedEntry.item,
            type: 'Сумка'
          });
          saveState(state);
          showToast(`Снято: ${itemName}`);
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        if (action === 'Надеть') {
          const bagIndex = state.hero.inventory.findIndex((entry) => (
            !isEquipped(entry) &&
            entry.slot === slotName &&
            entry.item === itemName
          ));

          if (bagIndex === -1) {
            showToast('Предмет не найден в сумке.');
            return;
          }

          const bagEntry = state.hero.inventory[bagIndex];
          const equippedIndex = state.hero.inventory.findIndex((entry) => (
            isEquipped(entry) &&
            entry.slot === slotName
          ));

          if (equippedIndex !== -1) {
            const equippedEntry = state.hero.inventory[equippedIndex];
            if (!isEmptyItem(equippedEntry)) {
              state.hero.inventory.push({
                slot: equippedEntry.slot,
                item: equippedEntry.item,
                type: 'Сумка'
              });
            }
            state.hero.inventory[equippedIndex] = {
              slot: slotName,
              item: itemName,
              type: 'Надето'
            };
          } else {
            state.hero.inventory.push({
              slot: slotName,
              item: itemName,
              type: 'Надето'
            });
          }

          state.hero.inventory.splice(bagIndex, 1);
          saveState(state);
          showToast(`Надето: ${itemName}`);
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        if (action === 'Использовать') {
          const bagIndex = state.hero.inventory.findIndex((entry) => (
            !isEquipped(entry) &&
            entry.slot === slotName &&
            entry.item === itemName
          ));

          if (bagIndex === -1) {
            showToast('Предмет не найден в сумке.');
            return;
          }

          const bagEntry = state.hero.inventory[bagIndex];
          const stack = parseStackedItem(bagEntry);

          if (stack && stack.count > 1) {
            state.hero.inventory[bagIndex] = {
              ...bagEntry,
              item: `${stack.count - 1} x ${stack.baseName}`
            };
          } else {
            state.hero.inventory.splice(bagIndex, 1);
          }

          saveState(state);
          showToast(`Использовано: ${itemName}`);
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        showToast(`${action}: ${itemName}`);
      });
    });
  </script>
</body>
</html>
