  <title>Инвентарь</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css?v=20260421-telegram-21">
  <style>
    .inventory-shell {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      padding-top: 4px;
    }

    .inventory-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      align-items: stretch;
    }

    .inventory-tab {
      min-height: 52px;
      padding: 10px 8px;
      border: 1px solid rgba(214, 178, 116, .12);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .035), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .08), rgba(214, 178, 116, 0) 64%);
      color: rgba(243, 237, 222, .82);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
      text-align: center;
      cursor: pointer;
      transition: border-color .18s ease, transform .18s ease, color .18s ease, background .18s ease;
    }

    .inventory-tab.active {
      color: #fff0cb;
      border-color: rgba(214, 178, 116, .34);
      background:
        linear-gradient(180deg, rgba(98, 67, 28, .92), rgba(42, 28, 11, .98)),
        radial-gradient(circle at 50% 0%, rgba(255, 228, 170, .14), rgba(255, 228, 170, 0) 64%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .05),
        0 8px 18px rgba(0, 0, 0, .18);
      transform: translateY(-1px);
    }

    .inventory-body {
      min-height: 0;
      display: grid;
    }

    .inventory-panel {
      min-height: 0;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .015)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .08), rgba(214, 178, 116, 0) 56%);
      border: 1px solid rgba(255, 255, 255, .06);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .03),
        0 20px 36px rgba(0, 0, 0, .18);
      overflow: hidden;
    }

    .inventory-panel-inner {
      height: 100%;
      min-height: 0;
      overflow: auto;
      padding: 16px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .tab-panel {
      display: none;
      min-height: 0;
      align-content: start;
      gap: 14px;
    }

    .tab-panel.active {
      display: grid;
    }

    .legacy-groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
      gap: 8px;
    }

    .legacy-group {
      padding: 10px 12px;
      border-radius: 18px;
      border: 1px solid rgba(214, 178, 116, .12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .06), rgba(214, 178, 116, 0) 62%);
      color: rgba(243, 237, 222, .82);
      display: grid;
      gap: 2px;
      text-align: left;
      cursor: pointer;
      transition: border-color .18s ease, transform .18s ease, color .18s ease, background .18s ease;
    }

    .legacy-group.active {
      color: #fff0cb;
      border-color: rgba(214, 178, 116, .32);
      background:
        linear-gradient(180deg, rgba(98, 67, 28, .92), rgba(42, 28, 11, .98)),
        radial-gradient(circle at 50% 0%, rgba(255, 228, 170, .12), rgba(255, 228, 170, 0) 64%);
      transform: translateY(-1px);
    }

    .legacy-group strong {
      font-size: 13px;
      color: inherit;
    }

    .legacy-group span {
      font-size: 11px;
      color: rgba(243, 237, 222, .64);
    }

    .paperdoll-board {
      display: grid;
      gap: 12px;
      padding: 10px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .012)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .07), rgba(214, 178, 116, 0) 64%);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .paperdoll-grid {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) 88px;
      grid-template-areas:
        "head center earring1"
        "body center earring2"
        "legs center necklace"
        "gloves center ring1"
        "boots center ring2"
        "weapon weapon weapon";
      gap: 10px 12px;
      align-items: stretch;
    }

    .paper-slot {
      min-height: 82px;
      padding: 8px 6px 10px;
      border-radius: 18px;
      border: 1px solid rgba(214, 178, 116, .14);
      background:
        linear-gradient(180deg, rgba(68, 46, 19, .95), rgba(31, 20, 8, .98)),
        radial-gradient(circle at 50% 0%, rgba(255, 228, 170, .08), rgba(255, 228, 170, 0) 66%);
      display: grid;
      align-content: start;
      justify-items: center;
      gap: 6px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .04),
        0 10px 18px rgba(0, 0, 0, .16);
    }

    .paper-slot.weapon-slot {
      grid-template-columns: 56px minmax(0, 1fr) auto;
      align-items: center;
      justify-items: start;
      min-height: 72px;
      padding: 10px 12px;
    }

    .paper-slot.has-item {
      border-color: rgba(214, 178, 116, .28);
      background:
        linear-gradient(180deg, rgba(92, 61, 24, .96), rgba(40, 26, 10, .98)),
        radial-gradient(circle at 50% 0%, rgba(255, 228, 170, .14), rgba(255, 228, 170, 0) 66%);
    }

    .paper-slot-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 234, 190, .14), rgba(255, 234, 190, 0) 46%),
        linear-gradient(180deg, rgba(89, 59, 22, .95), rgba(38, 25, 10, .98));
      border: 1px solid rgba(214, 178, 116, .16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05);
    }

    .paper-slot-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 12px;
    }

    .paper-slot-label {
      color: rgba(243, 237, 222, .72);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-align: center;
    }

    .paper-slot-name {
      color: #fff0cb;
      font-size: 12px;
      line-height: 1.25;
      text-align: center;
      word-break: break-word;
    }

    .paper-slot-name.empty {
      color: rgba(243, 237, 222, .48);
    }

    .paper-slot-action {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(214, 178, 116, .18);
      background: rgba(255, 255, 255, .04);
      color: #f6dfae;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .paper-slot-action:hover,
    .paper-slot-action:focus-visible {
      border-color: rgba(214, 178, 116, .30);
      background: rgba(214, 178, 116, .10);
      transform: translateY(-1px);
    }

    .paperdoll-center {
      grid-area: center;
      min-height: 454px;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(10, 10, 14, .14), rgba(10, 10, 14, .28)),
        radial-gradient(circle at 50% 20%, rgba(255, 224, 167, .08), rgba(255, 224, 167, 0) 36%),
        linear-gradient(180deg, rgba(57, 36, 15, .95), rgba(24, 16, 8, .98));
      border: 1px solid rgba(214, 178, 116, .16);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .05),
        0 18px 30px rgba(0, 0, 0, .20);
    }

    .paperdoll-center::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 18px;
      border: 1px solid rgba(214, 178, 116, .14);
      pointer-events: none;
    }

    .paperdoll-stage {
      position: absolute;
      inset: 0;
      background-position: center;
      background-size: cover;
      opacity: .82;
      filter: saturate(.92);
    }

    .paperdoll-stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(8, 9, 13, .10), rgba(8, 9, 13, .28)),
        radial-gradient(circle at 50% 76%, rgba(255, 230, 184, .18), rgba(255, 230, 184, 0) 28%);
    }

    .paperdoll-preview {
      position: absolute;
      inset: 30px 18px 18px;
      display: grid;
      place-items: end center;
      pointer-events: none;
    }

    .paperdoll-preview .character-box {
      width: min(100%, 170px);
      transform-origin: bottom center;
      filter: drop-shadow(0 16px 18px rgba(0, 0, 0, .34));
    }

    .paperdoll-column-left {
      display: grid;
      gap: 10px;
    }

    .paperdoll-column-right {
      display: grid;
      gap: 10px;
    }

    .paperdoll-slot-head { grid-area: head; }
    .paperdoll-slot-body { grid-area: body; }
    .paperdoll-slot-legs { grid-area: legs; }
    .paperdoll-slot-gloves { grid-area: gloves; }
    .paperdoll-slot-boots { grid-area: boots; }
    .paperdoll-slot-necklace { grid-area: necklace; }
    .paperdoll-slot-earring1 { grid-area: earring1; }
    .paperdoll-slot-earring2 { grid-area: earring2; }
    .paperdoll-slot-ring1 { grid-area: ring1; }
    .paperdoll-slot-ring2 { grid-area: ring2; }
    .paperdoll-slot-weapon { grid-area: weapon; }

    .paperdoll-footer {
      display: grid;
      gap: 6px;
      justify-items: center;
      text-align: center;
      color: rgba(243, 237, 222, .66);
      font-size: 12px;
      line-height: 1.45;
    }

    .paperdoll-footer strong {
      color: #fff0cb;
      font-size: 14px;
      font-weight: 800;
    }

    .legacy-list {
      display: grid;
      gap: 10px;
    }

    .legacy-row {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .015)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .06), rgba(214, 178, 116, 0) 62%);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .legacy-row.hidden {
      display: none;
    }

    .legacy-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: #f8e5bc;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 234, 190, .14), rgba(255, 234, 190, 0) 46%),
        linear-gradient(180deg, rgba(89, 59, 22, .95), rgba(38, 25, 10, .98));
      border: 1px solid rgba(214, 178, 116, .16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05);
    }

    .legacy-empty-icon {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: auto;
      border-radius: 12px;
    }

    .legacy-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .legacy-copy strong {
      color: #fff1cb;
      font-size: 15px;
    }

    .legacy-copy span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .legacy-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .legacy-action {
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(214, 178, 116, .14);
      background: rgba(255, 255, 255, .04);
      color: #f6dfae;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .legacy-action:hover,
    .legacy-action:focus-visible {
      border-color: rgba(214, 178, 116, .28);
      background: rgba(214, 178, 116, .10);
      transform: translateY(-1px);
    }

    .legacy-action.drop {
      color: #ffb18a;
      border-color: rgba(255, 123, 84, .18);
    }

    .legacy-empty {
      min-height: 200px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .025), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .05), rgba(214, 178, 116, 0) 60%);
      border: 1px dashed rgba(214, 178, 116, .16);
      color: rgba(243, 237, 222, .72);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 560px) {
      .inventory-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .inventory-panel-inner {
        padding: 14px;
      }

      .legacy-row {
        grid-template-columns: 42px minmax(0, 1fr);
      }

      .legacy-icon {
        width: 42px;
        height: 42px;
      }

      .legacy-actions {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }

      .paperdoll-grid {
        grid-template-columns: 74px minmax(0, 1fr) 74px;
        gap: 8px;
      }

      .paper-slot {
        min-height: 74px;
        padding: 8px 4px;
      }

      .paper-slot.weapon-slot {
        grid-template-columns: 42px minmax(0, 1fr);
      }

      .paper-slot-icon {
        width: 40px;
        height: 40px;
      }

      .paper-slot-name {
        font-size: 11px;
      }

      .paperdoll-center {
        min-height: 360px;
      }

      .paperdoll-preview {
        inset: 24px 14px 14px;
      }

      .paperdoll-preview .character-box {
        width: min(100%, 132px);
      }
    }
  </style>
</head>
<body>
  <div class="screen-page">
    <div class="app-shell" id="app"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="common.js?v=20260421-telegram-21"></script>
  <script>
    let state = loadState();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    let inventory = Array.isArray(state.hero.inventory) ? state.hero.inventory : [];

    function normalizeText(value) {
      return String(value || '').toLowerCase();
    }

    const EQUIP_SLOTS = [
      { id: 'weapon', family: 'weapon', label: 'Меч', emptyIcon: 'weapon' },
      { id: 'head', family: 'head', label: 'Шлем', emptyIcon: 'golova' },
      { id: 'body', family: 'body', label: 'Тело', emptyIcon: 'body' },
      { id: 'legs', family: 'legs', label: 'Низ', emptyIcon: 'plash' },
      { id: 'gloves', family: 'gloves', label: 'Перчатки', emptyIcon: 'ruki' },
      { id: 'boots', family: 'boots', label: 'Ботинки', emptyIcon: 'nogi' },
      { id: 'necklace', family: 'necklace', label: 'Ожерелье', emptyIcon: 'amulet' },
      { id: 'earring1', family: 'earring', label: 'Серьга I', emptyIcon: 'ykr' },
      { id: 'earring2', family: 'earring', label: 'Серьга II', emptyIcon: 'ykr' },
      { id: 'ring1', family: 'ring', label: 'Кольцо I', emptyIcon: 'kolco' },
      { id: 'ring2', family: 'ring', label: 'Кольцо II', emptyIcon: 'kolco2' }
    ];

    const SLOT_MAP = Object.fromEntries(EQUIP_SLOTS.map((slot) => [slot.id, slot]));

    const ITEM_LIBRARY = {
      'железный меч': {
        family: 'weapon',
        stats: { patt: 8, matt: 6 }
      },
      'club': {
        family: 'weapon',
        stats: { patt: 8, matt: 6 }
      },
      'кожаный доспех': {
        family: 'body',
        setKey: 'leather-init',
        setPart: 'body',
        stats: { pdef: 35, mdef: 0 }
      },
      'cotton robe': {
        family: 'body',
        setKey: 'starter-magic',
        setPart: 'body',
        stats: { pdef: 35, mdef: 0 }
      },
      'кожаный низ': {
        family: 'legs',
        setKey: 'leather-init',
        setPart: 'legs',
        stats: { pdef: 16, mdef: 0 }
      },
      'кожаные перчатки': {
        family: 'gloves',
        setKey: 'leather-init',
        setPart: 'gloves',
        stats: { pdef: 8, mdef: 0 }
      },
      'кожаные ботинки': {
        family: 'boots',
        setKey: 'leather-init',
        setPart: 'boots',
        stats: { pdef: 8, mdef: 0 }
      },
      'железный шлем': {
        family: 'head',
        stats: { pdef: 14, mdef: 0 }
      },
      'necklace of magic': {
        family: 'necklace',
        stats: { pdef: 0, mdef: 15 }
      },
      'ожерелье ученика': {
        family: 'necklace',
        stats: { pdef: 0, mdef: 8 }
      },
      'серьга ученика': {
        family: 'earring',
        stats: { pdef: 0, mdef: 4 }
      },
      'кольцо ученика': {
        family: 'ring',
        stats: { pdef: 0, mdef: 4 }
      }
    };

    const SET_LIBRARY = {
      'leather-init': {
        name: 'Кожаный комплект новобранца',
        thresholds: {
          2: { pdef: 6 },
          3: { pdef: 12 },
          4: { pdef: 18, mdef: 6 }
        }
      },
      'starter-magic': {
        name: 'Комплект ученика мага',
        thresholds: {
          2: { mdef: 8 },
          3: { mdef: 12, matt: 4 }
        }
      }
    };

    const STAT_LABELS = {
      patt: 'P.Atk',
      matt: 'M.Atk',
      pdef: 'P.Def',
      mdef: 'M.Def'
    };

    function isEquipped(entry) {
      return normalizeText(entry.type).includes('над');
    }

    function isEmptyItem(entry) {
      return normalizeText(entry.item).trim() === 'пусто';
    }

    function parseStackedItem(entry) {
      const match = String(entry.item || '').match(/^\s*(\d+)\s*x\s*(.+?)\s*$/i);
      if (!match) return null;
      return {
        count: Number(match[1]),
        baseName: match[2]
      };
    }

    function getBaseItemName(entry) {
      const stack = parseStackedItem(entry);
      return String(stack ? stack.baseName : entry.item || '').trim();
    }

    function inferFamilyFromEntry(entry) {
      const text = normalizeText(`${entry.slot || ''} ${getBaseItemName(entry)}`);
      if (text.includes('оруж') || text.includes('меч') || text.includes('club') || text.includes('weapon')) return 'weapon';
      if (text.includes('шлем') || text.includes('голов') || text.includes('helmet')) return 'head';
      if (text.includes('брон') || text.includes('доспех') || text.includes('armor') || text.includes('robe')) return 'body';
      if (text.includes('низ') || text.includes('понож') || text.includes('штаны') || text.includes('legs')) return 'legs';
      if (text.includes('перчат') || text.includes('gloves') || text.includes('рук')) return 'gloves';
      if (text.includes('ботин') || text.includes('сап') || text.includes('boots') || text.includes('ноги')) return 'boots';
      if (text.includes('ожер') || text.includes('амул') || text.includes('necklace')) return 'necklace';
      if (text.includes('серьг') || text.includes('earring')) return 'earring';
      if (text.includes('коль') || text.includes('ring')) return 'ring';
      return null;
    }

    function getItemBlueprint(entry) {
      return ITEM_LIBRARY[normalizeText(getBaseItemName(entry))] || null;
    }

    function getPrimaryEquipSlotId(family) {
      return {
        weapon: 'weapon',
        head: 'head',
        body: 'body',
        legs: 'legs',
        gloves: 'gloves',
        boots: 'boots',
        necklace: 'necklace',
        ring: 'ring1',
        earring: 'earring1'
      }[family] || null;
    }

    function getBagSlotLabel(family) {
      return {
        weapon: 'Оружие',
        head: 'Шлем',
        body: 'Броня',
        legs: 'Низ',
        gloves: 'Перчатки',
        boots: 'Ботинки',
        necklace: 'Ожерелье',
        ring: 'Кольцо',
        earring: 'Серьга'
      }[family] || 'Экипировка';
    }

    function getEntryMeta(entry) {
      const blueprint = getItemBlueprint(entry);
      const family = entry.equipFamily || blueprint?.family || inferFamilyFromEntry(entry);
      return {
        family,
        stats: entry.stats || blueprint?.stats || {},
        setKey: entry.setKey || blueprint?.setKey || null,
        setPart: entry.setPart || blueprint?.setPart || family || null
      };
    }

    function normalizeInventorySchema(entries) {
      let changed = false;
      let ringIndex = 0;
      let earringIndex = 0;
      const seed = Date.now().toString(36);

      const normalized = entries.map((raw, index) => {
        const entry = { ...raw };
        const family = getEntryMeta(entry).family;

        if (!entry.uid) {
          entry.uid = `inv-${seed}-${index}`;
          changed = true;
        }

        if (family && entry.equipFamily !== family) {
          entry.equipFamily = family;
          changed = true;
        }

        if (!entry.category) {
          const slotText = normalizeText(entry.slot);
          const itemText = normalizeText(getBaseItemName(entry));
          if (slotText.includes('матер')) {
            entry.category = 'resource';
          } else if (slotText.includes('квест')) {
            entry.category = 'quest';
          } else if (slotText.includes('зель') || slotText.includes('свит') || itemText.includes('эликсир') || itemText.includes('элексир')) {
            entry.category = 'consumable';
          } else if (family) {
            entry.category = 'wearable';
          } else {
            entry.category = 'general';
          }
          changed = true;
        }

        const blueprint = getItemBlueprint(entry);
        if ((!entry.stats || typeof entry.stats !== 'object') && blueprint?.stats) {
          entry.stats = blueprint.stats;
          changed = true;
        }
        if (!entry.setKey && blueprint?.setKey) {
          entry.setKey = blueprint.setKey;
          changed = true;
        }
        if (!entry.setPart && blueprint?.setPart) {
          entry.setPart = blueprint.setPart;
          changed = true;
        }

        if (isEquipped(entry) && !entry.equipSlot && family) {
          if (family === 'ring') {
            ringIndex += 1;
            entry.equipSlot = ringIndex === 2 ? 'ring2' : 'ring1';
          } else if (family === 'earring') {
            earringIndex += 1;
            entry.equipSlot = earringIndex === 2 ? 'earring2' : 'earring1';
          } else {

          }
          changed = true;
        }

        if (isEquipped(entry) && entry.equipSlot && SLOT_MAP[entry.equipSlot] && entry.slot !== SLOT_MAP[entry.equipSlot].label) {

        }

          const bagLabel = getBagSlotLabel(family);
          if (entry.slot !== bagLabel && entry.category !== 'resource' && entry.category !== 'quest' && entry.category !== 'consumable') {

            changed = true;
          }

            changed = true;
          }
        }

      });

    const normalizedInventory = normalizeInventorySchema(inventory);
    inventory = normalizedInventory.inventory;

    if (normalizedInventory.changed) {

    function isResource(entry) {
      return entry.category === 'resource' || normalizeText(entry.slot).includes('матер');
    }

    function isQuest(entry) {
      return entry.category === 'quest' || normalizeText(entry.slot).includes('квест');
    }

    function isPotion(entry) {
      return entry.category === 'consumable' && normalizeText(entry.slot).includes('зель');
    }

    function isScroll(entry) {
      return entry.category === 'consumable' && normalizeText(entry.slot).includes('свит');
    }

    function isAccessory(entry) {
      return ['necklace', 'ring', 'earring'].includes(getEntryMeta(entry).family);
    }

    function isWearable(entry) {
      return Boolean(getEntryMeta(entry).family);
    }

    function isConsumable(entry) {
      const item = normalizeText(getBaseItemName(entry));
      return entry.category === 'consumable' || isPotion(entry) || isScroll(entry) || item.includes('эликсир') || item.includes('элексир');
    }

    function glyphForSlot(slot) {

      if (name.includes('legs') || name.includes('низ')) return '⌖';
      if (name.includes('gloves') || name.includes('перчат') || name.includes('рук')) return '🧤';
      if (name.includes('boots') || name.includes('ботин') || name.includes('сап') || name.includes('ног')) return '🥾';
      if (name.includes('necklace') || name.includes('ожер') || name.includes('амул')) return '✦';
      if (name.includes('earring') || name.includes('серьг')) return '◈';
      if (name.includes('ring') || name.includes('коль')) return '◌';
      if (name.includes('зель')) return '✚';
      if (name.includes('свит')) return '✧';
      if (name.includes('матер')) return '◆';
      if (name.includes('квест')) return '✪';
      return '⬠';
    }

    };

    function emptyIconPathForSlot(slot) {
      const name = normalizeText(slot);
      if (name.includes('ring2') || name.includes('кольцо ii')) return EMPTY_SLOT_ICONS.kolco2;
      if (name.includes('earring') || name.includes('серьга')) return EMPTY_SLOT_ICONS.ykr;
      if (name.includes('оруж')) return EMPTY_SLOT_ICONS.weapon;
      if (name.includes('weapon')) return EMPTY_SLOT_ICONS.weapon;
      if (name.includes('брон')) return EMPTY_SLOT_ICONS.body;
      if (name.includes('body') || name.includes('тело')) return EMPTY_SLOT_ICONS.body;
      if (name.includes('шлем') || name.includes('голов')) return EMPTY_SLOT_ICONS.golova;
      if (name.includes('head')) return EMPTY_SLOT_ICONS.golova;
      if (name.includes('сап') || name.includes('ботин')) return EMPTY_SLOT_ICONS.nogi;
      if (name.includes('legs') || name.includes('низ') || name.includes('pants')) return EMPTY_SLOT_ICONS.plash;
      if (name.includes('boots') || name.includes('ботинки')) return EMPTY_SLOT_ICONS.nogi;
      if (name.includes('рук')) return EMPTY_SLOT_ICONS.ruki;
      if (name.includes('gloves') || name.includes('перчат')) return EMPTY_SLOT_ICONS.ruki;
      if (name.includes('коль')) return EMPTY_SLOT_ICONS.kolco;
      if (name.includes('ring1')) return EMPTY_SLOT_ICONS.kolco;
      if (name.includes('амул')) return EMPTY_SLOT_ICONS.amulet;
      if (name.includes('necklace') || name.includes('ожер')) return EMPTY_SLOT_ICONS.amulet;
      if (name.includes('аксесс') || name.includes('украш')) return EMPTY_SLOT_ICONS.ykr;
      if (name.includes('пояс')) return EMPTY_SLOT_ICONS.poyas;
      if (name.includes('плащ')) return EMPTY_SLOT_ICONS.plash;
      return null;
    }

    function emptyIconPathForEquipSlot(slotId) {
      const slot = SLOT_MAP[slotId];
      if (!slot) return null;
      return EMPTY_SLOT_ICONS[slot.emptyIcon] || emptyIconPathForSlot(slot.emptyIcon || slotId);
    }

    function getGroupKey(entry, tab) {
      const slot = normalizeText(entry.slot);
      if (tab === 'general') {
        if (isPotion(entry)) return 'potions';
        if (isScroll(entry)) return 'scrolls';
        if (isAccessory(entry)) return 'accessories';
        return 'misc';
      }
      return 'all';
    }

    function buildEquipmentEntries(entries) {
      const equippedMap = new Map(
        entries
          .filter(isEquipped)
          .filter((entry) => entry.equipSlot)
          .map((entry) => [entry.equipSlot, entry])
      );

      return EQUIP_SLOTS.map((slot) => (
        equippedMap.get(slot.id) || {
          uid: `empty-${slot.id}`,
          slot: slot.label,
          item: 'Пусто',
          type: 'Надето',
          equipSlot: slot.id,
          equipFamily: slot.family,
          category: 'wearable'
        }
      ));
    }

    function addStats(target, stats) {
      Object.keys(STAT_LABELS).forEach((key) => {
        target[key] = (target[key] || 0) + Number(stats?.[key] || 0);
      });
      return target;
    }

    function formatStatLine(stats) {
      return Object.entries(STAT_LABELS)
        .filter(([key]) => Number(stats[key] || 0) > 0)
        .map(([key, label]) => `${label} +${stats[key]}`)
        .join(' • ');
    }

    function computeEquipmentBonuses(entries) {
      const activeItems = entries.filter((entry) => !isEmptyItem(entry));
      const direct = addStats({ patt: 0, matt: 0, pdef: 0, mdef: 0 }, {});
      const setTotal = addStats({ patt: 0, matt: 0, pdef: 0, mdef: 0 }, {});
      const setCounters = {};
      const setSummaries = [];

      activeItems.forEach((entry) => {
        const meta = getEntryMeta(entry);
        addStats(direct, meta.stats);
        if (meta.setKey) {
          if (!setCounters[meta.setKey]) {
            setCounters[meta.setKey] = { parts: new Set(), count: 0 };
          }
          setCounters[meta.setKey].count += 1;
          if (meta.setPart) {
            setCounters[meta.setKey].parts.add(meta.setPart);
          }
        }
      });

      Object.entries(setCounters).forEach(([setKey, payload]) => {
        const config = SET_LIBRARY[setKey];
        if (!config) return;
        const activeBonus = { patt: 0, matt: 0, pdef: 0, mdef: 0 };
        Object.keys(config.thresholds)
          .map(Number)
          .sort((a, b) => a - b)
          .forEach((threshold) => {
            if (payload.parts.size >= threshold) {
              addStats(activeBonus, config.thresholds[threshold]);
            }
          });
        if (formatStatLine(activeBonus)) {
          addStats(setTotal, activeBonus);
          setSummaries.push({
            name: config.name,
            parts: payload.parts.size,
            bonusText: formatStatLine(activeBonus)
          });
        }
      });

      return {
        direct,
        setTotal,
        total: addStats({ patt: 0, matt: 0, pdef: 0, mdef: 0 }, direct) && addStats(direct, setTotal),
        setSummaries
      };
    }

    function renderEquipmentSummary(entries) {
      const bonuses = computeEquipmentBonuses(entries);
      const totalStats = bonuses.total;
      return `
        <section class="equip-summary">
          <div>
            <strong>Бонусы экипировки</strong>
            <p>Старая логика сохранена по смыслу: вещь даёт свои статы, а собранные части комплекта добавляют бонус сверху.</p>
          </div>
          <div class="equip-stat-grid">
            ${Object.entries(STAT_LABELS).map(([key, label]) => `
              <div class="equip-stat-chip">
                <span>${label}</span>
                <b>+${Number(totalStats[key] || 0)}</b>
              </div>
            `).join('')}
          </div>
          ${bonuses.setSummaries.length ? `
            <div class="equip-sets">
              ${bonuses.setSummaries.map((set) => `
                <div class="equip-set-chip">
                  <span>${set.name} • частей: ${set.parts}</span>
                  <b>${set.bonusText}</b>
                </div>
              `).join('')}
            </div>
          ` : ''}
        </section>
      `;
    }

    function renderEquipmentSlot(entry) {
      const slot = SLOT_MAP[entry.equipSlot];
      const isEmpty = isEmptyItem(entry);
      const iconPath = emptyIconPathForEquipSlot(entry.equipSlot);
      const actionButton = isEmpty ? '' : `
        <button
          class="paper-slot-action"
          type="button"
          data-item-action="Снять"
          data-item-uid="${entry.uid || ''}"
          data-item-name="${entry.item}"
          data-item-slot="${entry.slot}"
          data-item-tab="equipment"
        >Снять</button>
      `;

      return `
        <article class="paper-slot paperdoll-slot-${entry.equipSlot}${entry.equipSlot === 'weapon' ? ' weapon-slot' : ''}${isEmpty ? '' : ' has-item'}">
          <div class="paper-slot-icon">
            ${iconPath ? `<img src="${iconPath}" alt="">` : glyphForSlot(slot?.label || entry.slot)}
          </div>
          <div class="paper-slot-label">${slot?.label || entry.slot}</div>
          <div class="paper-slot-name${isEmpty ? ' empty' : ''}">${isEmpty ? 'Пусто' : entry.item}</div>
          ${actionButton}
        </article>
      `;
    }

    function renderEquipmentPaperdoll(entries) {
      return `
        <section class="paperdoll-board">
          <div class="paperdoll-grid">
            ${entries.map((entry) => renderEquipmentSlot(entry)).join('')}
            <div class="paperdoll-center">
              <div class="paperdoll-stage" id="inventoryPaperdollStage"></div>
              <div class="paperdoll-preview">
                <div class="character-box" id="inventoryPaperdollPreviewRoot">
                  ${characterMarkup()}
                </div>
              </div>
            </div>
          </div>
          <div class="paperdoll-footer">
            <strong>${state.hero.nickname}</strong>
            <span>Экипировка персонажа вынесена в полный paperdoll-формат. Бонусы комплекта добавим отдельно в пассивные навыки.</span>
          </div>
        </section>
      `;
    }

    function findTargetEquipSlotId(entry, entries) {
      const { family } = getEntryMeta(entry);
      if (!family) return null;

      if (family === 'ring') {
        const occupied = new Set(entries.filter(isEquipped).map((item) => item.equipSlot));
        return ['ring1', 'ring2'].find((slotId) => !occupied.has(slotId)) || null;
      }

      if (family === 'earring') {
        const occupied = new Set(entries.filter(isEquipped).map((item) => item.equipSlot));
        return ['earring1', 'earring2'].find((slotId) => !occupied.has(slotId)) || null;
      }

      return getPrimaryEquipSlotId(family);
    }

    const realInventory = inventory.filter((entry) => !isEmptyItem(entry));
    const equippedItems = buildEquipmentEntries(inventory);
    const bagItems = realInventory.filter((entry) => !isEquipped(entry));
    const generalItems = bagItems.filter((entry) => !isResource(entry) && !isQuest(entry));
    const resourceItems = bagItems.filter(isResource);
    const questItems = bagItems.filter(isQuest);

    const groupSets = {
      general: [
        { key: 'all', label: 'Все' },
        { key: 'potions', label: 'Зелья' },
        { key: 'scrolls', label: 'Свитки' },
        { key: 'accessories', label: 'Аксессуары' },
        { key: 'misc', label: 'Прочее' }
      ]
    };

    function countInGroup(items, key) {
      if (key === 'all') return items.length;
      return items.filter((entry) => getGroupKey(entry, 'general') === key).length;
    }

    function renderGroupBar(items) {
      return `
        <div class="legacy-groups" data-filter-group="general">
          ${groupSets.general.map((group, index) => `
            <button
              class="legacy-group${index === 0 ? ' active' : ''}"
              type="button"
              data-group-button="general"
              data-filter="${group.key}"
            >
              <strong>${group.label}</strong>
              <span>${countInGroup(items, group.key)} шт.</span>
            </button>
          `).join('')}
        </div>
      `;
    }

    function getActionLabels(entry, tab) {
      if (tab === 'equipment') {
        return isEmptyItem(entry) ? [] : [
          { label: 'Инфо' },
          { label: 'Снять' }
        ];
      }

      if (tab === 'general') {
        if (isWearable(entry)) {
          return [
            { label: 'Инфо' },
            { label: 'Надеть' },
            { label: 'Выкинуть', kind: 'drop' }
          ];
        }

        if (isConsumable(entry)) {
          return [
            { label: 'Инфо' },
            { label: 'Использовать' },
            { label: 'Выкинуть', kind: 'drop' }
          ];
        }

        return [
          { label: 'Инфо' },
          { label: 'Выкинуть', kind: 'drop' }
        ];
      }

      if (tab === 'resources') {
        return [
          { label: 'Инфо' },
          { label: 'Передать' },
          { label: 'Выкинуть', kind: 'drop' }
        ];
      }

      if (tab === 'quest') {
        return [{ label: 'Инфо' }];
      }

      return [];
    }

    function renderIcon(entry, tab) {
      if (tab === 'equipment' && isEmptyItem(entry)) {
        const iconPath = emptyIconPathForSlot(entry.equipSlot || entry.slot);
        if (iconPath) {
          return `<img class="legacy-empty-icon" src="${iconPath}" alt="">`;
        }
      }
      return glyphForSlot(entry.slot);
    }

    function renderRow(entry, tab, actionLabels) {
      const itemName = entry.item;
      const slotName = entry.slot;
      const groupKey = tab === 'general' ? getGroupKey(entry, tab) : 'all';
      const isEmpty = isEmptyItem(entry);
      const safeActions = isEmpty ? [] : actionLabels;
      return `
        <article class="legacy-row" data-row-tab="${tab}" data-row-group="${groupKey}">
          <div class="legacy-icon">${renderIcon(entry, tab)}</div>
          <div class="legacy-copy">
            <strong>${itemName}</strong>
            <span>${slotName}</span>
          </div>
          <div class="legacy-actions">
            ${safeActions.map((action) => `
              <button
                class="legacy-action${action.kind === 'drop' ? ' drop' : ''}"
                type="button"
                data-item-action="${action.label}"
                data-item-uid="${entry.uid || ''}"
                data-item-name="${itemName}"
                data-item-slot="${slotName}"
                data-item-tab="${tab}"
              >${action.label}</button>
            `).join('')}
          </div>
        </article>
      `;
    }

    function renderSimpleList(tab, items, actionFactory, emptyText) {
      if (!items.length) {
        return `<div class="legacy-empty">${emptyText}</div>`;
      }
      return `
        <div class="legacy-list">
          ${items.map((entry) => renderRow(entry, tab, actionFactory(entry))).join('')}
        </div>
      `;
    }

    q('app').innerHTML = `
      <div class="single-page-layout inventory-shell">
        <div class="inventory-tabs">
          <button class="inventory-tab active" type="button" data-tab="equipment">Экипировка</button>
          <button class="inventory-tab" type="button" data-tab="general">Общее</button>
          <button class="inventory-tab" type="button" data-tab="resources">Ресурсы</button>
          <button class="inventory-tab" type="button" data-tab="quest">Квестовые предметы</button>
        </div>

        <div class="inventory-body">
          <section class="inventory-panel">
            <div class="inventory-panel-inner">
              <div class="tab-panel active" data-panel="equipment">
                ${renderEquipmentPaperdoll(equippedItems)}
              </div>

              <div class="tab-panel" data-panel="general">
                ${renderGroupBar(generalItems)}
                ${renderSimpleList(
                  'general',
                  generalItems,
                  (entry) => getActionLabels(entry, 'general'),
                  'В общем разделе пока пусто.'
                )}
              </div>

              <div class="tab-panel" data-panel="resources">
                ${renderSimpleList(
                  'resources',
                  resourceItems,
                  (entry) => getActionLabels(entry, 'resources'),
                  'Предметов с отметкой ресурса пока нет.'
                )}
              </div>

              <div class="tab-panel" data-panel="quest">
                ${renderSimpleList(
                  'quest',
                  questItems,
                  (entry) => getActionLabels(entry, 'quest'),
                  'Предметов с отметкой квест пока нет.'
                )}
              </div>
            </div>
          </section>
        </div>
      </div>
      ${renderBottomNav('inventory')}
    `;

    const inventoryPreviewRoot = q('inventoryPaperdollPreviewRoot');
    if (inventoryPreviewRoot) {
      setPreview(inventoryPreviewRoot, state.hero);
    }

    const inventoryStage = q('inventoryPaperdollStage');
    if (inventoryStage) {
      const city = getCurrentCity(state);
      safeSetBackground(
        inventoryStage,
        [city.portraitBg],
        'linear-gradient(180deg, rgba(10,12,18,.12), rgba(10,12,18,.30))'
      );
    }

    const tabs = [...document.querySelectorAll('[data-tab]')];
    const panels = [...document.querySelectorAll('[data-panel]')];

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach((item) => item.classList.toggle('active', item === tab));
        panels.forEach((panel) => panel.classList.toggle('active', panel.dataset.panel === target));
      });
    });

    document.querySelectorAll('[data-group-button="general"]').forEach((button) => {
      button.addEventListener('click', () => {
        const filter = button.dataset.filter;
        document.querySelectorAll('[data-group-button="general"]').forEach((item) => {
          item.classList.toggle('active', item === button);
        });
        document.querySelectorAll('[data-row-tab="general"]').forEach((row) => {
          row.classList.toggle('hidden', filter !== 'all' && row.dataset.rowGroup !== filter);
        });
      });
    });

    document.querySelectorAll('[data-item-action]').forEach((button) => {
      button.addEventListener('click', () => {
        const action = button.dataset.itemAction;
        const itemUid = button.dataset.itemUid;
        const itemName = button.dataset.itemName;
        const slotName = button.dataset.itemSlot;

        if (action === 'Снять') {
          const equippedIndex = state.hero.inventory.findIndex((entry) => (
            entry.uid === itemUid
          ));

          if (equippedIndex === -1) {
            showToast('Предмет уже снят.');
            return;
          }

          const equippedEntry = state.hero.inventory[equippedIndex];
          const equippedMeta = getEntryMeta(equippedEntry);
          state.hero.inventory[equippedIndex] = {
            ...equippedEntry,
            slot: getBagSlotLabel(equippedMeta.family),
            type: 'Сумка',
            equipSlot: ''
          };
          saveState(state);
          showToast(`Снято: ${itemName}`);
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        if (action === 'Надеть') {
          const bagIndex = state.hero.inventory.findIndex((entry) => (
            entry.uid === itemUid
          ));

          if (bagIndex === -1) {
            showToast('Предмет не найден в сумке.');
            return;
          }

          const bagEntry = state.hero.inventory[bagIndex];
          const targetSlotId = findTargetEquipSlotId(bagEntry, state.hero.inventory);
          const bagMeta = getEntryMeta(bagEntry);

          if (!targetSlotId) {
            showToast(
              bagMeta.family === 'ring'
                ? 'Сначала снимите одно из колец.'
                : bagMeta.family === 'earring'
                  ? 'Сначала снимите одну из серёг.'
                  : 'Для предмета не найден слот экипировки.'
            );
            return;
          }

          const equippedIndex = state.hero.inventory.findIndex((entry) => (
            isEquipped(entry) &&
            entry.equipSlot === targetSlotId
          ));

          if (equippedIndex !== -1) {
            const equippedEntry = state.hero.inventory[equippedIndex];
            const equippedMeta = getEntryMeta(equippedEntry);
            state.hero.inventory[equippedIndex] = {
              ...equippedEntry,
              slot: getBagSlotLabel(equippedMeta.family),
              type: 'Сумка',
              equipSlot: ''
            };
          }

          state.hero.inventory[bagIndex] = {
            ...bagEntry,
            slot: SLOT_MAP[targetSlotId].label,
            type: 'Надето',
            equipSlot: targetSlotId
          };

          saveState(state);
          showToast(`Надето: ${itemName}`);
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        if (action === 'Использовать') {
          const bagIndex = state.hero.inventory.findIndex((entry) => (
            !isEquipped(entry) &&
            entry.uid === itemUid
          ));

          if (bagIndex === -1) {
            showToast('Предмет не найден в сумке.');
            return;
          }

          const bagEntry = state.hero.inventory[bagIndex];
          const stack = parseStackedItem(bagEntry);

          if (stack && stack.count > 1) {
            state.hero.inventory[bagIndex] = {
              ...bagEntry,
              item: `${stack.count - 1} x ${stack.baseName}`
            };
          } else {
            state.hero.inventory.splice(bagIndex, 1);
          }

          saveState(state);
          showToast(`Использовано: ${itemName}`);
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        showToast(`${action}: ${itemName}`);
      });
    });
  </script>
</body>
</html>
