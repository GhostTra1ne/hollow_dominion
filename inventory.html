<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    (function () {
      const APP_VERSION = '20260421-telegram-11';
      const url = new URL(window.location.href);
      if (url.searchParams.get('appv') !== APP_VERSION) {
        url.searchParams.set('appv', APP_VERSION);
        window.location.replace(url.toString());
      }
      window.__HD_APP_VERSION__ = APP_VERSION;
    })();
  </script>
  <title>Инвентарь</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css?v=20260421-telegram-11">
  <style>
    .inventory-shell {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      padding-top: 4px;
    }

    .inventory-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      align-items: stretch;
    }

    .inventory-tab {
      min-height: 52px;
      padding: 10px 8px;
      border: 1px solid rgba(214, 178, 116, .12);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .035), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .08), rgba(214, 178, 116, 0) 64%);
      color: rgba(243, 237, 222, .82);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
      text-align: center;
      cursor: pointer;
      transition: border-color .18s ease, transform .18s ease, color .18s ease, background .18s ease;
    }

    .inventory-tab.active {
      color: #fff0cb;
      border-color: rgba(214, 178, 116, .34);
      background:
        linear-gradient(180deg, rgba(98, 67, 28, .92), rgba(42, 28, 11, .98)),
        radial-gradient(circle at 50% 0%, rgba(255, 228, 170, .14), rgba(255, 228, 170, 0) 64%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .05),
        0 8px 18px rgba(0, 0, 0, .18);
      transform: translateY(-1px);
    }

    .inventory-body {
      min-height: 0;
      display: grid;
    }

    .inventory-panel {
      min-height: 0;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .015)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .08), rgba(214, 178, 116, 0) 56%);
      border: 1px solid rgba(255, 255, 255, .06);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .03),
        0 20px 36px rgba(0, 0, 0, .18);
      overflow: hidden;
    }

    .inventory-panel-inner {
      height: 100%;
      min-height: 0;
      overflow: auto;
      padding: 16px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .tab-panel {
      display: none;
      min-height: 0;
      align-content: start;
      gap: 14px;
    }

    .tab-panel.active {
      display: grid;
    }

    .legacy-groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
      gap: 8px;
    }

    .legacy-group {
      padding: 10px 12px;
      border-radius: 18px;
      border: 1px solid rgba(214, 178, 116, .12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .06), rgba(214, 178, 116, 0) 62%);
      color: rgba(243, 237, 222, .82);
      display: grid;
      gap: 2px;
      text-align: left;
      cursor: pointer;
      transition: border-color .18s ease, transform .18s ease, color .18s ease, background .18s ease;
    }

    .legacy-group.active {
      color: #fff0cb;
      border-color: rgba(214, 178, 116, .32);
      background:
        linear-gradient(180deg, rgba(98, 67, 28, .92), rgba(42, 28, 11, .98)),
        radial-gradient(circle at 50% 0%, rgba(255, 228, 170, .12), rgba(255, 228, 170, 0) 64%);
      transform: translateY(-1px);
    }

    .legacy-group strong {
      font-size: 13px;
      color: inherit;
    }

    .legacy-group span {
      font-size: 11px;
      color: rgba(243, 237, 222, .64);
    }

    .legacy-list {
      display: grid;
      gap: 10px;
    }

    .legacy-row {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .015)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .06), rgba(214, 178, 116, 0) 62%);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .legacy-row.hidden {
      display: none;
    }

    .legacy-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: #f8e5bc;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 234, 190, .14), rgba(255, 234, 190, 0) 46%),
        linear-gradient(180deg, rgba(89, 59, 22, .95), rgba(38, 25, 10, .98));
      border: 1px solid rgba(214, 178, 116, .16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05);
    }

    .legacy-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .legacy-copy strong {
      color: #fff1cb;
      font-size: 15px;
    }

    .legacy-copy span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .legacy-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .legacy-action {
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(214, 178, 116, .14);
      background: rgba(255, 255, 255, .04);
      color: #f6dfae;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .legacy-action:hover,
    .legacy-action:focus-visible {
      border-color: rgba(214, 178, 116, .28);
      background: rgba(214, 178, 116, .10);
      transform: translateY(-1px);
    }

    .legacy-action.drop {
      color: #ffb18a;
      border-color: rgba(255, 123, 84, .18);
    }

    .legacy-empty {
      min-height: 200px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .025), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .05), rgba(214, 178, 116, 0) 60%);
      border: 1px dashed rgba(214, 178, 116, .16);
      color: rgba(243, 237, 222, .72);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 560px) {
      .inventory-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .inventory-panel-inner {
        padding: 14px;
      }

      .legacy-row {
        grid-template-columns: 42px minmax(0, 1fr);
      }

      .legacy-icon {
        width: 42px;
        height: 42px;
      }

      .legacy-actions {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="screen-page">
    <div class="app-shell" id="app"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="common.js?v=20260421-telegram-11"></script>
  <script>
    let state = loadState();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    const inventory = Array.isArray(state.hero.inventory) ? state.hero.inventory : [];

    function normalizeText(value) {
      return String(value || '').toLowerCase();
    }

    function isEquipped(entry) {
      return normalizeText(entry.type).includes('над');
    }

    function isResource(entry) {
      return normalizeText(entry.slot).includes('матер');
    }

    function isQuest(entry) {
      return normalizeText(entry.slot).includes('квест');
    }

    function isPotion(entry) {
      return normalizeText(entry.slot).includes('зель');
    }

    function isScroll(entry) {
      return normalizeText(entry.slot).includes('свит');
    }

    function isAccessory(entry) {
      const slot = normalizeText(entry.slot);
      return slot.includes('аксесс') || slot.includes('амул') || slot.includes('коль');
    }

    function glyphForSlot(slot) {
      const name = normalizeText(slot);
      if (name.includes('оруж')) return '⚔';
      if (name.includes('брон')) return '🛡';
      if (name.includes('шлем') || name.includes('голов')) return '⛑';
      if (name.includes('щит')) return '🛡';
      if (name.includes('сап') || name.includes('ног')) return '🥾';
      if (name.includes('рук')) return '🧤';
      if (name.includes('амул')) return '✦';
      if (name.includes('коль')) return '◌';
      if (name.includes('зель')) return '✚';
      if (name.includes('свит')) return '✧';
      if (name.includes('матер')) return '◆';
      if (name.includes('квест')) return '✪';
      if (name.includes('аксесс')) return '◈';
      return '⬠';
    }

    function getGroupKey(entry, tab) {
      const slot = normalizeText(entry.slot);
      if (tab === 'equipment') {
        if (slot.includes('оруж')) return 'weapon';
        if (slot.includes('брон') || slot.includes('body')) return 'armor';
        if (slot.includes('шлем') || slot.includes('голов')) return 'helm';
        if (slot.includes('щит')) return 'shield';
        if (slot.includes('рук')) return 'gloves';
        if (slot.includes('сап') || slot.includes('ног')) return 'boots';
        if (slot.includes('амул')) return 'amulet';
        if (slot.includes('коль')) return 'rings';
        return 'other';
      }
      if (tab === 'general') {
        if (isPotion(entry)) return 'potions';
        if (isScroll(entry)) return 'scrolls';
        if (isAccessory(entry)) return 'accessories';
        return 'misc';
      }
      if (tab === 'resources') {
        if (isResource(entry)) return 'materials';
        if (isPotion(entry)) return 'elixirs';
        if (isScroll(entry)) return 'scrolls';
        return 'materials';
      }
      return 'quest';
    }

    const equippedItems = inventory.filter(isEquipped);
    const bagItems = inventory.filter((entry) => !isEquipped(entry));
    const generalItems = bagItems.filter((entry) => !isResource(entry) && !isQuest(entry));
    const resourceItems = bagItems.filter((entry) => isResource(entry) || isPotion(entry) || isScroll(entry));
    const questItems = bagItems.filter(isQuest);

    const groupSets = {
      equipment: [
        { key: 'all', label: 'Все' },
        { key: 'weapon', label: 'Оружие' },
        { key: 'armor', label: 'Доспехи' },
        { key: 'helm', label: 'Шлемы' },
        { key: 'shield', label: 'Щиты' },
        { key: 'gloves', label: 'Перчатки' },
        { key: 'boots', label: 'Сапоги' },
        { key: 'amulet', label: 'Амулеты' },
        { key: 'rings', label: 'Кольца' }
      ],
      general: [
        { key: 'all', label: 'Все' },
        { key: 'potions', label: 'Зелья' },
        { key: 'scrolls', label: 'Свитки' },
        { key: 'accessories', label: 'Аксессуары' },
        { key: 'misc', label: 'Прочее' }
      ],
      resources: [
        { key: 'all', label: 'Все' },
        { key: 'materials', label: 'Материалы' },
        { key: 'elixirs', label: 'Эликсиры' },
        { key: 'scrolls', label: 'Свитки' }
      ],
      quest: [
        { key: 'all', label: 'Все' },
        { key: 'quest', label: 'Предметы' }
      ]
    };

    function countInGroup(items, tab, key) {
      if (key === 'all') return items.length;
      return items.filter((entry) => getGroupKey(entry, tab) === key).length;
    }

    function renderGroupBar(tab, items) {
      return `
        <div class="legacy-groups" data-filter-group="${tab}">
          ${groupSets[tab].map((group, index) => `
            <button
              class="legacy-group${index === 0 ? ' active' : ''}"
              type="button"
              data-group-button="${tab}"
              data-filter="${group.key}"
            >
              <strong>${group.label}</strong>
              <span>${countInGroup(items, tab, group.key)} шт.</span>
            </button>
          `).join('')}
        </div>
      `;
    }

    function renderRow(entry, tab, actionLabels) {
      const itemName = entry.item;
      const slotName = entry.slot;
      const groupKey = getGroupKey(entry, tab);
      return `
        <article class="legacy-row" data-row-tab="${tab}" data-row-group="${groupKey}">
          <div class="legacy-icon">${glyphForSlot(slotName)}</div>
          <div class="legacy-copy">
            <strong>${itemName}</strong>
            <span>${slotName}</span>
          </div>
          <div class="legacy-actions">
            ${actionLabels.map((action) => `
              <button
                class="legacy-action${action.kind === 'drop' ? ' drop' : ''}"
                type="button"
                data-item-action="${action.label}"
                data-item-name="${itemName}"
              >${action.label}</button>
            `).join('')}
          </div>
        </article>
      `;
    }

    function renderTabBlock(tab, items, actionLabels, emptyText) {
      if (!items.length) {
        return `
          ${renderGroupBar(tab, items)}
          <div class="legacy-empty">${emptyText}</div>
        `;
      }

      return `
        ${renderGroupBar(tab, items)}
        <div class="legacy-list">
          ${items.map((entry) => renderRow(entry, tab, actionLabels)).join('')}
        </div>
      `;
    }

    q('app').innerHTML = `
      <div class="single-page-layout inventory-shell">
        <div class="inventory-tabs">
          <button class="inventory-tab active" type="button" data-tab="equipment">Экипировка</button>
          <button class="inventory-tab" type="button" data-tab="general">Общее</button>
          <button class="inventory-tab" type="button" data-tab="resources">Ресурсы</button>
          <button class="inventory-tab" type="button" data-tab="quest">Квестовые предметы</button>
        </div>

        <div class="inventory-body">
          <section class="inventory-panel">
            <div class="inventory-panel-inner">
              <div class="tab-panel active" data-panel="equipment">
                ${renderTabBlock(
                  'equipment',
                  equippedItems,
                  [
                    { label: 'Инфо' },
                    { label: 'Снять' },
                    { label: 'Выкинуть', kind: 'drop' }
                  ],
                  'Экипированных вещей пока нет.'
                )}
              </div>

              <div class="tab-panel" data-panel="general">
                ${renderTabBlock(
                  'general',
                  generalItems,
                  [
                    { label: 'Инфо' },
                    { label: 'Использовать' },
                    { label: 'Выкинуть', kind: 'drop' }
                  ],
                  'В общем разделе пока пусто.'
                )}
              </div>

              <div class="tab-panel" data-panel="resources">
                ${renderTabBlock(
                  'resources',
                  resourceItems,
                  [
                    { label: 'Инфо' },
                    { label: 'Передать' },
                    { label: 'Выкинуть', kind: 'drop' }
                  ],
                  'Ресурсные карманы пока пусты.'
                )}
              </div>

              <div class="tab-panel" data-panel="quest">
                ${renderTabBlock(
                  'quest',
                  questItems,
                  [
                    { label: 'Инфо' }
                  ],
                  'Квестовых предметов пока нет.'
                )}
              </div>
            </div>
          </section>
        </div>
      </div>
      ${renderBottomNav('inventory')}
    `;

    const tabs = [...document.querySelectorAll('[data-tab]')];
    const panels = [...document.querySelectorAll('[data-panel]')];

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach((item) => item.classList.toggle('active', item === tab));
        panels.forEach((panel) => panel.classList.toggle('active', panel.dataset.panel === target));
      });
    });

    document.querySelectorAll('[data-group-button]').forEach((button) => {
      button.addEventListener('click', () => {
        const tab = button.dataset.groupButton;
        const filter = button.dataset.filter;
        document.querySelectorAll(`[data-group-button="${tab}"]`).forEach((item) => {
          item.classList.toggle('active', item === button);
        });
        document.querySelectorAll(`[data-row-tab="${tab}"]`).forEach((row) => {
          row.classList.toggle('hidden', filter !== 'all' && row.dataset.rowGroup !== filter);
        });
      });
    });

    document.querySelectorAll('[data-item-action]').forEach((button) => {
      button.addEventListener('click', () => {
        const action = button.dataset.itemAction;
        const itemName = button.dataset.itemName;
        showToast(`${action}: ${itemName}`);
      });
    });
  </script>
</body>
</html>
