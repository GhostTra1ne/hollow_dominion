<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    (function () {
      const APP_VERSION = '20260421-telegram-10';
      const url = new URL(window.location.href);
      if (url.searchParams.get('appv') !== APP_VERSION) {
        url.searchParams.set('appv', APP_VERSION);
        window.location.replace(url.toString());
      }
      window.__HD_APP_VERSION__ = APP_VERSION;
    })();
  </script>
  <title>Инвентарь</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css?v=20260421-telegram-10">
  <style>
    .inventory-shell {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      padding-top: 4px;
    }

    .inventory-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      align-items: stretch;
    }

    .inventory-tab {
      min-height: 52px;
      padding: 10px 8px;
      border: 1px solid rgba(214, 178, 116, .12);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .035), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .08), rgba(214, 178, 116, 0) 64%);
      color: rgba(243, 237, 222, .82);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
      text-align: center;
      cursor: pointer;
      transition: border-color .18s ease, transform .18s ease, color .18s ease, background .18s ease;
    }

    .inventory-tab.active {
      color: #fff0cb;
      border-color: rgba(214, 178, 116, .34);
      background:
        linear-gradient(180deg, rgba(98, 67, 28, .92), rgba(42, 28, 11, .98)),
        radial-gradient(circle at 50% 0%, rgba(255, 228, 170, .14), rgba(255, 228, 170, 0) 64%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .05),
        0 8px 18px rgba(0, 0, 0, .18);
      transform: translateY(-1px);
    }

    .inventory-body {
      min-height: 0;
      display: grid;
    }

    .inventory-panel {
      min-height: 0;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .015)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .08), rgba(214, 178, 116, 0) 56%);
      border: 1px solid rgba(255, 255, 255, .06);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .03),
        0 20px 36px rgba(0, 0, 0, .18);
      overflow: hidden;
    }

    .inventory-panel-inner {
      height: 100%;
      min-height: 0;
      overflow: auto;
      padding: 16px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .tab-panel {
      display: none;
      min-height: 0;
      align-content: start;
      gap: 12px;
    }

    .tab-panel.active {
      display: grid;
    }

    .equipment-stage {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .equipment-figure {
      position: relative;
      min-height: 292px;
      border-radius: 22px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(213, 181, 119, .14), rgba(213, 181, 119, 0) 40%),
        linear-gradient(180deg, rgba(17, 19, 29, .98), rgba(11, 13, 20, .98));
      border: 1px solid rgba(214, 178, 116, .12);
    }

    .equipment-figure::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 18px;
      border: 1px solid rgba(214, 178, 116, .10);
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 242, 206, .06), rgba(255, 242, 206, 0) 28%),
        linear-gradient(180deg, rgba(255, 255, 255, .02), rgba(255, 255, 255, 0));
    }

    .equipment-body {
      position: absolute;
      inset: 18px 22px 54px;
      opacity: .72;
      background:
        radial-gradient(circle at 50% 12%, rgba(245, 228, 189, .58) 0 18px, transparent 19px),
        linear-gradient(180deg, transparent 0 24px, rgba(245, 228, 189, .18) 24px 108px, transparent 108px),
        linear-gradient(90deg, transparent 0 40px, rgba(245, 228, 189, .16) 40px 72px, transparent 72px);
      filter: blur(.2px);
    }

    .equipment-points {
      position: absolute;
      inset: 18px;
      pointer-events: none;
    }

    .equipment-point {
      position: absolute;
      min-width: 34px;
      min-height: 34px;
      padding: 4px 7px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #f7e3b3;
      background: rgba(24, 18, 11, .72);
      border: 1px solid rgba(214, 178, 116, .16);
      box-shadow: 0 6px 14px rgba(0, 0, 0, .18);
    }

    .equipment-point.head { top: 18px; left: 50%; transform: translateX(-50%); }
    .equipment-point.weapon { left: 8px; top: 112px; }
    .equipment-point.armor { right: 8px; top: 112px; }
    .equipment-point.bag { left: 50%; bottom: 56px; transform: translateX(-50%); }

    .equipment-note {
      position: absolute;
      inset: auto 24px 18px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(214, 178, 116, .08);
      border: 1px solid rgba(214, 178, 116, .12);
      text-align: center;
      color: #f4e2bc;
      font-size: 12px;
      line-height: 1.45;
    }

    .equipment-list {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .equipment-slot {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .equipment-icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-family: var(--font-main);
      font-size: 20px;
      color: #f8e5bc;
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 234, 190, .14), rgba(255, 234, 190, 0) 46%),
        linear-gradient(180deg, rgba(89, 59, 22, .95), rgba(38, 25, 10, .98));
      border: 1px solid rgba(214, 178, 116, .16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05);
    }

    .equipment-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .equipment-copy strong {
      color: #fff1cb;
      font-size: 15px;
    }

    .equipment-copy span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .equipment-state {
      white-space: nowrap;
      padding: 8px 10px;
      border-radius: 999px;
      color: #f8e1aa;
      background: rgba(214, 178, 116, .10);
      border: 1px solid rgba(214, 178, 116, .14);
      font-size: 12px;
      font-weight: 700;
    }

    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .inventory-card {
      padding: 14px;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .015)),
        radial-gradient(circle at 50% 0%, rgba(123, 167, 230, .08), rgba(123, 167, 230, 0) 62%);
      border: 1px solid rgba(255, 255, 255, .06);
      display: grid;
      gap: 8px;
      min-height: 110px;
    }

    .inventory-card.rare {
      border-color: rgba(123, 167, 230, .22);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02)),
        radial-gradient(circle at 50% 0%, rgba(123, 167, 230, .12), rgba(123, 167, 230, 0) 64%);
    }

    .inventory-card.utility {
      border-color: rgba(214, 178, 116, .18);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .015)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .10), rgba(214, 178, 116, 0) 64%);
    }

    .inventory-card.empty {
      border-style: dashed;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .02), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .04), rgba(214, 178, 116, 0) 62%);
    }

    .inventory-card strong {
      color: #f1d59a;
      font-size: 15px;
    }

    .inventory-card p {
      margin: 0;
      color: #f5efdf;
      font-size: 14px;
      line-height: 1.5;
    }

    .inventory-meta {
      margin-top: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .inventory-meta span {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .empty-panel {
      min-height: 220px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .025), rgba(255, 255, 255, .01)),
        radial-gradient(circle at 50% 0%, rgba(214, 178, 116, .05), rgba(214, 178, 116, 0) 60%);
      border: 1px dashed rgba(214, 178, 116, .16);
      color: rgba(243, 237, 222, .72);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .inventory-grid,
      .equipment-stage {
        grid-template-columns: 1fr;
      }

      .equipment-figure {
        min-height: 220px;
      }
    }

    @media (max-width: 560px) {
      .inventory-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .inventory-panel-inner {
        padding: 14px;
      }

      .equipment-slot {
        grid-template-columns: 46px minmax(0, 1fr);
      }

      .equipment-state {
        grid-column: 1 / -1;
        justify-self: start;
      }

      .equipment-icon {
        width: 46px;
        height: 46px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="screen-page">
    <div class="app-shell" id="app"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="common.js?v=20260421-telegram-10"></script>
  <script>
    let state = loadState();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    const inventory = Array.isArray(state.hero.inventory) ? state.hero.inventory : [];

    function normalizeText(value) {
      return String(value || '').toLowerCase();
    }

    function isEquipped(entry) {
      return normalizeText(entry.type).includes('над');
    }

    function isResource(entry) {
      const slot = normalizeText(entry.slot);
      return slot.includes('матер') || slot.includes('ресурс');
    }

    function isQuest(entry) {
      return normalizeText(entry.slot).includes('квест');
    }

    const equippedItems = inventory.filter(isEquipped);
    const bagItems = inventory.filter((entry) => !isEquipped(entry));
    const generalItems = bagItems.filter((entry) => !isResource(entry) && !isQuest(entry));
    const resourceItems = bagItems.filter(isResource);
    const questItems = bagItems.filter(isQuest);

    function glyphForSlot(slot) {
      const name = normalizeText(slot);
      if (name.includes('оруж')) return '⚔';
      if (name.includes('брон')) return '🛡';
      if (name.includes('зель')) return '✚';
      if (name.includes('свит')) return '✦';
      if (name.includes('матер')) return '◆';
      if (name.includes('аксесс')) return '◈';
      if (name.includes('квест')) return '✧';
      return '⬠';
    }

    function getItemDescription(entry) {
      const slot = normalizeText(entry.slot);
      if (slot.includes('оруж')) return 'Боевой слот героя.';
      if (slot.includes('брон')) return 'Защитный комплект текущего билда.';
      if (slot.includes('зель')) return 'Расходник для быстрых боёв и дороги.';
      if (slot.includes('свит')) return 'Резерв на возврат и перемещение.';
      if (slot.includes('матер')) return 'Ресурс для крафта и усиления.';
      if (slot.includes('квест')) return 'Связано с сюжетными поручениями.';
      return 'Служебный слот инвентаря героя.';
    }

    function renderBagCard(entry) {
      const empty = String(entry.item || '').trim().toLowerCase() === 'пусто';
      const slot = normalizeText(entry.slot);
      const classes = [
        'inventory-card',
        empty ? 'empty' : '',
        slot.includes('свит') ? 'rare' : '',
        slot.includes('зель') ? 'utility' : ''
      ].filter(Boolean).join(' ');

      return `
        <article class="${classes}">
          <strong>${entry.slot}</strong>
          <p>${entry.item}</p>
          <div class="inventory-meta">
            <span>${empty ? 'Свободно' : entry.type}</span>
            <span>${empty ? 'Готово под добычу' : 'В сумке героя'}</span>
          </div>
        </article>
      `;
    }

    function renderEquipmentSlot(entry) {
      return `
        <article class="equipment-slot">
          <div class="equipment-icon">${glyphForSlot(entry.slot)}</div>
          <div class="equipment-copy">
            <strong>${entry.item}</strong>
            <span>${entry.slot}. ${getItemDescription(entry)}</span>
          </div>
          <div class="equipment-state">${entry.type}</div>
        </article>
      `;
    }

    const equippedMarkup = equippedItems.map(renderEquipmentSlot).join('');
    const generalMarkup = generalItems.map(renderBagCard).join('');
    const resourceMarkup = resourceItems.map(renderBagCard).join('');
    const questMarkup = questItems.map(renderBagCard).join('');

    q('app').innerHTML = `
      <div class="single-page-layout inventory-shell">
        <div class="inventory-tabs">
          <button class="inventory-tab active" type="button" data-tab="equipment">Экипировка</button>
          <button class="inventory-tab" type="button" data-tab="general">Общее</button>
          <button class="inventory-tab" type="button" data-tab="resources">Ресурсы</button>
          <button class="inventory-tab" type="button" data-tab="quest">Квестовые предметы</button>
        </div>

        <div class="inventory-body">
          <section class="inventory-panel">
            <div class="inventory-panel-inner">
              <div class="tab-panel active" data-panel="equipment">
                <div class="equipment-stage">
                  <div class="equipment-figure">
                    <div class="equipment-body"></div>
                    <div class="equipment-points" aria-hidden="true">
                      <span class="equipment-point head">LVL</span>
                      <span class="equipment-point weapon">ATK</span>
                      <span class="equipment-point armor">DEF</span>
                      <span class="equipment-point bag">BAG</span>
                    </div>
                    <div class="equipment-note">Текущий боевой комплект героя. Сюда же потом спокойно добавим кольца, амулеты и плащ.</div>
                  </div>
                  <div class="equipment-list">
                    ${equippedMarkup || '<div class="empty-panel">На герое сейчас нет активной экипировки.</div>'}
                  </div>
                </div>
              </div>

              <div class="tab-panel" data-panel="general">
                ${generalMarkup ? `<div class="inventory-grid">${generalMarkup}</div>` : '<div class="empty-panel">В общем разделе пока пусто.</div>'}
              </div>

              <div class="tab-panel" data-panel="resources">
                ${resourceMarkup ? `<div class="inventory-grid">${resourceMarkup}</div>` : '<div class="empty-panel">Ресурсы пока не собраны. Здесь будут материалы, руда и ремесленные заготовки.</div>'}
              </div>

              <div class="tab-panel" data-panel="quest">
                ${questMarkup ? `<div class="inventory-grid">${questMarkup}</div>` : '<div class="empty-panel">Квестовых предметов пока нет. Когда добавим задания и NPC, этот раздел начнёт заполняться автоматически.</div>'}
              </div>
            </div>
          </section>
        </div>
      </div>
      ${renderBottomNav('inventory')}
    `;

    const tabs = [...document.querySelectorAll('[data-tab]')];
    const panels = [...document.querySelectorAll('[data-panel]')];

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach((item) => item.classList.toggle('active', item === tab));
        panels.forEach((panel) => panel.classList.toggle('active', panel.dataset.panel === target));
      });
    });
  </script>
</body>
</html>
