<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"><title>Инвентарь</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link rel="stylesheet" href="common.css"></head><body><div class="screen-page"><div class="app-shell" id="app"></div></div><div class="toast" id="toast"></div><script src="common.js"></script><script>
let state=loadState(); if(!ensureHero(state)){};
const inv=(state.hero.inventory||[]).map(slot=>`<div class="inventory-slot"><strong>${slot.slot}</strong><div>${slot.item}</div><span>${slot.type}</span></div>`).join('');
q('app').innerHTML=`${renderHeader(state,'Инвентарь и экипировка.')}
<div class="page-body"><div>${renderPortraitPanel(state)}</div><div class="panel"><div class="panel-inner content-scroll"><div class="inventory-grid">${inv}</div></div></div></div>
${renderSideMenu('inventory')}`;
applyPortrait(state);
</script></body></html>
