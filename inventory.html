<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Инвентарь</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div class="screen-page">
    <div class="app-shell" id="app"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="common.js"></script>
  <script>
    let state = loadState();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    const inv = (state.hero.inventory || []).map((slot) => `
      <div class="inventory-slot">
        <strong>${slot.slot}</strong>
        <div>${slot.item}</div>
        <span>${slot.type}</span>
      </div>
    `).join('');

    q('app').innerHTML = `
      ${renderHeader(state, 'Сумка, экипировка и быстрый обзор содержимого.')}
      <div class="single-page-layout">
        <div class="panel page-main-panel">
          <div class="panel-inner content-scroll">
            <div class="page-stack">
              <div class="page-intro">
                <strong>Инвентарь героя</strong>
                <p class="subtitle">Здесь собраны надетые предметы, расходники и всё, что герой носит с собой в дороге.</p>
              </div>
              <div class="inventory-grid">${inv}</div>
            </div>
          </div>
        </div>
      </div>
      ${renderBottomNav('inventory')}
    `;
  </script>
</body>
</html>
