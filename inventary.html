      box-shadow:
        inset 0 1px 0 rgba(255, 240, 205, .08),
        inset 0 0 0 1px rgba(33, 23, 12, .46);
      transition: border-color .18s ease, color .18s ease, background .18s ease;

      min-height: 0;
      display: grid;
    }

        linear-gradient(180deg, rgba(255, 255, 255, .03) 1px, transparent 1px),
        linear-gradient(180deg, rgba(34, 39, 25, .42), rgba(18, 22, 15, .62));

        inset 0 1px 0 rgba(255, 240, 205, .08),
        inset 0 0 0 1px rgba(26, 18, 10, .62),

    }

    .tab-panel.active {
      display: grid;

    .legacy-groups {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
      gap: 8px;
    }

    .inventory-general-meta {

      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }

    .inventory-capacity {

      align-items: center;
      min-height: 26px;
      padding: 4px 10px;

    .legacy-group span {

    }

    .equip-flat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .equip-slot-card {
      min-height: 88px;
      padding: 8px 9px;
      border-radius: 10px;
      border: 1px solid rgba(141, 102, 49, .62);
      background:
        linear-gradient(180deg, rgba(62, 44, 24, .76), rgba(29, 21, 13, .9)),
        linear-gradient(180deg, rgba(255, 244, 214, .03), rgba(255, 244, 214, 0));
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      grid-template-areas:

    }

    .equip-slot-card.has-item {
      border-color: rgba(191, 148, 82, .82);
      background:
        linear-gradient(180deg, rgba(82, 58, 31, .82), rgba(37, 26, 15, .92)),
        linear-gradient(180deg, rgba(255, 235, 187, .05), rgba(255, 235, 187, 0));
    }

    .equip-slot-icon {
      grid-area: icon;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(76, 55, 31, .88), rgba(31, 23, 14, .96));
      border: 1px solid rgba(158, 114, 57, .58);
      box-shadow: inset 0 1px 0 rgba(255, 247, 221, .05);
    }

    .equip-slot-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 12px;
    }

    .equip-slot-label {
      grid-area: label;
      color: rgba(235, 227, 205, .66);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-align: left;
    }

    .equip-slot-name {
      grid-area: name;
      color: #fff0cb;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.25;
      text-align: left;
      word-break: break-word;
    }

    .equip-slot-name.empty {
      color: rgba(220, 210, 188, .42);
    }

    .equip-slot-desc {
      grid-area: desc;
      color: rgba(232, 223, 200, .68);
      font-size: 10px;
      line-height: 1.25;
      text-align: left;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .equip-slot-action {
      grid-area: action;
      padding: 6px 10px;
      border-radius: 7px;
      border: 1px solid rgba(165, 120, 61, .58);
      background: linear-gradient(180deg, rgba(96, 69, 37, .72), rgba(44, 31, 18, .9));

      font-size: 11px;
      font-weight: 700;

      transition: border-color .18s ease, background .18s ease, transform .18s ease;

    .equip-slot-action:hover,

      border-color: rgba(201, 156, 88, .82);
      background: linear-gradient(180deg, rgba(118, 87, 48, .82), rgba(54, 38, 21, .94));
      transform: translateY(-1px);
    }

    .legacy-list {
      display: grid;
      gap: 10px;
    }

    .legacy-row {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;

      align-items: center;
      padding: 10px;

      background:
        linear-gradient(180deg, rgba(62, 45, 25, .7), rgba(27, 20, 13, .88)),
        linear-gradient(180deg, rgba(255, 248, 228, .025), rgba(255, 248, 228, 0));
      border: 1px solid rgba(139, 102, 49, .5);

    .legacy-row.hidden {
      display: none;

    .legacy-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: grid;
      place-items: center;

      border: 1px solid rgba(154, 111, 55, .54);
      box-shadow: inset 0 1px 0 rgba(255, 247, 221, .05);
    }

    .legacy-empty-icon {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: auto;
      border-radius: 12px;
    }

    .legacy-copy {

      gap: 4px;
    }

    .legacy-copy strong {
      color: #fff1cb;
      font-size: 15px;
    }

    .legacy-copy span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .legacy-copy .legacy-meta {
      color: var(--muted);
    }

    .legacy-copy .legacy-desc {
      color: rgba(232, 223, 200, .78);
      font-size: 11px;
      line-height: 1.4;
    }

    .legacy-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .legacy-action {
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(139, 102, 49, .42);
      background: linear-gradient(180deg, rgba(96, 69, 37, .64), rgba(44, 31, 18, .86));
      color: #f6dfae;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .legacy-action:hover,
    .legacy-action:focus-visible {
      border-color: rgba(201, 156, 88, .82);
      background: linear-gradient(180deg, rgba(118, 87, 48, .82), rgba(54, 38, 21, .94));
      transform: translateY(-1px);
    }

    .legacy-action.drop {
      color: #ffb18a;
      border-color: rgba(255, 123, 84, .18);
    }

    .legacy-empty {
      min-height: 200px;

      background:

        linear-gradient(180deg, rgba(255, 248, 228, .02), rgba(255, 248, 228, 0));
      border: 1px dashed rgba(139, 102, 49, .46);
      color: rgba(243, 237, 222, .72);

    @media (max-width: 560px) {

        padding: 8px;

        grid-template-columns: 42px minmax(0, 1fr);
      }

      .legacy-icon {

        padding: 4px 9px;
      }

    /* === Inventory MMO Upgrade v1 === */

    .inventory-tabs {
      gap: 8px;
      padding: 0 2px;
    }

    .inventory-tab {
      position: relative;
      min-height: 44px;
      padding: 9px 10px;
      border-radius: 12px;
      border: 1px solid rgba(194, 142, 61, .92);
      background:
        radial-gradient(circle at 50% -20%, rgba(255, 215, 130, .14), rgba(255, 215, 130, 0) 60%),
        linear-gradient(180deg, rgba(62, 43, 22, .96), rgba(22, 15, 9, .98));
      color: rgba(235, 218, 181, .88);
      font-size: 12px;
      box-shadow:
        inset 0 1px 0 rgba(255, 235, 192, .16),
        inset 0 -1px 0 rgba(0, 0, 0, .34),
        0 4px 12px rgba(0,0,0,.28);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, color .16s ease;
    }

    .inventory-tab::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 11px;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,0) 38%),
        linear-gradient(90deg, rgba(255, 205, 109, .07), rgba(255, 205, 109, 0) 20%, rgba(255, 205, 109, 0) 80%, rgba(255, 205, 109, .06));
    }

    .inventory-tab.active {
      color: #fff5d7;
      border-color: rgba(236, 185, 90, 1);
      background:
        radial-gradient(circle at 50% -18%, rgba(255, 225, 150, .22), rgba(255, 225, 150, 0) 62%),
        linear-gradient(180deg, rgba(93, 63, 31, .99), rgba(31, 21, 12, 1));
      box-shadow:
        inset 0 1px 0 rgba(255, 246, 216, .25),
        inset 0 -1px 0 rgba(0, 0, 0, .42),
        0 0 22px rgba(232, 177, 76, .24);
    }

    .inventory-panel {
      position: relative;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(42, 25, 12, .68), rgba(10, 8, 6, .92)),
        radial-gradient(circle at 50% 18%, rgba(219, 151, 62, .12), rgba(219, 151, 62, 0) 55%),
        url("./assets/ui/inventory/inventory_panel_bg.png") center center / cover no-repeat,
        #120b06;
      overflow: hidden;
      isolation: isolate;
    }

    .inventory-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.30)),
        radial-gradient(circle at 50% 18%, rgba(255, 187, 89, .04), rgba(0,0,0,0) 58%);
      pointer-events: none;
    }

    .inventory-panel-inner,
    .inventory-panel-footer {
      position: relative;
      z-index: 1;
    }

    .inventory-panel-inner {
      overflow: hidden;
    }

    .capacity-wrap {
      display: grid;
      gap: 4px;
      min-width: 124px;
    }

    .capacity-caption {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #ffe8b5;
      font-size: 11px;
      font-weight: 800;
      text-shadow: 0 1px 0 #000;
    }

    .capacity-bar {
      position: relative;
      height: 7px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(154, 111, 55, .64);
      background: linear-gradient(180deg, rgba(15, 18, 12, .96), rgba(5, 7, 5, .98));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), inset 0 0 6px rgba(0,0,0,.7);
    }

    .capacity-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--capacity-fill, 0%);
      border-radius: inherit;
      background: linear-gradient(90deg, #2ba44e, #69d66c);
      box-shadow: 0 0 8px rgba(80, 220, 95, .26);
      transition: width .24s ease, background .24s ease, box-shadow .24s ease;
    }

    .capacity-wrap.warn .capacity-fill {
      background: linear-gradient(90deg, #b67925, #f1a740);
      box-shadow: 0 0 8px rgba(241, 167, 64, .28);
    }

    .capacity-wrap.danger .capacity-fill {
      background: linear-gradient(90deg, #9f2d22, #e24a35);
      box-shadow: 0 0 8px rgba(226, 74, 53, .32);
    }

    .bag-sort-btn {
      min-height: 27px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(190, 145, 77, .7);
      background: linear-gradient(180deg, rgba(85, 61, 32, .9), rgba(31, 21, 12, .96));
      color: #ffe7b1;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      text-shadow: 0 1px 0 #000;
      box-shadow: inset 0 1px 0 rgba(255, 240, 205, .1), 0 3px 8px rgba(0,0,0,.22);
    }

    .equipment-paperdoll {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      gap: 0;
      padding: 0;
      border-radius: 0;
      border: 0;
      overflow: hidden;
      background: transparent;
      box-shadow: none;
    }

    .paperdoll-stage {
      position: relative;
      width: min(100%, 440px);
      min-height: 450px;
      height: min(62vh, 520px);
      margin: 0 auto;
      border-radius: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .paperdoll-stage::before {
      content: none;
    }

    .paperdoll-stage::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 94px;
      width: 130px;
      height: 22px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 215, 140, .22), rgba(255, 215, 140, 0) 68%);
      filter: blur(4px);
      pointer-events: none;
    }

    .paperdoll-center-glow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 180px;
      height: 240px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 50% 35%, rgba(255, 190, 84, .18), rgba(255, 190, 84, 0) 62%);
      filter: blur(6px);
      pointer-events: none;
    }

    .paperdoll-silhouette {
      position: absolute;
      left: 50%;
      top: 52%;
      width: 132px;
      height: 250px;
      transform: translate(-50%, -50%);
      opacity: .22;
      background:
        radial-gradient(circle at 50% 10%, rgba(230,220,190,.42) 0 20px, transparent 22px),
        linear-gradient(180deg, transparent 0 15%, rgba(230,220,190,.3) 15% 54%, transparent 54%),
        linear-gradient(90deg, transparent 0 13%, rgba(230,220,190,.2) 13% 26%, transparent 26% 74%, rgba(230,220,190,.2) 74% 87%, transparent 87%),
        linear-gradient(90deg, transparent 0 32%, rgba(230,220,190,.16) 32% 43%, transparent 43% 57%, rgba(230,220,190,.16) 57% 68%, transparent 68%);
      pointer-events: none;
    }

    .paperdoll-slot {
      --slot-size: 56px;
      position: absolute;
      width: var(--slot-size);
      height: var(--slot-size);
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(95, 82, 63, .76);
      background:
        linear-gradient(180deg, rgba(34, 34, 30, .92), rgba(10, 11, 10, .96)),
        radial-gradient(circle at 50% 28%, rgba(255,255,255,.03), rgba(255,255,255,0) 70%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        inset 0 0 0 1px rgba(0,0,0,.36),
        0 3px 8px rgba(0,0,0,.34);
      overflow: hidden;
      cursor: pointer;

<script src="common.js?v=20260428-telegram-100"></script>
  <script>
    (async () => {
    let state = await window.HD_BOOTSTRAP_APP_STATE();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    let inventory = Array.isArray(state.hero.inventory) ? state.hero.inventory : [];

    function normalizeText(value) {
      return String(value || '').toLowerCase();
    }

    const EQUIP_SLOTS = [
      { id: 'head', family: 'head', label: 'Шлем', emptyIcon: 'golova' },
      { id: 'necklace', family: 'necklace', label: 'Ожерелье', emptyIcon: 'amulet' },
      { id: 'body', family: 'body', label: 'Тело', emptyIcon: 'body' },
      { id: 'earring1', family: 'earring', label: 'Серьга I', emptyIcon: 'poyas' },
      { id: 'legs', family: 'legs', label: 'Низ', emptyIcon: 'plash' },
      { id: 'earring2', family: 'earring', label: 'Серьга II', emptyIcon: 'serga2' },
      { id: 'gloves', family: 'gloves', label: 'Перчатки', emptyIcon: 'ruki' },
      { id: 'ring1', family: 'ring', label: 'Кольцо I', emptyIcon: 'kolco' },
      { id: 'boots', family: 'boots', label: 'Ботинки', emptyIcon: 'nogi' },
      { id: 'ring2', family: 'ring', label: 'Кольцо II', emptyIcon: 'kolco2' },
      { id: 'weapon', family: 'weapon', label: 'Меч', emptyIcon: 'weapon' },
      { id: 'shield', family: 'shield', label: 'Щит', emptyIcon: 'shit' }
    ];

    const SLOT_MAP = Object.fromEntries(EQUIP_SLOTS.map((slot) => [slot.id, slot]));

    const ITEM_LIBRARY = window.HD_ITEM_CATALOG || {};
    const SET_LIBRARY = window.HD_SET_LIBRARY || {};

    const STAT_LABELS = {
      patt: 'P.Atk',
      matt: 'M.Atk',
      pdef: 'P.Def',
      mdef: 'M.Def',
      critical: 'Crit'
    };

    function isEquipped(entry) {
      return Boolean(entry.equipSlot) || normalizeText(entry.type).includes('над');
    }

    function isEmptyItem(entry) {
      return normalizeText(entry.item).trim() === 'пусто';
    }

    function parseStackedItem(entry) {
      const match = String(entry.item || '').match(/^\s*(\d+)\s*x\s*(.+?)\s*$/i);
      if (!match) return null;
      return {
        count: Number(match[1]),
        baseName: match[2]
      };
    }

    function getBaseItemName(entry) {
      const stack = parseStackedItem(entry);
      return String(stack ? stack.baseName : entry.item || '').trim();
    }

    function rebuildStackedItemName(entry, nextBaseName) {
      const stack = parseStackedItem(entry);
      return stack ? `${stack.count} x ${nextBaseName}` : nextBaseName;
    }

    function inferFamilyFromEntry(entry) {
      const text = normalizeText(`${entry.slot || ''} ${getBaseItemName(entry)}`);
      if (text.includes('оруж') || text.includes('меч') || text.includes('club') || text.includes('weapon')) return 'weapon';
      if (text.includes('шлем') || text.includes('голов') || text.includes('helmet')) return 'head';
      if (text.includes('брон') || text.includes('доспех') || text.includes('armor') || text.includes('robe')) return 'body';
      if (text.includes('низ') || text.includes('понож') || text.includes('штаны') || text.includes('legs')) return 'legs';
      if (text.includes('перчат') || text.includes('gloves') || text.includes('рук')) return 'gloves';
      if (text.includes('ботин') || text.includes('сап') || text.includes('boots') || text.includes('ноги')) return 'boots';
      if (text.includes('щит') || text.includes('shield') || text.includes('shit')) return 'shield';
      if (text.includes('ожер') || text.includes('амул') || text.includes('necklace')) return 'necklace';
      if (text.includes('серьг') || text.includes('earring')) return 'earring';
      if (text.includes('коль') || text.includes('ring')) return 'ring';
      return null;
    }

    function getItemBlueprint(entry) {
      const baseName = getBaseItemName(entry);
      if (typeof window.HD_RESOLVE_ITEM_BLUEPRINT === 'function') {
        return window.HD_RESOLVE_ITEM_BLUEPRINT(baseName);
      }
      return ITEM_LIBRARY[normalizeText(baseName)] || null;
    }

    function renderInventoryIcon(path) {
      if (!path) return '';
      const fallback = path.includes('/presets/') && /\.png$/i.test(path)
        ? path.replace(/\.png$/i, '.bmp')
        : '';
      const onerror = fallback
        ? ` onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='${fallback}';}else{this.style.display='none';}"`
        : ` onerror="this.style.display='none';"`;
      return `<img class="legacy-empty-icon" src="${path}" alt=""${onerror}>`;
    }

    function getPrimaryEquipSlotId(family) {
      return {
        weapon: 'weapon',
        head: 'head',
        body: 'body',
        legs: 'legs',
        gloves: 'gloves',
        boots: 'boots',
        shield: 'shield',
        necklace: 'necklace',
        ring: 'ring1',
        earring: 'earring1'
      }[family] || null;
    }

    function getBagSlotLabel(family) {
      return {
        weapon: 'Оружие',
        head: 'Шлем',
        body: 'Броня',
        legs: 'Низ',
        gloves: 'Перчатки',
        boots: 'Ботинки',
        shield: 'Щит',
        necklace: 'Ожерелье',
        ring: 'Кольцо',
        earring: 'Серьга'
      }[family] || 'Экипировка';
    }

    function getEntryMeta(entry) {
      const blueprint = getItemBlueprint(entry);
      const family = entry.equipFamily || blueprint?.family || inferFamilyFromEntry(entry);
      return {
        family,
        stats: entry.stats || blueprint?.stats || {},
        setKey: entry.setKey || blueprint?.setKey || null,
        setPart: entry.setPart || blueprint?.setPart || family || null
      };
    }

    const RARITY_LABELS = {
      common: 'Обычный',
      uncommon: 'Необычный',
      rare: 'Редкий',
      epic: 'Эпический',
      legendary: 'Легендарный'
    };

    const RARITY_ORDER = {
      common: 1,
      uncommon: 2,
      rare: 3,
      epic: 4,
      legendary: 5
    };

    const COMPARE_STAT_LABELS = {
      patt: 'P.Atk',
      matt: 'M.Atk',
      pdef: 'P.Def',
      mdef: 'M.Def',
      critical: 'Crit',
      hp: 'HP',
      mp: 'MP'
    };

    function getItemRarity(entry) {
      const blueprint = getItemBlueprint(entry);
      const rarity = normalizeText(entry?.rarity || blueprint?.rarity || 'common');
      return RARITY_LABELS[rarity] ? rarity : 'common';
    }

    function getRarityLabel(entry) {
      return RARITY_LABELS[getItemRarity(entry)] || RARITY_LABELS.common;
    }

    function isNewItem(entry) {
      return Boolean(entry?.isNew || entry?.newItem || entry?.new || entry?.fresh);
    }

    function slotClassForEntry(entry) {
      const rarity = getItemRarity(entry);
      return `rarity-${rarity}${isQuest(entry) ? ' quest-locked' : ''}${isNewItem(entry) ? ' new' : ''}`;
    }

    function normalizeInventorySchema(entries) {
      let changed = false;
      let ringIndex = 0;
      let earringIndex = 0;
      const seed = Date.now().toString(36);

      const normalized = entries.map((raw, index) => {
        const entry = { ...raw };
        const originalBaseName = getBaseItemName(entry);

        if (!entry.uid) {
          entry.uid = `inv-${seed}-${index}`;
          changed = true;
        }

        const blueprint = getItemBlueprint(entry);
        const canonicalName = blueprint?.name || originalBaseName;
        if (canonicalName && canonicalName !== originalBaseName) {
          entry.item = rebuildStackedItemName(entry, canonicalName);
          changed = true;
        }

        const family = entry.equipFamily || blueprint?.family || inferFamilyFromEntry(entry);

        if (family && entry.equipFamily !== family) {
          entry.equipFamily = family;
          changed = true;
        }

        if (blueprint?.category && entry.category !== blueprint.category) {
          entry.category = blueprint.category;
          changed = true;
        }

        if (!entry.category) {
          const slotText = normalizeText(entry.slot);
          const itemText = normalizeText(canonicalName);
          if (blueprint?.category) {
            entry.category = blueprint.category;
          } else if (slotText.includes('матер')) {
            entry.category = 'resource';
          } else if (slotText.includes('квест')) {
            entry.category = 'quest';
          } else if (slotText.includes('зель') || slotText.includes('свит') || itemText.includes('эликсир') || itemText.includes('элексир')) {
            entry.category = 'consumable';
          } else if (family) {
            entry.category = 'wearable';
          } else {
            entry.category = 'general';
          }
          changed = true;
        }

        if ((!entry.stats || typeof entry.stats !== 'object') && blueprint?.stats) {
          entry.stats = blueprint.stats;
          changed = true;
        }
        if (!entry.setKey && blueprint?.setKey) {
          entry.setKey = blueprint.setKey;
          changed = true;
        }
        if (!entry.setPart && blueprint?.setPart) {
          entry.setPart = blueprint.setPart;
          changed = true;
        }

        if (isEquipped(entry) && !entry.equipSlot && family) {
          if (family === 'ring') {
            ringIndex += 1;
            entry.equipSlot = ringIndex === 2 ? 'ring2' : 'ring1';
          } else if (family === 'earring') {
            earringIndex += 1;
            entry.equipSlot = earringIndex === 2 ? 'earring2' : 'earring1';
          } else {
            entry.equipSlot = getPrimaryEquipSlotId(family);
          }
          changed = true;
        }

        if (isEquipped(entry) && entry.equipSlot && SLOT_MAP[entry.equipSlot] && entry.slot !== SLOT_MAP[entry.equipSlot].label) {
          entry.slot = SLOT_MAP[entry.equipSlot].label;
          changed = true;
        }

        if (!isEquipped(entry) && family) {
          const bagLabel = getBagSlotLabel(family);
          if (entry.slot !== bagLabel && entry.category === 'wearable') {
            entry.slot = bagLabel;
            changed = true;
          }
          if (entry.equipSlot) {
            entry.equipSlot = '';
            changed = true;
          }
        }

        if (!isEquipped(entry)) {
          let normalizedSlotLabel = '';
          if (entry.category === 'resource') {
            normalizedSlotLabel = 'Ресурсы';
          } else if (entry.category === 'quest') {
            normalizedSlotLabel = 'Квест';
          } else if (entry.category === 'consumable') {
            normalizedSlotLabel = isScroll(entry) ? 'Свитки' : 'Зелья';
          } else if (entry.category === 'general' && !family) {
            normalizedSlotLabel = 'Сумка';
          }

          if (normalizedSlotLabel && entry.slot !== normalizedSlotLabel) {
            entry.slot = normalizedSlotLabel;
            changed = true;
          }
        }

        return entry;
      });

      return { inventory: normalized, changed };
    }

    const normalizedInventory = normalizeInventorySchema(inventory);
    inventory = normalizedInventory.inventory;
    state.hero.inventory = inventory;

    function persistHeroState() {
      if (typeof window.HD_RECOMPUTE_HERO_STATS === 'function') {
        window.HD_RECOMPUTE_HERO_STATS(state);
      }
      saveState(state);
    }

    if (
      normalizedInventory.changed ||
      (typeof window.HD_RECOMPUTE_HERO_STATS === 'function' && window.HD_RECOMPUTE_HERO_STATS(state))
    ) {
      saveState(state);
    }

    function isResource(entry) {
      return entry.category === 'resource' || normalizeText(entry.slot).includes('матер');
    }

    function isQuest(entry) {
      return entry.category === 'quest' || normalizeText(entry.slot).includes('квест');
    }

    function isPotion(entry) {
      const blueprint = getItemBlueprint(entry);
      const name = normalizeText(getBaseItemName(entry));
      return entry.category === 'consumable' && (
        blueprint?.dropType === 'elexir' ||
        name.startsWith('hp-') ||
        name.startsWith('mp-')
      );
    }

    function isScroll(entry) {
      const blueprint = getItemBlueprint(entry);
      const name = normalizeText(getBaseItemName(entry));
      return entry.category === 'consumable' && (
        blueprint?.dropType === 'scroll' ||
        name.includes('scroll') ||
        name.includes('свит')
      );
    }

    function isAccessory(entry) {
      return ['necklace', 'ring', 'earring'].includes(getEntryMeta(entry).family);
    }

    function isWearable(entry) {
      return Boolean(getEntryMeta(entry).family);
    }

    function isConsumable(entry) {
      const item = normalizeText(getBaseItemName(entry));
      return entry.category === 'consumable' || isPotion(entry) || isScroll(entry) || item.includes('эликсир') || item.includes('элексир');
    }

    function glyphForSlot(slot) {
      const name = normalizeText(slot);
      if (name.includes('weapon') || name.includes('оруж') || name.includes('меч')) return '⚔';
      if (name.includes('body') || name.includes('брон') || name.includes('тело')) return '🛡';
      if (name.includes('head') || name.includes('шлем') || name.includes('голов')) return '⛑';
      if (name.includes('legs') || name.includes('низ')) return '⌖';
      if (name.includes('gloves') || name.includes('перчат') || name.includes('рук')) return '🧤';
      if (name.includes('boots') || name.includes('ботин') || name.includes('сап') || name.includes('ног')) return '🥾';
      if (name.includes('necklace') || name.includes('ожер') || name.includes('амул')) return '✦';
      if (name.includes('earring') || name.includes('серьг')) return '◈';
      if (name.includes('ring') || name.includes('коль')) return '◌';
      if (name.includes('зель')) return '✚';
      if (name.includes('свит')) return '✧';
      if (name.includes('матер')) return '◆';
      if (name.includes('квест')) return '✪';
      return '⬠';
    }

    const EMPTY_SLOT_ICONS = {
      weapon: './assets/ui/inventory/pusto/weapon.gif',
      body: './assets/ui/inventory/pusto/body.gif',
      golova: './assets/ui/inventory/pusto/golova.gif',
      shit: './assets/ui/inventory/pusto/shit.gif',
      nogi: './assets/ui/inventory/pusto/nogi.gif',
      ruki: './assets/ui/inventory/pusto/ruki.gif',
      kolco: './assets/ui/inventory/pusto/kolco.gif',
      kolco2: './assets/ui/inventory/pusto/kolco2.gif',
      amulet: './assets/ui/inventory/pusto/amulet.gif',
      ykr: './assets/ui/inventory/pusto/ykr.gif',
      serga2: './assets/ui/inventory/pusto/serga2.gif',
      plash: './assets/ui/inventory/pusto/plash.gif',
      poyas: './assets/ui/inventory/pusto/poyas.gif'
    };

    function emptyIconPathForSlot(slot) {
      const name = normalizeText(slot);
      if (name.includes('ring2') || name.includes('кольцо ii')) return EMPTY_SLOT_ICONS.kolco2;
      if (name.includes('earring') || name.includes('серьга')) return EMPTY_SLOT_ICONS.poyas;
      if (name.includes('оруж')) return EMPTY_SLOT_ICONS.weapon;
      if (name.includes('weapon')) return EMPTY_SLOT_ICONS.weapon;
      if (name.includes('брон')) return EMPTY_SLOT_ICONS.body;
      if (name.includes('body') || name.includes('тело')) return EMPTY_SLOT_ICONS.body;
      if (name.includes('шлем') || name.includes('голов')) return EMPTY_SLOT_ICONS.golova;
      if (name.includes('head')) return EMPTY_SLOT_ICONS.golova;
      if (name.includes('сап') || name.includes('ботин')) return EMPTY_SLOT_ICONS.nogi;
      if (name.includes('legs') || name.includes('низ') || name.includes('pants')) return EMPTY_SLOT_ICONS.plash;
      if (name.includes('boots') || name.includes('ботинки')) return EMPTY_SLOT_ICONS.nogi;
      if (name.includes('щит') || name.includes('shield') || name.includes('shit')) return EMPTY_SLOT_ICONS.shit;
      if (name.includes('рук')) return EMPTY_SLOT_ICONS.ruki;
      if (name.includes('gloves') || name.includes('перчат')) return EMPTY_SLOT_ICONS.ruki;
      if (name.includes('коль')) return EMPTY_SLOT_ICONS.kolco;
      if (name.includes('ring1')) return EMPTY_SLOT_ICONS.kolco;
      if (name.includes('амул')) return EMPTY_SLOT_ICONS.amulet;
      if (name.includes('necklace') || name.includes('ожер')) return EMPTY_SLOT_ICONS.amulet;
      if (name.includes('аксесс') || name.includes('украш')) return EMPTY_SLOT_ICONS.poyas;
      if (name.includes('пояс')) return EMPTY_SLOT_ICONS.poyas;
      if (name.includes('плащ')) return EMPTY_SLOT_ICONS.plash;
      return null;
    }

    function emptyIconPathForEquipSlot(slotId) {
      if (slotId === 'earring1') return EMPTY_SLOT_ICONS.poyas;
      if (slotId === 'earring2') return EMPTY_SLOT_ICONS.serga2;
      const slot = SLOT_MAP[slotId];
      if (!slot) return null;
      return EMPTY_SLOT_ICONS[slot.emptyIcon] || emptyIconPathForSlot(slot.emptyIcon || slotId);
    }

    function getGroupKey(entry, tab) {
      const slot = normalizeText(entry.slot);
      if (tab === 'general') {
        if (isWearable(entry) && !isAccessory(entry)) return 'gear';
        if (isPotion(entry)) return 'potions';
        if (isScroll(entry)) return 'scrolls';
        if (isAccessory(entry)) return 'accessories';
        return 'misc';
      }
      return 'all';
    }

    function buildEquipmentEntries(entries) {
      const equippedMap = new Map(
        entries
          .filter(isEquipped)
          .filter((entry) => entry.equipSlot)
          .map((entry) => [entry.equipSlot, entry])
      );

      return EQUIP_SLOTS.map((slot) => (
        equippedMap.get(slot.id) || {
          uid: `empty-${slot.id}`,
          slot: slot.label,
          item: 'Пусто',
          type: 'Надето',
          equipSlot: slot.id,
          equipFamily: slot.family,
          category: 'wearable'
        }
      ));
    }

    function addStats(target, stats) {
      Object.keys(STAT_LABELS).forEach((key) => {
        target[key] = (target[key] || 0) + Number(stats?.[key] || 0);
      });
      return target;
    }

    function formatStatLine(stats) {
      return Object.entries(STAT_LABELS)
        .filter(([key]) => Number(stats[key] || 0) > 0)
        .map(([key, label]) => `${label} +${stats[key]}`)
        .join(' • ');
    }

    function computeEquipmentBonuses(entries) {
      const activeItems = entries.filter((entry) => !isEmptyItem(entry));
      const direct = addStats({ patt: 0, matt: 0, pdef: 0, mdef: 0 }, {});
      const setTotal = addStats({ patt: 0, matt: 0, pdef: 0, mdef: 0 }, {});
      const setCounters = {};
      const setSummaries = [];

      activeItems.forEach((entry) => {
        const meta = getEntryMeta(entry);
        addStats(direct, meta.stats);
        if (meta.setKey) {
          if (!setCounters[meta.setKey]) {
            setCounters[meta.setKey] = { parts: new Set(), count: 0 };
          }
          setCounters[meta.setKey].count += 1;
          if (meta.setPart) {
            setCounters[meta.setKey].parts.add(meta.setPart);
          }
        }
      });

      Object.entries(setCounters).forEach(([setKey, payload]) => {
        const config = SET_LIBRARY[setKey];
        if (!config) return;
        const activeBonus = { patt: 0, matt: 0, pdef: 0, mdef: 0 };
        Object.keys(config.thresholds)
          .map(Number)
          .sort((a, b) => a - b)
          .forEach((threshold) => {
            if (payload.parts.size >= threshold) {
              addStats(activeBonus, config.thresholds[threshold]);
            }
          });
        if (formatStatLine(activeBonus)) {
          addStats(setTotal, activeBonus);
          setSummaries.push({
            name: config.name,
            parts: payload.parts.size,
            bonusText: formatStatLine(activeBonus)
          });
        }
      });

      return {
        direct,
        setTotal,
        total: addStats({ patt: 0, matt: 0, pdef: 0, mdef: 0 }, direct) && addStats(direct, setTotal),
        setSummaries
      };
    }

    function renderEquipmentSlot(entry) {
      const slot = SLOT_MAP[entry.equipSlot];
      const isEmpty = isEmptyItem(entry);
      const blueprint = getItemBlueprint(entry);
      const iconPath = isEmpty
        ? emptyIconPathForEquipSlot(entry.equipSlot)
        : blueprint?.icon || emptyIconPathForEquipSlot(entry.equipSlot);
      const rarityClass = isEmpty ? '' : slotClassForEntry(entry);
      const modalAttrs = isEmpty ? '' : ` data-equipment-slot-item="${entry.uid || ''}" aria-label="${escapeHtml(entry.item)}"`;

      return `
        <button class="paperdoll-slot pos-${entry.equipSlot} ${isEmpty ? 'empty' : `has-item ${rarityClass}`}" type="button" ${isEmpty ? 'disabled' : ''}${modalAttrs}>
          <span class="equip-slot-icon">${iconPath ? renderInventoryIcon(iconPath) : glyphForSlot(slot?.label || entry.slot)}</span>
          <span class="slot-label-mini">${escapeHtml(slot?.label || entry.slot || '')}</span>
        </button>
      `;
    }

    function renderEquipmentPaperdoll(entries) {
      return `
        <section class="equipment-paperdoll">
          <div class="paperdoll-stage">
            <div class="paperdoll-center-glow"></div>
            <div class="paperdoll-silhouette"></div>
            ${entries.map((entry) => renderEquipmentSlot(entry)).join('')}
          </div>
        </section>
      `;
    }

    function findTargetEquipSlotId(entry, entries) {
      const { family } = getEntryMeta(entry);
      if (!family) return null;

      if (family === 'ring') {
        const occupied = new Set(entries.filter(isEquipped).map((item) => item.equipSlot));
        return ['ring1', 'ring2'].find((slotId) => !occupied.has(slotId)) || null;
      }

      if (family === 'earring') {
        const occupied = new Set(entries.filter(isEquipped).map((item) => item.equipSlot));
        return ['earring1', 'earring2'].find((slotId) => !occupied.has(slotId)) || null;
      }

      return getPrimaryEquipSlotId(family);
    }

    const realInventory = inventory.filter((entry) => !isEmptyItem(entry));
    const equippedItems = buildEquipmentEntries(inventory);
    const bagItems = realInventory.filter((entry) => !isEquipped(entry));
    const generalItems = bagItems.filter((entry) => !isResource(entry) && !isQuest(entry));
    const resourceItems = bagItems.filter(isResource);
    const questItems = bagItems.filter(isQuest);

    const groupSets = {
      general: [
        { key: 'all', label: 'Все' },
        { key: 'gear', label: 'Оружие/Броня' },
        { key: 'potions', label: 'Зелья' },
        { key: 'scrolls', label: 'Свитки' },
        { key: 'accessories', label: 'Аксессуары' },
        { key: 'misc', label: 'Прочее' }
      ]
    };

    function countInGroup(items, key) {
      if (key === 'all') return items.length;
      return items.filter((entry) => getGroupKey(entry, 'general') === key).length;
    }

    function renderGroupBar(items) {
      return `
        <div class="legacy-groups" data-filter-group="general">
          ${groupSets.general.map((group, index) => `
            <button
              class="legacy-group${index === 0 ? ' active' : ''}"
              type="button"
              data-group-button="general"
              data-filter="${group.key}"
            >
              <strong>${group.label}</strong>
              <span>${countInGroup(items, group.key)} шт.</span>
            </button>
          `).join('')}
        </div>
      `;
    }

    function getInventoryLimit() {
      return Math.max(1, Number(state.hero.inventoryLimit || 80) || 80);
    }

    function getOccupiedInventoryEntries(entries = state.hero.inventory) {
      return (entries || []).filter((entry) => !isEmptyItem(entry));
    }

    function getOccupiedInventorySlotUsage(entries = state.hero.inventory) {
      return getOccupiedInventoryEntries(entries).length;
    }

    function hasInventoryCapacity(entries = state.hero.inventory, slotsNeeded = 1) {
      return getOccupiedInventorySlotUsage(entries) + slotsNeeded <= getInventoryLimit();
    }

    function renderGeneralMeta() {
      const used = getOccupiedInventorySlotUsage();
      const limit = getInventoryLimit();
      const pct = Math.max(0, Math.min(100, Math.round((used / limit) * 100)));
      const stateClass = pct >= 80 ? 'danger' : pct >= 50 ? 'warn' : 'ok';
      return `
        <div class="inventory-general-meta">
          <div class="capacity-wrap ${stateClass}">
            <div class="capacity-caption"><span>Сумка</span><b>${used}/${limit}</b></div>
            <div class="capacity-bar"><span class="capacity-fill" style="--capacity-fill:${pct}%"></span></div>
          </div>
        </div>
      `;
    }

    function getActionLabels(entry, tab) {
      if (tab === 'equipment') {
        return isEmptyItem(entry) ? [] : [
          { label: 'Инфо' },
          { label: 'Снять' }
        ];
      }

      if (tab === 'general') {
        if (isWearable(entry)) {
          return [
            { label: 'Инфо' },
            { label: 'Надеть' },
            { label: 'Выкинуть', kind: 'drop' }
          ];
        }

        if (isConsumable(entry)) {
          return [
            { label: 'Инфо' },
            { label: 'Использовать' },
            { label: 'Выкинуть', kind: 'drop' }
          ];
        }

        return [
          { label: 'Инфо' },
          { label: 'Выкинуть', kind: 'drop' }
        ];
      }

      if (tab === 'resources') {
        return [
          { label: 'Инфо' },
          { label: 'Передать' },
          { label: 'Выкинуть', kind: 'drop' }
        ];
      }

      if (tab === 'quest') {
        return [{ label: 'Инфо' }];
      }

      return [];
    }

    function renderIcon(entry, tab) {
      const blueprint = getItemBlueprint(entry);
      if (blueprint?.icon) {
        return renderInventoryIcon(blueprint.icon);
      }
      if (tab === 'equipment' && isEmptyItem(entry)) {
        const iconPath = emptyIconPathForSlot(entry.equipSlot || entry.slot);
        if (iconPath) {
          return renderInventoryIcon(iconPath);
        }
      }
      return glyphForSlot(entry.slot);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function isAccessoryFamily(family, slotLabel) {
      const text = normalizeText(`${family || ''} ${slotLabel || ''}`);
      return (
        text.includes('ring') ||
        text.includes('earring') ||
        text.includes('amulet') ||
        text.includes('necklace') ||
        text.includes('ожер') ||
        text.includes('серьг') ||
        text.includes('кольц')
      );
    }

    function isArmorFamily(family, slotLabel) {
      const text = normalizeText(`${family || ''} ${slotLabel || ''}`);
      return (
        text.includes('body') ||
        text.includes('head') ||
        text.includes('helmet') ||
        text.includes('legs') ||
        text.includes('boots') ||
        text.includes('gloves') ||
        text.includes('shield') ||
        text.includes('тело') ||
        text.includes('шлем') ||
        text.includes('низ') ||
        text.includes('бот') ||
        text.includes('перчат') ||
        text.includes('щит')
      );
    }

    function isWeaponFamily(family, slotLabel) {
      const text = normalizeText(`${family || ''} ${slotLabel || ''}`);
      return (
        text.includes('weapon') ||
        text.includes('оруж') ||
        text.includes('меч') ||
        text.includes('лук') ||
        text.includes('кинжал')
      );
    }

    function numericStat(stats, key) {
      const value = Number(stats?.[key] || 0);
      return Number.isFinite(value) ? value : 0;
    }

    function buildItemDescription(entry) {
      const blueprint = getItemBlueprint(entry);
      const stats = blueprint?.stats || {};
      const family = blueprint?.family || entry?.equipFamily || entry?.equipSlot || '';
      const slotLabel = blueprint?.slotLabel || entry?.slot || '';
      const category = normalizeText(blueprint?.category || entry?.category || '');
      const lines = [];
      const directDescription = String(blueprint?.description || '').trim();

      if (blueprint?.effect === 'hp') {
        const healAmount = Number(blueprint?.give || 0);
        return healAmount > 0
          ? `Восстанавливает ${healAmount} HP.`
          : 'Восстанавливает здоровье.';
      }

      if (blueprint?.effect === 'return_scroll') {
        return 'Телепортирует в ближайший город.';
      }

      if (category === 'resource' || isResource(entry)) {
        return 'Материал для крафта и ремесла.';
      }

      if (category === 'quest' || isQuest(entry)) {
        return 'Квестовый предмет.';
      }

      if (isWeaponFamily(family, slotLabel)) {
        const pAtk = numericStat(stats, 'patt');
        const mAtk = numericStat(stats, 'matt');
        const critical = numericStat(stats, 'critical') || numericStat(stats, 'crit');
        if (pAtk) lines.push(`Урон: ${pAtk}`);
        if (mAtk) lines.push(`Маг. урон: ${mAtk}`);
        if (critical) lines.push(`Крит: ${critical}`);
      } else if (isAccessoryFamily(family, slotLabel)) {
        const mDef = numericStat(stats, 'mdef');
        if (mDef) lines.push(`M.Def: ${mDef}`);
      } else if (isArmorFamily(family, slotLabel)) {
        const pDef = numericStat(stats, 'pdef');
        if (pDef) lines.push(`P.Def: ${pDef}`);
      }

      const hpBonus = numericStat(stats, 'hp');
      if (hpBonus) {
        lines.push(`HP: +${hpBonus}`);
      }

      const mpBonus = numericStat(stats, 'mp');
      if (mpBonus) {
        lines.push(`MP: +${mpBonus}`);
      }

      if (directDescription) {
        lines.unshift(directDescription);
      }

      if (!lines.length && category === 'consumable') {
        return 'Расходуется при использовании.';
      }

      if (!lines.length && blueprint?.category === 'wearable') {
        return 'Предмет экипировки.';
      }

      if (!lines.length && blueprint) {
        return 'Предмет инвентаря.';
      }

      return lines.join(' • ') || 'Описание предмета скоро появится.';
    }

    function renderRow(entry, tab, actionLabels) {
      const itemName = entry.item;
      const slotName = entry.slot;
      const description = buildItemDescription(entry);
      const groupKey = tab === 'general' ? getGroupKey(entry, tab) : 'all';
      const isEmpty = isEmptyItem(entry);
      const safeActions = isEmpty ? [] : actionLabels;
      return `
        <article class="legacy-row" data-row-tab="${tab}" data-row-group="${groupKey}">
          <div class="legacy-icon">${renderIcon(entry, tab)}</div>
          <div class="legacy-copy">
            <strong>${escapeHtml(itemName)}</strong>
            <span class="legacy-meta">${escapeHtml(slotName)}</span>
            ${description ? `<span class="legacy-desc">${escapeHtml(description)}</span>` : ''}
          </div>
          <div class="legacy-actions">
            ${safeActions.map((action) => `
              <button
                class="legacy-action${action.kind === 'drop' ? ' drop' : ''}"
                type="button"
                data-item-action="${action.label}"
                data-item-uid="${entry.uid || ''}"
                data-item-name="${itemName}"
                data-item-slot="${slotName}"
                data-item-tab="${tab}"
              >${action.label}</button>
            `).join('')}
          </div>
        </article>
      `;
    }

    function renderSimpleList(tab, items, actionFactory, emptyText) {
      if (!items.length) {
        return `<div class="legacy-empty">${emptyText}</div>`;
      }
      return `
        <div class="legacy-list">
          ${items.map((entry) => renderRow(entry, tab, actionFactory(entry))).join('')}
        </div>
      `;
    }

    function formatAdena(value) {
      return Number(value || 0).toLocaleString('ru-RU');
    }

    function findNearestCityId(cityId) {
      if (typeof cities === 'undefined') return cityId;
      const currentCity = cities[cityId];
      if (!currentCity) return cityId;

      const routeCandidates = [];
      (currentCity.teleportDestinations || []).forEach((route) => {
        routeCandidates.push({ cityId: route.cityId, score: Number(route.cost || 0) });
      });
      (currentCity.walkingRoutes || []).forEach((route) => {
        routeCandidates.push({ cityId: route.cityId, score: Number(route.durationMin || 0) });
      });

      routeCandidates.sort((a, b) => a.score - b.score);
      return routeCandidates[0]?.cityId || cityId;
    }

    function consumeInventoryEntry(index, entry) {
      const stack = parseStackedItem(entry);
      if (stack && stack.count > 1) {
        state.hero.inventory[index] = {
          ...entry,
          item: `${stack.count - 1} x ${stack.baseName}`
        };
      } else {
        state.hero.inventory.splice(index, 1);
      }
    }


    function getBagMinimumSlots(tab, itemCount) {
      const base = tab === 'general' ? 56 : tab === 'resources' ? 48 : 40;
      const cols = 8;
      return Math.max(base, Math.ceil(Math.max(itemCount, 1) / cols) * cols);
    }

    function getStackBadge(entry) {
      const stack = parseStackedItem(entry);
      if (stack && stack.count > 1) return stack.count;
      return '';
    }

    function renderBagSlot(entry, tab) {
      const groupKey = tab === 'general' ? getGroupKey(entry, tab) : 'all';
      const qty = getStackBadge(entry);
      const safeName = escapeHtml(getBaseItemName(entry));
      const safeFullName = escapeHtml(entry.item || '');
      const rarityClass = slotClassForEntry(entry);
      return `
        <button
          class="bag-slot filled ${rarityClass}"
          type="button"
          data-bag-slot="item"
          data-bag-tab="${tab}"
          data-bag-group="${groupKey}"
          data-bag-item-uid="${entry.uid || ''}"
          data-bag-item-name="${safeFullName}"
          aria-label="${safeFullName}"
        >
          <span class="bag-slot-icon">${renderIcon(entry, tab)}</span>
          ${qty ? `<span class="bag-slot-qty">${qty}</span>` : ''}
          <span class="bag-slot-name">${safeName}</span>
        </button>
      `;
    }

    function renderEmptyBagSlots(count) {
      return Array.from({ length: count }, (_, index) => `
        <div class="bag-slot empty" data-bag-empty="${index}"></div>
      `).join('');
    }

    function renderLockedBagSlots(count = 20) {
      return Array.from({ length: count }, (_, index) => `
        <div class="bag-slot locked" data-locked-slot="${index}" title="Закрытый слот"></div>
      `).join('');
    }

    function renderBagGrid(tab, items, actionFactory, emptyText) {
      const minSlots = getBagMinimumSlots(tab, items.length);
      const emptySlots = Math.max(0, minSlots - items.length);
      return `
        <section class="bag-panel" data-bag-panel="${tab}">
          <div class="bag-topline">
            <span>${items.length ? 'Выбери предмет, чтобы открыть окно предмета.' : emptyText}</span>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
              <button class="bag-sort-btn" type="button" data-sort-inventory>Сортировать</button>
              ${tab === 'general' ? renderGeneralMeta() : ''}
            </div>
          </div>
          <div class="bag-grid" data-bag-tab="${tab}">
            ${items.map((entry) => renderBagSlot(entry, tab)).join('')}
            ${renderEmptyBagSlots(emptySlots)}
            ${renderLockedBagSlots(20)}
          </div>
          <div class="bag-detail empty" data-bag-detail="${tab}">
            ${items.length ? 'Нажми на предмет, чтобы открыть описание, сравнение и действия.' : emptyText}
          </div>
        </section>
      `;
    }

    function findBagEntryByUid(uid) {
      return state.hero.inventory.find((entry) => entry.uid === uid) || null;
    }

    function getCurrentEquippedForComparison(entry) {
      const meta = getEntryMeta(entry);
      if (!meta.family) return null;
      let targetSlotId = entry.equipSlot || findTargetEquipSlotId(entry, state.hero.inventory) || getPrimaryEquipSlotId(meta.family);
      if (meta.family === 'ring' && !targetSlotId) targetSlotId = 'ring1';
      if (meta.family === 'earring' && !targetSlotId) targetSlotId = 'earring1';
      if (!targetSlotId) return null;
      const equipped = state.hero.inventory.find((item) => isEquipped(item) && item.equipSlot === targetSlotId);
      if (!equipped || equipped.uid === entry.uid) return null;
      return equipped;
    }

    function renderComparison(entry) {
      const meta = getEntryMeta(entry);
      if (!meta.family) return '';

      const current = getCurrentEquippedForComparison(entry);

      if (!current) {
        const stats = meta.stats || {};
        const statRows = Object.entries(COMPARE_STAT_LABELS)
          .filter(([key]) => Number(stats[key] || 0) !== 0)
          .map(([key, label]) => `<div class="compare-row"><span>${label}</span><b>—</b><b>${Number(stats[key] || 0)}</b><b class="diff-plus">+${Number(stats[key] || 0)}</b></div>`)
          .join('');

        if (!statRows) return '';
        return `<div class="tooltip-compare"><div class="compare-title">Бонусы предмета</div>${statRows}</div>`;
      }

      const currentStats = getEntryMeta(current).stats || {};
      const nextStats = meta.stats || {};
      const rows = Object.entries(COMPARE_STAT_LABELS)
        .filter(([key]) => Number(currentStats[key] || 0) !== 0 || Number(nextStats[key] || 0) !== 0)
        .map(([key, label]) => {
          const oldValue = Number(currentStats[key] || 0);
          const newValue = Number(nextStats[key] || 0);
          const diff = newValue - oldValue;
          const diffClass = diff > 0 ? 'diff-plus' : diff < 0 ? 'diff-minus' : 'diff-zero';
          const diffText = diff > 0 ? `+${diff}` : String(diff);
          return `<div class="compare-row"><span>${label}</span><b>${oldValue}</b><b>${newValue}</b><b class="${diffClass}">${diffText}</b></div>`;
        })
        .join('');

      if (!rows) return '';
      return `
        <div class="tooltip-compare">
          <div class="compare-title">Сравнение с надетым: ${escapeHtml(current.item)}</div>
          <div class="compare-row"><span></span><b>Сейчас</b><b>Новое</b><b>±</b></div>
          ${rows}
        </div>
      `;
    }

    function renderItemTooltip(entry, tab) {
      if (!entry) return '<div class="tooltip-desc">Предмет не найден.</div>';
      const description = buildItemDescription(entry);
      const actions = getActionLabels(entry, tab).filter((action) => action.label !== 'Инфо');
      const rarity = getItemRarity(entry);
      const rarityLabel = getRarityLabel(entry);
      const blueprint = getItemBlueprint(entry);
      const icon = blueprint?.icon ? renderInventoryIcon(blueprint.icon) : renderIcon(entry, tab);
      const locked = isQuest(entry);

      return `
        <div class="tooltip-head rarity-${rarity}">
          <div class="tooltip-icon">${icon}</div>
          <div>
            <div class="tooltip-title">${escapeHtml(entry.item)}</div>
            <div class="tooltip-sub">
              <span class="rarity-pill">${rarityLabel}</span>
              <span class="type-pill">${escapeHtml(entry.slot || 'Предмет')}</span>
            </div>
          </div>
        </div>
        ${description ? `<div class="tooltip-desc">${escapeHtml(description)}</div>` : ''}
        ${renderComparison(entry)}
        ${locked ? '<div class="tooltip-warning">🔒 Квестовый предмет нельзя выкинуть или продать.</div>' : ''}
        <div class="tooltip-actions">
          ${actions.map((action) => `
            <button
              class="legacy-action${action.kind === 'drop' ? ' drop' : ''}"
              type="button"
              data-item-action="${action.label}"
              data-item-uid="${entry.uid || ''}"
              data-item-name="${escapeHtml(entry.item)}"
              data-item-slot="${escapeHtml(entry.slot)}"
              data-item-tab="${tab}"
            >${action.label}</button>
          `).join('')}
          <button class="legacy-action" type="button" data-close-item-modal>Закрыть</button>
        </div>
      `;
    }

    function openItemModal(entry, tab) {
      const modal = q('itemModal');
      const content = q('itemModalContent');
      if (!modal || !content) return;
      content.innerHTML = renderItemTooltip(entry, tab);
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeItemModal() {
      const modal = q('itemModal');
      if (!modal) return;
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
    }

    function selectBagSlot(slot) {
      const tab = slot.dataset.bagTab;
      const uid = slot.dataset.bagItemUid;
      const entry = findBagEntryByUid(uid);

      document.querySelectorAll(`[data-bag-tab="${tab}"] .bag-slot.selected`).forEach((item) => {
        item.classList.remove('selected');
      });

      slot.classList.add('selected');
      openItemModal(entry, tab);
    }

    function autoSortInventoryEntries() {
      const categoryOrder = {
        wearable: 1,
        consumable: 2,
        resource: 3,
        quest: 4,
        general: 5
      };
      const equipped = state.hero.inventory.filter(isEquipped);
      const bag = state.hero.inventory.filter((entry) => !isEquipped(entry));

      bag.sort((a, b) => {
        const categoryDiff = (categoryOrder[a.category] || 99) - (categoryOrder[b.category] || 99);
        if (categoryDiff) return categoryDiff;

        const rarityDiff = (RARITY_ORDER[getItemRarity(b)] || 1) - (RARITY_ORDER[getItemRarity(a)] || 1);
        if (rarityDiff) return rarityDiff;

        const familyDiff = String(getEntryMeta(a).family || '').localeCompare(String(getEntryMeta(b).family || ''), 'ru');
        if (familyDiff) return familyDiff;

        return String(getBaseItemName(a)).localeCompare(String(getBaseItemName(b)), 'ru');
      });

      state.hero.inventory = [...equipped, ...bag];
      persistHeroState();
      showToast('Инвентарь отсортирован.');
      setTimeout(() => window.location.reload(), 120);
    }


    q('app').innerHTML = `
      <div class="single-page-layout inventory-shell">
        <div class="inventory-tabs">
          <button class="inventory-tab active" type="button" data-tab="equipment">Экипировка</button>
          <button class="inventory-tab" type="button" data-tab="general">Общее</button>
          <button class="inventory-tab" type="button" data-tab="resources">Ресурсы</button>
          <button class="inventory-tab" type="button" data-tab="quest">Квестовые предметы</button>
        </div>

        <div class="inventory-body">
          <section class="inventory-panel" data-current-tab="equipment">
            <div class="inventory-panel-inner">
              <div class="tab-panel active" data-panel="equipment">
                ${renderEquipmentPaperdoll(equippedItems)}
              </div>

              <div class="tab-panel" data-panel="general">
                ${renderGroupBar(generalItems)}
                ${renderBagGrid(
                  'general',
                  generalItems,
                  (entry) => getActionLabels(entry, 'general'),
                  'В общем разделе пока пусто.'
                )}
              </div>

              <div class="tab-panel" data-panel="resources">
                ${renderBagGrid(
                  'resources',
                  resourceItems,
                  (entry) => getActionLabels(entry, 'resources'),
                  'Предметов с отметкой ресурса пока нет.'
                )}
              </div>

              <div class="tab-panel" data-panel="quest">
                ${renderBagGrid(
                  'quest',
                  questItems,
                  (entry) => getActionLabels(entry, 'quest'),
                  'Предметов с отметкой квест пока нет.'
                )}
              </div>
            </div>
            <div class="inventory-panel-footer">
              <div class="adena-tracker">
                <img src="./assets/ui/items/custom/adena.png" alt="Adena">
                <span>${formatAdena(state.hero.adena)}</span>
              </div>
            </div>
          </section>
        </div>
      </div>
      ${renderBottomNav('inventory')}
    `;

    const tabs = [...document.querySelectorAll('[data-tab]')];
    const panels = [...document.querySelectorAll('[data-panel]')];
    const inventoryPanel = document.querySelector('.inventory-panel');

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach((item) => item.classList.toggle('active', item === tab));
        panels.forEach((panel) => panel.classList.toggle('active', panel.dataset.panel === target));
        if (inventoryPanel) {
          inventoryPanel.dataset.currentTab = target;
        }
      });
    });

    document.querySelectorAll('[data-group-button="general"]').forEach((button) => {
      button.addEventListener('click', () => {
        const filter = button.dataset.filter;
        document.querySelectorAll('[data-group-button="general"]').forEach((item) => {
          item.classList.toggle('active', item === button);
        });
        document.querySelectorAll('[data-bag-tab="general"] [data-bag-group]').forEach((slot) => {
          const hidden = filter !== 'all' && slot.dataset.bagGroup !== filter;
          slot.classList.toggle('hidden', hidden);
          if (hidden) slot.classList.remove('selected');
        });
        const detail = document.querySelector('[data-bag-detail="general"]');
        if (detail) {
          detail.innerHTML = 'Нажми на предмет, чтобы открыть описание, сравнение и действия.';
        }
      });
    });


    document.querySelectorAll('[data-bag-slot="item"]').forEach((slot) => {
      slot.addEventListener('click', () => selectBagSlot(slot));
    });

    document.querySelectorAll('[data-equipment-slot-item]').forEach((slot) => {
      slot.addEventListener('click', () => {
        const entry = findBagEntryByUid(slot.dataset.equipmentSlotItem);
        if (entry) openItemModal(entry, 'equipment');
      });
    });

    document.querySelectorAll('[data-sort-inventory]').forEach((button) => {
      button.addEventListener('click', autoSortInventoryEntries);
    });

    q('itemModalClose')?.addEventListener('click', closeItemModal);
    q('itemModal')?.addEventListener('click', (event) => {
      if (event.target === q('itemModal') || event.target.closest('[data-close-item-modal]')) {
        closeItemModal();
      }
    });

    function handleItemActionButton(button) {
        const action = button.dataset.itemAction;
        const itemUid = button.dataset.itemUid;
        const itemName = button.dataset.itemName;
        const slotName = button.dataset.itemSlot;

        if (action === 'Инфо') {
          const infoEntry = state.hero.inventory.find((entry) => entry.uid === itemUid)
            || buildEquipmentEntries(state.hero.inventory).find((entry) => entry.uid === itemUid)
            || { item: itemName, slot: slotName };
          showToast(buildItemDescription(infoEntry));
          return;
        }

        if (action === 'Снять') {
          const equippedIndex = state.hero.inventory.findIndex((entry) => (
            entry.uid === itemUid
          ));

          if (equippedIndex === -1) {
            showToast('Предмет уже снят.');
            return;
          }

          const equippedEntry = state.hero.inventory[equippedIndex];
          const equippedMeta = getEntryMeta(equippedEntry);
          state.hero.inventory[equippedIndex] = {
            ...equippedEntry,
            slot: getBagSlotLabel(equippedMeta.family),
            type: 'Сумка',
            equipSlot: ''
          };
          persistHeroState();
          showToast(`Снято: ${itemName}`);
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        if (action === 'Надеть') {
          const bagIndex = state.hero.inventory.findIndex((entry) => (
            entry.uid === itemUid
          ));

          if (bagIndex === -1) {
            showToast('Предмет не найден в сумке.');
            return;
          }

          const bagEntry = state.hero.inventory[bagIndex];
          const targetSlotId = findTargetEquipSlotId(bagEntry, state.hero.inventory);
          const bagMeta = getEntryMeta(bagEntry);

          if (!targetSlotId) {
            showToast(
              bagMeta.family === 'ring'
                ? 'Сначала снимите одно из колец.'
                : bagMeta.family === 'earring'
                  ? 'Сначала снимите одну из серёг.'
                  : 'Для предмета не найден слот экипировки.'
            );
            return;
          }

          const equippedIndex = state.hero.inventory.findIndex((entry) => (
            isEquipped(entry) &&
            entry.equipSlot === targetSlotId
          ));

          if (equippedIndex !== -1) {
            const equippedEntry = state.hero.inventory[equippedIndex];
            const equippedMeta = getEntryMeta(equippedEntry);
            state.hero.inventory[equippedIndex] = {
              ...equippedEntry,
              slot: getBagSlotLabel(equippedMeta.family),
              type: 'Сумка',
              equipSlot: ''
            };
          }

          state.hero.inventory[bagIndex] = {
            ...bagEntry,
            slot: SLOT_MAP[targetSlotId].label,
            type: 'Надето',
            equipSlot: targetSlotId
          };

          persistHeroState();
          showToast(`Надето: ${itemName}`);
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        if (action === 'Использовать') {
          const bagIndex = state.hero.inventory.findIndex((entry) => (
            !isEquipped(entry) &&
            entry.uid === itemUid
          ));

          if (bagIndex === -1) {
            showToast('Предмет не найден в сумке.');
            return;
          }

          const bagEntry = state.hero.inventory[bagIndex];
          const blueprint = getItemBlueprint(bagEntry);
          const healAmount = Number(blueprint?.give || 0);

          if (blueprint?.effect === 'hp') {
            state.hero.hp = Math.min(state.hero.maxHp || state.hero.hp, state.hero.hp + healAmount);
          }

          if (blueprint?.effect === 'return_scroll') {
            const nextCityId = findNearestCityId(state.hero.cityId);
            state.hero.cityId = nextCityId;
          }

          consumeInventoryEntry(bagIndex, bagEntry);
          persistHeroState();
          if (blueprint?.effect === 'return_scroll' && typeof cities !== 'undefined' && cities[state.hero.cityId]) {
            showToast(`Телепорт: ${cities[state.hero.cityId].name}`);
          } else if (blueprint?.effect === 'hp') {
            showToast(`Восстановлено HP: +${healAmount}`);
          } else {
            showToast(`Использовано: ${itemName}`);
          }
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        if (action === 'Выкинуть') {
          const dropIndex = state.hero.inventory.findIndex((entry) => (
            !isEquipped(entry) &&
            entry.uid === itemUid
          ));

          if (dropIndex === -1) {
            showToast('Предмет не найден в сумке.');
            return;
          }

          const dropEntry = state.hero.inventory[dropIndex];
          if (isQuest(dropEntry)) {
            showToast('Квестовые предметы нельзя выкинуть.');
            return;
          }

          state.hero.inventory.splice(dropIndex, 1);
          persistHeroState();
          closeItemModal();
          showToast(`Выкинуто: ${itemName}`);
          setTimeout(() => window.location.reload(), 120);
          return;
        }

        showToast(`${action}: ${itemName}`);

    }

    document.addEventListener('click', (event) => {
      const button = event.target.closest('[data-item-action]');
      if (!button) return;
      event.preventDefault();
      handleItemActionButton(button);
    });
    })();
  </script>
</body>
</html>
