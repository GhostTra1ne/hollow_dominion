<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta http-equiv=""Cache-Control"" content=""no-cache, no-store, must-revalidate"">
  <meta http-equiv=""Pragma"" content=""no-cache"">
  <meta http-equiv=""Expires"" content=""0"">
  <script>
    (function () {
      const APP_VERSION = '20260421-telegram-6';
      const url = new URL(window.location.href);
      if (url.searchParams.get('appv') !== APP_VERSION) {
        url.searchParams.set('appv', APP_VERSION);
        window.location.replace(url.toString());
      }
      window.__HD_APP_VERSION__ = APP_VERSION;
    })();
  </script>  <title>Клан</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css?v=20260421-telegram-6">
</head>
<body>
  <div class="screen-page">
    <div class="app-shell" id="app"></div>
  </div>

  <script src="common.js?v=20260421-telegram-6"></script>
  <script>
    let state = loadState();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    q('app').innerHTML = `
      ${renderHeader(state, 'Клановый раздел героя и будущие альянсы Hollow Dominion.')}
      <div class="single-page-layout">
        <div class="panel page-main-panel">
          <div class="panel-inner content-scroll">
            <div class="page-stack">
              <div class="page-intro">
                <strong>${state.hero.clanName}</strong>
                <p class="subtitle">Пока герой не состоит в активном клане, но здесь позже появятся эмблема, список участников, приглашения и вклад клана.</p>
              </div>
              <div class="feature-card">
                <h3 style="margin:0 0 10px;color:#f1d59a;font-family:var(--font-main)">Клановые действия</h3>
                <div style="display:flex;gap:10px;flex-wrap:wrap">
                  <button class="btn ghost" disabled>Создать клан</button>
                  <button class="btn ghost" disabled>Вступить в клан</button>
                  <button class="btn ghost" disabled>Открыть войну кланов</button>
                </div>
              </div>
              <div class="feature-card">
                <h3 style="margin:0 0 10px;color:#f1d59a;font-family:var(--font-main)">Что будет дальше</h3>
                <p class="subtitle">Эту вкладку можно развить в полноценную клановую страницу: эмблема, ранг, склад, войны, союзники и журнал вклада участников.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      ${renderBottomNav('clan')}
    `;
  </script>
</body>
</html>
