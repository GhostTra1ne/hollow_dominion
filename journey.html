<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    (function () {
      const APP_VERSION = '20260428-telegram-100';
      const url = new URL(window.location.href);
      if (url.searchParams.get('appv') !== APP_VERSION) {
        url.searchParams.set('appv', APP_VERSION);
        window.location.replace(url.toString());
      }
      window.__HD_APP_VERSION__ = APP_VERSION;
    })();
  </script>
  <title>РџСѓС‚РµС€РµСЃС‚РІРёРµ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css?v=20260428-telegram-100">
</head>
<body>
  <div class="screen-page">
    <div class="app-shell" id="app"></div>
  </div>
  <div class="toast" id="toast"></div>

<script src="item-catalog.js?v=20260428-telegram-100"></script>
<script src="common.js?v=20260428-telegram-100"></script>
  <script>
    (async () => {
    let state = await window.HD_BOOTSTRAP_APP_STATE();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    const city = getCurrentCity(state);
    updateTravelStatus(state);

    function teleportTo(cityId, cost) {
      if (state.hero.adena < cost) {
        showToast('РќРµРґРѕСЃС‚Р°С‚РѕС‡РЅРѕ РђРґРµРЅР° РґР»СЏ С‚РµР»РµРїРѕСЂС‚Р°.');
        return;
      }
      state.hero.adena -= cost;
      state.hero.cityId = cityId;
      saveState(state);
      location.href = 'index.html';
    }

    function startWalking(route) {
      if (state.travel && state.travel.status === 'walking') {
        showToast('РўС‹ СѓР¶Рµ РІ РїСѓС‚Рё.');
        return;
      }
      const now = Date.now();
      state.travel = {
        fromCityId: city.id,
        toCityId: route.cityId,
        startedAt: now,
        endsAt: now + route.durationMin * 60 * 1000,
        bandits: Math.random() < route.risk,
        status: 'walking'
      };
      saveState(state);
      location.reload();
    }

    function arrive() {
      if (!tryArriveFromTravel(state)) return;
      location.href = 'index.html';
    }

    const teleports = city.teleportDestinations.map((d) => `
      <div class="destination-card">
        <div>
          <div><strong>${cities[d.cityId].name}</strong></div>
          <div class="subtitle">${d.text}</div>
          <div class="destination-meta"><div class="chip">${d.cost} РђРґРµРЅР°</div></div>
        </div>
        <button class="btn primary" data-tp="${d.cityId}" data-cost="${d.cost}">РўРµР»РµРїРѕСЂС‚</button>
      </div>
    `).join('');

    const routes = city.walkingRoutes.map((r) => `
      <div class="route-card ${state.activeRouteCityId === r.cityId ? 'active' : ''}" data-route="${r.cityId}">
        <strong>${cities[r.cityId].name}</strong>
        <p>${r.text}</p>
        <div class="route-meta">
          <div class="chip">${r.durationMin} РјРёРЅ</div>
          <div class="chip">Р РёСЃРє: ${Math.round(r.risk * 100)}%</div>
        </div>
      </div>
    `).join('');

    let travelBox = '';
    if (state.travel) {
      const remaining = Math.max(0, state.travel.endsAt - Date.now());
      travelBox = `
        <div class="feature-card">
          <h3 style="margin:0 0 8px;color:#f1d59a;font-family:var(--font-main)">РўРµРєСѓС‰РёР№ РїСѓС‚СЊ</h3>
          <p class="subtitle">${cities[state.travel.fromCityId].name} в†’ ${cities[state.travel.toCityId].name}</p>
          <div style="margin-top:10px">${state.travel.status === 'walking' ? `РћСЃС‚Р°Р»РѕСЃСЊ: ${formatDuration(remaining)}` : 'РџСѓС‚СЊ Р·Р°РІРµСЂС€С‘РЅ.'}</div>
          ${state.travel.bandits ? '<div class="subtitle" style="margin-top:8px">РќР° РїСѓС‚Рё Р±С‹Р»Р° Р·Р°СЃР°РґР° СЂР°Р·Р±РѕР№РЅРёРєРѕРІ.</div>' : ''}
          <div style="margin-top:12px">${state.travel.status === 'arrived' ? '<button class="btn primary" id="arriveBtn">РџСЂРёР±С‹С‚СЊ РІ РіРѕСЂРѕРґ</button>' : ''}</div>
        </div>
      `;
    }

    q('app').innerHTML = `
      ${renderHeader(state, 'РўРµР»РµРїРѕСЂС‚С‹ РІ РґСЂСѓРіРёРµ РіРѕСЂРѕРґР° Рё РїРµС€РёРµ РјР°СЂС€СЂСѓС‚С‹ СЃ СЂРёСЃРєРѕРј Р·Р°СЃР°РґС‹.')}
      <div class="single-page-layout">
        <div class="panel page-main-panel">
          <div class="panel-inner content-scroll">
            <div class="page-stack">
              <div class="feature-card">
                <h3 style="margin:0 0 10px;color:#f1d59a;font-family:var(--font-main)">РњРµРЅРµРґР¶РµСЂ С‚РµР»РµРїРѕСЂС‚Р°С†РёР№</h3>
                ${teleports}
              </div>
              <div class="feature-card">
                <h3 style="margin:0 0 10px;color:#f1d59a;font-family:var(--font-main)">РџРµС€РёР№ РїСѓС‚СЊ</h3>
                <div class="route-map">${routes}</div>
                <div style="margin-top:12px">
                  <button class="btn primary" id="walkBtn">РћС‚РїСЂР°РІРёС‚СЊСЃСЏ РїРµС€РєРѕРј</button>
                </div>
              </div>
              ${travelBox}
            </div>
          </div>
        </div>
      </div>
      ${renderBottomNav('journey')}
    `;

    document.querySelectorAll('[data-tp]').forEach((el) => {
      el.onclick = () => teleportTo(el.dataset.tp, Number(el.dataset.cost));
    });

    document.querySelectorAll('[data-route]').forEach((el) => {
      el.onclick = () => {
        state.activeRouteCityId = el.dataset.route;
        saveState(state);
        location.reload();
      };
    });

    q('walkBtn').onclick = () => {
      const route = city.walkingRoutes.find((r) => r.cityId === state.activeRouteCityId) || city.walkingRoutes[0];
      startWalking(route);
    };

    if (q('arriveBtn')) q('arriveBtn').onclick = arrive;

    setInterval(() => {
      if (state.travel && state.travel.status === 'walking') {
        updateTravelStatus(state);
        location.reload();
      }
    }, 15000);
    })();
  </script>
</body>
</html>
