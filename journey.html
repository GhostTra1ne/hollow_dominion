<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta http-equiv=""Cache-Control"" content=""no-cache, no-store, must-revalidate"">
  <meta http-equiv=""Pragma"" content=""no-cache"">
  <meta http-equiv=""Expires"" content=""0"">
  <script>
    (function () {
      const APP_VERSION = '20260421-telegram-4';
      const url = new URL(window.location.href);
      if (url.searchParams.get('appv') !== APP_VERSION) {
        url.searchParams.set('appv', APP_VERSION);
        window.location.replace(url.toString());
      }
      window.__HD_APP_VERSION__ = APP_VERSION;
    })();
  </script>  <title>Путешествие</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css?v=20260421-telegram-4">
</head>
<body>
  <div class="screen-page">
    <div class="app-shell" id="app"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="common.js?v=20260421-telegram-4"></script>
  <script>
    let state = loadState();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    const city = getCurrentCity(state);
    updateTravelStatus(state);

    function teleportTo(cityId, cost) {
      if (state.hero.adena < cost) {
        showToast('Недостаточно Адена для телепорта.');
        return;
      }
      state.hero.adena -= cost;
      state.hero.cityId = cityId;
      saveState(state);
      location.href = 'index.html';
    }

    function startWalking(route) {
      if (state.travel && state.travel.status === 'walking') {
        showToast('Ты уже в пути.');
        return;
      }
      const now = Date.now();
      state.travel = {
        fromCityId: city.id,
        toCityId: route.cityId,
        startedAt: now,
        endsAt: now + route.durationMin * 60 * 1000,
        bandits: Math.random() < route.risk,
        status: 'walking'
      };
      saveState(state);
      location.reload();
    }

    function arrive() {
      if (!tryArriveFromTravel(state)) return;
      location.href = 'index.html';
    }

    const teleports = city.teleportDestinations.map((d) => `
      <div class="destination-card">
        <div>
          <div><strong>${cities[d.cityId].name}</strong></div>
          <div class="subtitle">${d.text}</div>
          <div class="destination-meta"><div class="chip">${d.cost} Адена</div></div>
        </div>
        <button class="btn primary" data-tp="${d.cityId}" data-cost="${d.cost}">Телепорт</button>
      </div>
    `).join('');

    const routes = city.walkingRoutes.map((r) => `
      <div class="route-card ${state.activeRouteCityId === r.cityId ? 'active' : ''}" data-route="${r.cityId}">
        <strong>${cities[r.cityId].name}</strong>
        <p>${r.text}</p>
        <div class="route-meta">
          <div class="chip">${r.durationMin} мин</div>
          <div class="chip">Риск: ${Math.round(r.risk * 100)}%</div>
        </div>
      </div>
    `).join('');

    let travelBox = '';
    if (state.travel) {
      const remaining = Math.max(0, state.travel.endsAt - Date.now());
      travelBox = `
        <div class="feature-card">
          <h3 style="margin:0 0 8px;color:#f1d59a;font-family:var(--font-main)">Текущий путь</h3>
          <p class="subtitle">${cities[state.travel.fromCityId].name} → ${cities[state.travel.toCityId].name}</p>
          <div style="margin-top:10px">${state.travel.status === 'walking' ? `Осталось: ${formatDuration(remaining)}` : 'Путь завершён.'}</div>
          ${state.travel.bandits ? '<div class="subtitle" style="margin-top:8px">На пути была засада разбойников.</div>' : ''}
          <div style="margin-top:12px">${state.travel.status === 'arrived' ? '<button class="btn primary" id="arriveBtn">Прибыть в город</button>' : ''}</div>
        </div>
      `;
    }

    q('app').innerHTML = `
      ${renderHeader(state, 'Телепорты в другие города и пешие маршруты с риском засады.')}
      <div class="single-page-layout">
        <div class="panel page-main-panel">
          <div class="panel-inner content-scroll">
            <div class="page-stack">
              <div class="feature-card">
                <h3 style="margin:0 0 10px;color:#f1d59a;font-family:var(--font-main)">Менеджер телепортаций</h3>
                ${teleports}
              </div>
              <div class="feature-card">
                <h3 style="margin:0 0 10px;color:#f1d59a;font-family:var(--font-main)">Пеший путь</h3>
                <div class="route-map">${routes}</div>
                <div style="margin-top:12px">
                  <button class="btn primary" id="walkBtn">Отправиться пешком</button>
                </div>
              </div>
              ${travelBox}
            </div>
          </div>
        </div>
      </div>
      ${renderBottomNav('journey')}
    `;

    document.querySelectorAll('[data-tp]').forEach((el) => {
      el.onclick = () => teleportTo(el.dataset.tp, Number(el.dataset.cost));
    });

    document.querySelectorAll('[data-route]').forEach((el) => {
      el.onclick = () => {
        state.activeRouteCityId = el.dataset.route;
        saveState(state);
        location.reload();
      };
    });

    q('walkBtn').onclick = () => {
      const route = city.walkingRoutes.find((r) => r.cityId === state.activeRouteCityId) || city.walkingRoutes[0];
      startWalking(route);
    };

    if (q('arriveBtn')) q('arriveBtn').onclick = arrive;

    setInterval(() => {
      if (state.travel && state.travel.status === 'walking') {
        updateTravelStatus(state);
        location.reload();
      }
    }, 15000);
  </script>
</body>
</html>
