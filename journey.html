<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"><title>Путешествие</title><link rel="stylesheet" href="common.css"><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body>
<main class="app-shell"><header class="back-row"><a class="btn ghost" href="profile.html">← Назад</a><h1 class="title">Отправиться в путешествие</h1><span></span></header><section class="city-layout"><div id="leftProfile"></div><div class="page-content"><div class="panel"><div class="panel-inner travel-grid" id="travelRoot"></div></div></div></section><footer class="bottom-nav"><a class="btn ghost" href="inventory.html">Инвентарь</a><a class="btn ghost" href="profile.html">Профиль</a><a class="btn ghost" href="status.html">Статус</a><a class="btn ghost" href="clan.html">Клан</a><a class="btn ghost" href="map.html">Карта</a><a class="btn ghost" href="chat.html">Чат</a></footer></main>
<script src="common.js"></script><script>if(!state.hero) location.href='index.html'; renderPortraitCard('leftProfile'); function renderTravel(){ const root=byId('travelRoot'); if(state.travel.active){ const ms=remainingTravelMs(); const ready=ms<=0; root.innerHTML=`<div class="card"><h3>Путь в ${CITY_NAMES[state.travel.to]}</h3><p>${ready ? 'Путешествие завершено. Можно прибыть в город.' : `Осталось: ${formatDuration(ms)}`}</p></div><div class="notice">${state.travel.event || 'Дорога спокойна.'}</div><button class="btn primary" ${ready ? '' : 'disabled'} id="arriveBtn">Прибыть</button>`; if(byId('arriveBtn')) byId('arriveBtn').onclick=()=>{ state.currentCity=state.travel.to; state.hero.cityName=CITY_NAMES[state.currentCity]; state.travel={active:false,to:'lyon',endsAt:0,event:null}; saveState(); location.href='profile.html'; }; return; } root.innerHTML=`<div class="card"><h3>Телепортация</h3><p>Перемещение за Аден.</p><div class="items-grid"><button class="btn ghost" data-tp="lyon">Лион — 40 Аден</button><button class="btn ghost" data-tp="ravenford">Рейвенфорд — 65 Аден</button></div></div><div class="card"><h3>Пеший путь</h3><p>До Лиона — 30 минут реального времени.</p><button class="btn primary" id="walkBtn">Отправиться пешком</button></div>`; root.querySelectorAll('[data-tp]').forEach(btn=>btn.onclick=()=>{ const to=btn.dataset.tp; const cost=to==='lyon'?40:65; if(state.hero.adena<cost) return alert('Недостаточно Аден.'); state.hero.adena-=cost; state.currentCity=to; state.hero.cityName=CITY_NAMES[to]; saveState(); location.href='profile.html'; }); byId('walkBtn').onclick=()=>{ state.travel={ active:true,to:'lyon',endsAt:Date.now()+30*60*1000,event:Math.random()<0.35 ? 'В пути могут напасть разбойники.' : 'Путь пока проходит спокойно.' }; saveState(); renderTravel(); }; } renderTravel(); setInterval(()=>{ if(state.travel.active) renderTravel(); },1000);</script></body></html>
