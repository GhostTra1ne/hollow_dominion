п»ҝ<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    (function () {
      const APP_VERSION = '20260422-telegram-33';
      const url = new URL(window.location.href);
      if (url.searchParams.get('appv') !== APP_VERSION) {
        url.searchParams.set('appv', APP_VERSION);
        window.location.replace(url.toString());
      }
      window.__HD_APP_VERSION__ = APP_VERSION;
    })();
  </script>
  <title>Р В§Р В°РЎвҖҡ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="common.css?v=20260422-telegram-33">
</head>
<body>
  <div class="screen-page">
    <div class="app-shell" id="app"></div>
  </div>

  <script src="item-catalog.js?v=20260422-telegram-33"></script>
  <script src="common.js?v=20260422-telegram-33"></script>
  <script>
    (async () => {
    let state = await window.HD_BOOTSTRAP_APP_STATE();
    if (!ensureHero(state)) {
      throw new Error('Hero not found');
    }

    const messages = (state.chatMessages || []).map((m) => `
      <div class="chat-card">
        <b>${escapeHtml(m.from)}</b>
        <div>${escapeHtml(m.text)}</div>
      </div>
    `).join('');

    q('app').innerHTML = `
      ${renderHeader(state, 'Р СӣР ВұРЎвҖ°Р С‘Р в„– Р С–Р С•РЎРӮР С•Р Т‘РЎРғР С”Р С•Р в„– Р С”Р В°Р Р…Р В°Р В» Р С‘ Р ВұРЎвҖ№РЎРғРЎвҖҡРЎРӮРЎвҖ№Р в„– Р С•Р ВұР СҳР ВөР Р… РЎРғР С•Р С•Р ВұРЎвҖ°Р ВөР Р…Р С‘РЎРҸР СҳР С‘.')}
      <div class="single-page-layout">
        <div class="panel page-main-panel">
          <div class="panel-inner chat-layout">
            <div class="chat-messages" id="msgWrap">${messages}</div>
            <div class="chat-input-row">
              <input class="text-input" id="chatInput" placeholder="Р РҺР С•Р С•Р ВұРЎвҖ°Р ВөР Р…Р С‘Р Вө Р РҶ Р С•Р ВұРЎвҖ°Р С‘Р в„– РЎвҖЎР В°РЎвҖҡ">
              <button class="btn primary" id="sendBtn">Р СӣРЎвҖҡР С—РЎРӮР В°Р РҶР С‘РЎвҖҡРЎРҠ</button>
            </div>
          </div>
        </div>
      </div>
      ${renderBottomNav('chat')}
    `;

    q('sendBtn').onclick = () => {
      const input = q('chatInput');
      const text = (input.value || '').trim();
      if (!text) return;
      state.chatMessages.push({from: state.hero.nickname, text});
      saveState(state);
      location.reload();
    };
    })();
  </script>
</body>
</html>
